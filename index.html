    function startScanner() {
        const codeReader = new ZXing.BrowserMultiFormatReader();
        document.getElementById('cam-container').style.display='block';
        codeReader.decodeFromVideoDevice(null,'video', (res) => {
            if(res){ 
                let c = res.text.trim();
                if(MAPA_NAZVU[c]) { 
                    codeReader.reset(); document.getElementById('cam-container').style.display='none'; 
                    playBeep('ok'); 
                    document.getElementById('flash-ok').style.display='flex'; 
                    setTimeout(()=>document.getElementById('flash-ok').style.display='none',1000); 
                    addToQueue('scan', c, document.getElementById('scan-note').value); 
                    updateHistory(c); 
                    document.getElementById('scan-note').value = "";
                } else { 
                    playBeep('error'); 
                    document.getElementById('flash-error').style.display='flex'; 
                    setTimeout(()=>document.getElementById('flash-error').style.display='none',1000); 
                }
            }
        });
    }

    function startHold(e, v, id=null) { 
        e.preventDefault(); let p = 0; 
        let actualStep = (v === 'RESOLVE' ? 5 : 3.33); // 5 = 2s, 3.33 = 3s
        let pId = (v==='RESOLVE'?'prog-'+id:(v==='AZ_STOP'?'prog-az':(v==='HOTOVO'?'prog-h':(v==='NELZE'?'prog-n':'prog-clear'))));
        holdT = setInterval(() => {
            p += actualStep; 
            let el = document.getElementById(pId);
            if(el) el.style.width = p + '%';
            if(p >= 100) { 
                clearInterval(holdT); 
                if(v==='RESOLVE') resolveReport(id); 
                else if(v==='AZ_STOP') stopAzor();
                else if(v==='HOTOVO') { document.getElementById('task-box').style.display='none'; addToQueue('task_response', 'HOTOVO'); }
                stopHold();
            }
        }, 100);
    }
</script>
