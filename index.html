<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KING APPLICATION PRO v1.6.6</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); text-align: center; overflow-x: hidden; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #333; position: relative; }
        
        /* ÚKOL BOX - teď neblokuje celou kartu, ale jen tlačítka pod ním */
        #task-box { background: #2c2c2e; border: 3px solid var(--warning); border-radius: 15px; padding: 15px; margin: 15px 0; display: none; text-align: left; }
        .task-btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-h { background: var(--success); padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; }
        .btn-n { background: var(--danger); padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; }

        select, input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #333; border-radius: 12px; font-size: 16px; background: #2c2c2e; color: #fff; box-sizing: border-box; outline: none; }
        .btn { border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { padding: 18px; font-size: 17px; margin-bottom: 10px; }
        .btn-scan { background: var(--primary); }
        .btn-bdelost { background: var(--warning); color: #000; }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px; font-size: 13px; margin-bottom: 15px; width: auto; display: inline-flex; }
        
        /* SOS KONTEJNER - NIKDY NEBLOKOVAT */
        .sos-container { position: relative; width: 100%; height: 70px; background: #251010; border-radius: 35px; margin-top: 20px; overflow: hidden; border: 2px solid var(--danger); pointer-events: all !important; opacity: 1 !important; }
        .sos-handle { position: absolute; left: 5px; top: 5px; width: 60px; height: 60px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; font-size: 24px; touch-action: none; }
        
        #status { font-weight: bold; margin: 15px; color: var(--success); font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        td, th { padding: 10px 5px; border-bottom: 1px solid #222; text-align: left; }
        .row-ok { color: var(--success); }
        .row-wait { color: var(--danger); }
        
        #flash-ok, #flash-error { position: fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; z-index:9999; color:white; font-size: 120px; font-weight: bold; }
        #flash-ok { background: var(--success); }
        #flash-error { background: var(--danger); }
        
        /* TŘÍDA PRO BLOKOVÁNÍ (Mimo SOS) */
        .ui-blocked { opacity: 0.1; pointer-events: none; filter: grayscale(1); }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">

<div id="flash-ok">✅</div>
<div id="flash-error">❌</div>

<div class="card">
    <button class="btn btn-logout" onclick="location.reload()">🔒 ODHLÁSIT / ZAMKNOUT</button>
    <select id="tech-select" onchange="document.getElementById('auth-section').classList.remove('hidden')">
        <option value="">-- Vyber pracovníka --</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
    </select>
    
    <div id="auth-section" class="hidden">
        <input type="password" id="tech-pin" placeholder="PIN" oninput="checkAuth()">
    </div>

    <div id="task-box">
        <small style="color: var(--warning); font-weight: bold;">⚠️ NOVÝ ÚKOL:</small>
        <div id="task-text" style="font-weight: bold; margin-top: 8px; font-size: 18px; color: #fff;"></div>
        <div class="task-btn-group">
            <button class="btn-h" onclick="resolveTask('HOTOVO')">HOTOVO</button>
            <button class="btn-n" onclick="resolveTask('NELZE')">NELZE</button>
        </div>
    </div>

    <div id="action-controls" style="opacity: 0.1; pointer-events: none;">
        <div id="camera-container" style="display:none; border-radius:15px; overflow:hidden; border:2px solid var(--primary); margin-bottom:10px;">
            <video id="video" style="width:100%; background:#000;"></video>
            <button class="btn btn-main" onclick="stopScanner()" style="background:#444; border-radius:0; margin:0;">ZAVŘÍT</button>
        </div>
        <input type="text" id="scan-note" placeholder="Poznámka ke skenu...">
        <button class="btn btn-main btn-scan" onclick="startScanner()">QR SKEN KONTROLNÍHO BODU</button>
        <button id="deadman-btn" class="btn btn-main btn-bdelost" onclick="toggleDeadman()">NEBEZPEČNÁ ZÓNA</button>
    </div>

    <div class="sos-container" id="sos-slider">
        <div style="color:var(--danger); line-height:70px; font-size:12px; position:absolute; width:100%; text-align:center;">PŘETÁHNI PRO SOS >>></div>
        <div id="handle" class="sos-handle">🆘</div>
    </div>
</div>

<div class="card" id="history-section" style="display: none;">
    <textarea id="boss-msg" placeholder="Zpráva..."></textarea>
    <button class="btn btn-main" onclick="sendQuickMsg()" style="background:#444;">✉ ODESLAT</button>
    <div id="status">SYSTÉM UZAMČEN</div>
    <table id="history-table">
        <thead><tr><th>Čas</th><th>Akce</th><th>Stav</th></tr></thead>
        <tbody></tbody>
    </table>
    <button onclick="clearHistory()" style="background:none; border:none; color:#444; margin-top:15px; font-size:10px;">🗑️ SMAZAT HISTORII</button>
</div>

<div style="font-size: 10px; color: #444; margin-bottom: 20px;">v1.6.6 | KING APPLICATION PRO</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    const PINS = {"Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    const ALLOWED_CODES = ["KB001", "KB002", "KB003", "KB004", "KB005", "KB006", "KB007", "KB008", "KB009", "KB010", "KB011", "KB012", "KB013", "KB014", "KB015", "KB016", "KB017", "KB018", "KB019", "KB020", "KB021", "KB022", "KB023", "KB024", "KB025", "KB026", "KB027", "KB028", "KB029", "KB030", "KB031", "KB032", "KB033", "KB034", "KB035", "KB036", "KB037", "KB038", "KB039", "KB040", "KB041", "KB042", "KB043", "KB044", "KB045", "KB046", "KB047", "KB048", "KB049", "KB050"];

    let selectedTech = "", codeReader = new ZXing.BrowserMultiFormatReader(), deadmanTimer = null, lastLoc = "";
    let audioCtx = null, queue = [], historyData = [], isProcessing = false;

    navigator.geolocation.watchPosition((p) => { 
        lastLoc = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`; 
    }, null, { enableHighAccuracy: true });

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playSoundOk() { initAudio(); const t = (f, d) => { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, audioCtx.currentTime + d); g.gain.setValueAtTime(0.1, audioCtx.currentTime + d); o.start(audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d + 0.1); }; t(800, 0); t(1000, 0.1); }
    function playSoundErr() { initAudio(); const t = (f, d) => { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type = 'sawtooth'; o.frequency.setValueAtTime(f, audioCtx.currentTime + d); g.gain.setValueAtTime(0.1, audioCtx.currentTime + d); o.start(audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d + 0.3); }; t(200, 0); t(100, 0.2); }

    function checkAuth() {
        let t = document.getElementById('tech-select').value;
        if (PINS[t] === document.getElementById('tech-pin').value) {
            initAudio(); selectedTech = t;
            historyData = JSON.parse(localStorage.getItem('h_' + selectedTech) || "[]");
            queue = JSON.parse(localStorage.getItem('q_' + selectedTech) || "[]");
            document.getElementById('action-controls').style.opacity = "1"; 
            document.getElementById('action-controls').style.pointerEvents = "all";
            document.getElementById('history-section').style.display = "block";
            renderHistory();
            document.getElementById('status').innerText = "✅ PŘIHLÁŠEN: " + selectedTech;
            processQueue(); 
            setInterval(processQueue, 5000); 
        }
    }

    function addToQueue(type, code, customMsg = "") {
        const timestamp = new Date().toISOString();
        const item = { type, code, technician: selectedTech, message: customMsg || (type === 'scan' ? document.getElementById('scan-note').value.trim() : (type === 'message' ? document.getElementById('boss-msg').value.trim() : type)), location: lastLoc || "GPS nedostupná", timestamp };
        queue.push(item);
        localStorage.setItem('q_' + selectedTech, JSON.stringify(queue));
        if(type !== 'auth' && type !== 'task_response') {
            historyData.push({ timestamp, code, status: 'wait', name: code });
            localStorage.setItem('h_' + selectedTech, JSON.stringify(historyData));
            renderHistory();
            document.getElementById('flash-ok').style.display = 'flex'; setTimeout(() => document.getElementById('flash-ok').style.display='none', 600);
            playSoundOk();
        }
        processQueue();
    }

    async function processQueue() {
        if (isProcessing || !selectedTech) return;
        isProcessing = true;
        let payload = queue.length > 0 ? queue[0] : { type: 'check', technician: selectedTech };
        try {
            const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const res = await resp.json();
            if (payload.type !== 'check' && res.status === "OK") {
                queue.shift();
                localStorage.setItem('q_' + selectedTech, JSON.stringify(queue));
                let idx = historyData.findIndex(h => h.timestamp === payload.timestamp);
                if (idx > -1) { historyData[idx].status = 'ok'; historyData[idx].name = res.name || payload.code; localStorage.setItem('h_' + selectedTech, JSON.stringify(historyData)); renderHistory(); }
            }

            if (res.task && res.task !== null) {
                const taskBox = document.getElementById('task-box');
                const actions = document.getElementById('action-controls');
                if (taskBox.style.display !== 'block') {
                    playSoundOk();
                    taskBox.style.display = 'block';
                    actions.classList.add('ui-blocked'); // Blokuje vše kromě SOS
                }
                document.getElementById('task-text').innerText = res.task;
            } else {
                document.getElementById('task-box').style.display = 'none';
                document.getElementById('action-controls').classList.remove('ui-blocked');
            }
            document.getElementById('status').innerText = "✅ SYNCHRONIZOVÁNO";
        } catch (e) { document.getElementById('status').innerText = "📡 OFFLINE"; }
        finally { isProcessing = false; }
    }

    function resolveTask(s) { addToQueue('task_response', s); document.getElementById('task-box').style.display = 'none'; document.getElementById('action-controls').classList.remove('ui-blocked'); }
    function renderHistory() { const tbody = document.querySelector("#history-table tbody"); tbody.innerHTML = ""; [...historyData].reverse().slice(0, 15).forEach(h => { const time = new Date(h.timestamp).toLocaleTimeString(); const colorClass = h.status === 'ok' ? 'row-ok' : 'row-wait'; tbody.innerHTML += `<tr class="${colorClass}"><td>${time}</td><td>${h.name}</td><td>${h.status === 'ok' ? 'OK' : '...'}</td></tr>`; }); }
    function clearHistory() { if(confirm("Smazat historii?")) { historyData = []; localStorage.setItem('h_' + selectedTech, "[]"); renderHistory(); } }
    async function startScanner() { document.getElementById('camera-container').style.display = 'block'; codeReader.decodeFromVideoDevice(null, 'video', (res) => { if (res) { const txt = res.text.trim(); if (ALLOWED_CODES.includes(txt)) { stopScanner(); addToQueue('scan', txt); } else { stopScanner(); playSoundErr(); document.getElementById('flash-error').style.display = 'flex'; setTimeout(() => document.getElementById('flash-error').style.display='none', 1000); } } }); }
    function stopScanner() { codeReader.reset(); document.getElementById('camera-container').style.display = 'none'; }
    function sendQuickMsg() { if (document.getElementById('boss-msg').value.trim()) addToQueue('message', 'ZPRÁVA'); }

    function toggleDeadman() {
        const btn = document.getElementById('deadman-btn');
        if (!deadmanTimer) {
            let m = prompt("Minuty?", "15"); if (!m) return;
            let sec = m * 60;
            deadmanTimer = setInterval(() => {
                sec--;
                if (sec <= 0) { clearInterval(deadmanTimer); deadmanTimer = null; addToQueue('deadman_alarm', 'ALARM'); btn.innerText = "NEBEZPEČNÁ ZÓNA"; playSoundErr(); }
                else btn.innerText = "⏳ " + Math.floor(sec/60) + ":" + (sec%60).toString().padStart(2,'0');
            }, 1000);
        } else { clearInterval(deadmanTimer); deadmanTimer = null; btn.innerText = "NEBEZPEČNÁ ZÓNA"; }
    }

    const h = document.getElementById('handle'), s = document.getElementById('sos-slider');
    let drag = false; h.addEventListener('touchstart', () => { drag = true; initAudio(); });
    window.addEventListener('touchmove', (e) => { if (!drag) return; let x = e.touches[0].clientX - s.getBoundingClientRect().left - 30; x = Math.max(5, Math.min(x, s.offsetWidth - 65)); h.style.left = x + 'px'; if (x > s.offsetWidth - 70) { drag = false; h.style.left = '5px'; addToQueue('SOS', 'SOS'); } });
    window.addEventListener('touchend', () => { drag = false; h.style.left = '5px'; });
</script>
</body>
</html>
