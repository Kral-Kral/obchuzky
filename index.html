<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH - Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; border-radius: 25px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; border: 1px solid #ddd; }
        #reader { width: 100%; border-radius: 15px; background: #000; min-height: 300px; margin-bottom: 20px; overflow: hidden; border: 2px solid #3b82f6; }
        .btn-main { background: #3b82f6; color: white; border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #login-box { margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        input { width: 100%; padding: 18px; margin: 15px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 24px; text-align: center; box-sizing: border-box; letter-spacing: 10px; }
        .btn-ok { background: #10b981; color: white; border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">Control <span style="color:#3b82f6">PRO</span></h2>
    
    <div id="reader"></div>
    
    <button id="start-btn" class="btn-main" onclick="startScanner()">AKTIVOVAT SKENER</button>

    <div id="login-box" class="hidden">
        <p id="worker-display" style="font-weight: bold; font-size: 22px; color: #3b82f6; margin: 10px 0;"></p>
        <label style="font-size: 12px; color: #666; font-weight: bold;">ZADEJTE PIN:</label>
        <input type="password" id="pin-input" placeholder="****" inputmode="numeric" maxlength="4">
        <button class="btn-ok" onclick="verifyPin()">PŘIHLÁSIT SE</button>
    </div>
</div>

<script>
    // Prověřený seznam jmen a PINů
    const USERS = {
        "Jiří Bělíček": "5481", "Dalibor Čech": "2368", "René Russwurm st.": "1798",
        "René Russwurm ml.": "2849", "Roman Zámečník": "6984", "Marek Slovák": "1179",
        "Martin Kuneš": "2538", "David Mirvald": "1099", "Petr Illa": "7923",
        "Mirek Švarný": "1739", "Lukáš Sem": "4197", "Laďa Poledna": "5592"
    };

    let currentUser = "";
    let scanner = new Html5Qrcode("reader");

    function startScanner() {
        const config = { fps: 20, qrbox: { width: 280, height: 280 } };
        
        scanner.start({ facingMode: "environment" }, config, (decodedText) => {
            // Vibrujeme a pípáme (pokud to iPhone dovolí)
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            
            // Očištění jména (odstraní případné T01 atd.)
            let name = decodedText.replace(/^T\d+\s*/, "").trim();
            
            if (USERS[name]) {
                currentUser = name;
                document.getElementById('worker-display').innerText = name;
                document.getElementById('login-box').classList.remove('hidden');
                document.getElementById('start-btn').classList.add('hidden');
                scanner.stop();
            } else {
                alert("Neznámý pracovník: " + name);
            }
        }).catch(err => {
            alert("CHYBA: Kamera je blokována! Jdi do Nastavení iPhonu -> Safari -> Fotoaparát -> Povolit.");
        });
    }

    function verifyPin() {
        const pin = document.getElementById('pin-input').value;
        if (USERS[currentUser] === pin) {
            alert("PŘIHLÁŠENO! Můžete pokračovat.");
            // Tady pak doděláme odesílání do tabulky
            location.reload();
        } else {
            alert("ŠPATNÝ PIN!");
            document.getElementById('pin-input').value = "";
        }
    }
</script>

</body>
</html>
