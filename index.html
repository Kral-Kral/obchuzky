<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM Control v2.1.6</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; text-align: center; }
        .btn { border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; color: white; padding: 18px; margin-bottom: 10px; font-size: 17px; }
        .btn-scan { background: var(--primary); }
        .btn-sos { background: var(--danger); }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; background: #2c2c2e; color: white; border: 1px solid #333; box-sizing: border-box; }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; background: var(--success); z-index: 10000; justify-content: center; align-items: center; font-size: 100px; }
    </style>
</head>
<body onclick="initAudio()">
    <div id="flash">✅</div>

    <div class="card" id="login">
        <h2>AQM Control</h2>
        <div style="color:var(--warning)">VERZE 2.1.6</div>
        <select id="user">
            <option value="Jiří Bělíček">Jiří Bělíček</option>
            <option value="Dalibor Čech">Dalibor Čech</option>
            <option value="Král">Král</option>
        </select>
        <input type="password" id="pin" placeholder="PIN">
        <button class="btn btn-scan" onclick="login()">PŘIHLÁSIT</button>
    </div>

    <div class="card hidden" id="app" style="display:none">
        <button class="btn" style="background: #444" onclick="loadReports()">📋 REPORTY</button>
        <input type="text" id="note" placeholder="Poznámka...">
        <button class="btn btn-scan" onclick="scan()">QR SKEN BODU</button>
        <div id="cam" style="display:none"><video id="video" style="width:100%"></video></div>
        <button class="btn btn-sos" onclick="send('SOS', 'SOS')">🆘 SOS (STISK)</button>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec";
        const PINS = {"Jiří Bělíček":"5481", "Dalibor Čech":"2368", "Král":"2013"};
        let me = "", audio = null, reader = new ZXing.BrowserMultiFormatReader();

        function initAudio() { if(!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); }
        function beep() { if(audio) { let o = audio.createOscillator(); o.connect(audio.destination); o.start(); o.stop(audio.currentTime + 0.1); } }

        function login() {
            let u = document.getElementById('user').value, p = document.getElementById('pin').value;
            if(PINS[u] === p) { me = u; document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; }
        }

        function scan() { document.getElementById('cam').style.display='block'; reader.decodeFromVideoDevice(null, 'video', (r)=>{ if(r){ reader.reset(); document.getElementById('cam').style.display='none'; send('scan', r.text); }}); }

        async function send(t, c) {
            beep();
            let n = document.getElementById('note').value;
            let resp = await fetch(URL, {method:'POST', body: JSON.stringify({type:t, code:c, technician:me, message:n, location:""})});
            if(resp.ok) { document.getElementById('flash').style.display='flex'; setTimeout(()=>document.getElementById('flash').style.display='none', 600); document.getElementById('note').value=""; }
        }

        async function loadReports() {
            let resp = await fetch(URL, {method:'POST', body: JSON.stringify({type:'get_reports', technician:me})});
            let data = await resp.json();
            alert("Počet reportů: " + data.reports.length + "\nPoslední: " + (data.reports.length > 0 ? data.reports[0].text : "žádný"));
        }
    </script>
</body>
</html>
