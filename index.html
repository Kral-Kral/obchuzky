<style>
    /* Přidáno tlačítko pro potvrzení přečtení */
    .btn-ack { background: var(--primary); color: white; padding: 10px; border-radius: 8px; border: none; font-weight: bold; width: 100%; margin-bottom: 10px; cursor: pointer; }
    .is-acknowledged { animation: none !important; border-color: #444 !important; opacity: 0.8; }
</style>

<div id="task-box">
    <small id="task-header" style="color: var(--warning); font-weight: bold;">⚠️ NOVÝ ÚKOL (VIBRACE):</small>
    <div id="task-text" style="font-weight: bold; margin-top: 8px; font-size: 18px; color: #fff;"></div>
    
    <button id="btn-ack" class="btn-ack" onclick="ackTask()">OK, ROZUMÍM (ZTIŠIT)</button>

    <div class="task-btn-group">
        <button class="btn-hold btn-h" id="btn-hotovo" ...>
            <div class="hold-progress" id="prog-h"></div><span>HOTOVO</span>
        </button>
        <button class="btn-hold btn-n" id="btn-nelze" ...>
            <div class="hold-progress" id="prog-n"></div><span>NELZE</span>
        </button>
    </div>
</div>

<script>
    let isVibrating = false;
    let vibrationInterval = null;

    function triggerVibration() {
        if (!navigator.vibrate) return;
        isVibrating = true;
        vibrationInterval = setInterval(() => {
            if (isVibrating) navigator.vibrate([400, 200, 400]);
        }, 2000);
    }

    // Funkce pro zastavení vibrací, ale ponechání úkolu
    function ackTask() {
        isVibrating = false;
        if (vibrationInterval) clearInterval(vibrationInterval);
        document.getElementById('task-box').classList.add('is-acknowledged');
        document.getElementById('btn-ack').style.display = 'none';
        document.getElementById('task-header').innerText = "📌 PŘIJATÝ ÚKOL:";
        document.title = "KING APPLICATION PRO";
    }

    async function processQueue() {
        // ... (fetch logika stejná jako u v1.7.0) ...
        
        if (res.task && res.task !== null && res.task !== lastResolvedTask) {
            const taskBox = document.getElementById('task-box');
            if (taskBox.style.display !== 'block') {
                taskBox.style.display = 'block';
                taskBox.classList.remove('is-acknowledged');
                document.getElementById('btn-ack').style.display = 'block';
                document.getElementById('task-header').innerText = "⚠️ NOVÝ ÚKOL (VIBRACE):";
                playSoundOk();
                triggerVibration(); // Spustí smyčku vibrací
            }
            document.getElementById('task-text').innerText = res.task;
        } else {
            // Pokud úkol zmizí z tabulky, vypni vše
            ackTask();
            document.getElementById('task-box').style.display = 'none';
        }
    }

    function resolveTask(val) {
        ackTask(); // Pro jistotu zastavit vibrace
        addToQueue('task_response', val);
        document.getElementById('task-box').style.display = 'none';
    }
</script>
