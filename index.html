<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO - Offline Ready</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --warning: #f59e0b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        #reader { width: 100%; border-radius: 20px; background: #000; min-height: 250px; border: 2px solid #334155; overflow: hidden; margin-bottom: 20px; }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn { border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; text-transform: uppercase; }
        .btn-blue { background: var(--primary); color: #000; }
        .btn-green { background: var(--success); color: #fff; }
        .hidden { display: none !important; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0d1117; color: white; box-sizing: border-box; }
        #status { margin-top: 15px; text-align: center; color: var(--primary); font-weight: bold; }
        #offline-badge { background: var(--warning); color: #000; padding: 5px 10px; border-radius: 10px; font-size: 12px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">AQ TECH <span style="color:var(--primary)">PRO</span></h1>
    
    <div id="offline-badge">⚠️ ČEKÁ NA ODESLÁNÍ (OFFLINE REŽIM)</div>
    <div id="reader"></div>
    <div id="status">Systém připraven</div>

    <div id="sec-login" class="card">
        <button class="btn btn-blue" onclick="startQR('login')">📷 SKENOVAT KARTU</button>
        <div id="login-ui" class="hidden">
            <h2 id="name-label" style="margin: 10px 0; color: var(--primary)"></h2>
            <input type="password" id="pin-field" placeholder="PIN" inputmode="numeric" maxlength="4">
            <button class="btn btn-green" onclick="doAuth()">PŘIHLÁSIT SE</button>
        </div>
    </div>

    <div id="sec-work" class="card hidden">
        <button class="btn btn-blue" onclick="startQR('work')">🔍 SKENOVAT OBJEKT</button>
        <div id="work-ui" class="hidden">
            <p>Objekt: <strong id="obj-id" style="color:var(--primary); font-size: 20px;"></strong></p>
            <textarea id="note-field" placeholder="Závada / poznámka..."></textarea>
            <button class="btn" style="background:var(--success); color:white;" onclick="saveEntry()">🚀 ULOŽIT ZÁZNAM</button>
        </div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbxNf2EgoBJOUWvKflRisSFfQt6L2JivO3Lcw53amT7WcTTwgNBeQi9awfpzEXErjAI/exec";

    const STAFF = {
        "T01": { name: "Jiří Bělíček", pin: "5481" }, "T02": { name: "Dalibor Čech", pin: "2368" },
        "T03": { name: "René Russwurm st.", pin: "1798" }, "T04": { name: "René Russwurm ml.", pin: "2849" },
        "T05": { name: "Roman Zámečník", pin: "6984" }, "T06": { name: "Marek Slovák", pin: "1179" },
        "T07": { name: "Martin Kuneš", pin: "2538" }, "T08": { name: "David Mirvald", pin: "1099" },
        "T09": { name: "Petr Illa", pin: "7923" }, "T10": { name: "Mirek Švarný", pin: "1739" },
        "T11": { name: "Lukáš Sem", pin: "4197" }, "T12": { name: "Laďa Poledna", pin: "5592" }
    };

    let user = null;
    let place = "";
    let scanner = new Html5Qrcode("reader");

    // Kontrola offline fronty při startu
    window.onload = () => { checkQueue(); };

    async function startQR(mode) {
        document.getElementById('status').innerText = "Hledám kód...";
        try {
            if (scanner.getState() === 2) await scanner.stop();
            await scanner.start({ facingMode: "environment" }, { fps: 25, qrbox: 250 }, (txt) => {
                if (navigator.vibrate) navigator.vibrate(60);
                if (mode === 'login') {
                    if (STAFF[txt]) {
                        user = STAFF[txt];
                        document.getElementById('name-label').innerText = user.name;
                        document.getElementById('login-ui').classList.remove('hidden');
                        scanner.stop();
                    }
                } else {
                    place = txt;
                    document.getElementById('obj-id').innerText = txt;
                    document.getElementById('work-ui').classList.remove('hidden');
                    scanner.stop();
                }
            });
        } catch (e) { alert("Chyba kamery! Použijte HTTPS."); }
    }

    function doAuth() {
        if (document.getElementById('pin-field').value === user.pin) {
            document.getElementById('sec-login').classList.add('hidden');
            document.getElementById('sec-work').classList.remove('hidden');
            document.getElementById('status').innerText = "Vítejte, " + user.name;
        } else alert("ŠPATNÝ PIN!");
    }

    // ULOŽENÍ DO OFFLINE FRONTY
    function saveEntry() {
        const note = document.getElementById('note-field').value;
        const time = new Date().toLocaleString("cs-CZ");
        document.getElementById('status').innerText = "📍 Zaměřuji GPS...";

        navigator.geolocation.getCurrentPosition((pos) => {
            const gps = pos.coords.latitude.toFixed(6) + "," + pos.coords.longitude.toFixed(6);
            
            const entry = {
                worker: user.name,
                place: place,
                note: note,
                gps: gps,
                time: time
            };

            // Uložit do LocalStorage
            let queue = JSON.parse(localStorage.getItem('scanQueue')) || [];
            queue.push(entry);
            localStorage.setItem('scanQueue', JSON.stringify(queue));

            alert("ZÁZNAM ULOŽEN LOKÁLNĚ!\nČas: " + time + "\nOdešle se automaticky na signálu.");
            
            // Vyčistit formulář
            document.getElementById('work-ui').classList.add('hidden');
            document.getElementById('note-field').value = "";
            document.getElementById('status').innerText = "Záznam čeká ve frontě.";
            
            checkQueue(); // Pokusit se odeslat
        }, () => { alert("Bez GPS nelze uložit!"); }, { enableHighAccuracy: true });
    }

    // POKUS O ODESLÁNÍ FRONTY
    async function checkQueue() {
        let queue = JSON.parse(localStorage.getItem('scanQueue')) || [];
        const badge = document.getElementById('offline-badge');

        if (queue.length === 0) {
            badge.style.display = 'none';
            return;
        }

        badge.style.display = 'block';
        badge.innerText = "⏳ ODESÍLÁNÍ FRONTY (" + queue.length + ")...";

        // Zkusíme odeslat první položku
        const item = queue[0];
        const url = `${URL_API}?worker=${encodeURIComponent(item.worker)}&place=${encodeURIComponent(item.place)}&note=${encodeURIComponent(item.note)}&gps=${encodeURIComponent(item.gps)}&time=${encodeURIComponent(item.time)}`;

        try {
            // Používáme fetch s krátkým timeoutem
            const response = await fetch(url, { mode: 'no-cors' });
            // Pokud fetch nespadl do catch, bereme to jako úspěch (u no-cors nevidíme status)
            queue.shift(); // Odstranit odeslanou položku
            localStorage.setItem('scanQueue', JSON.stringify(queue));
            console.log("Položka odeslána.");
            checkQueue(); // Zkusit další
        } catch (e) {
            console.log("Stále offline nebo chyba signálu.");
            badge.innerText = "⚠️ OFFLINE: " + queue.length + " ZÁZNAMŮ ČEKÁ";
        }
    }

    // Automatický pokus o odeslání při návratu signálu
    window.addEventListener('online', checkQueue);
</script>
</body>
</html>
