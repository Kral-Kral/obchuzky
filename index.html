<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO 2026</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; 
            --success: #10b981; --error: #ef4444; --text: #f8fafc; 
            --accent: #f59e0b;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }

        .app-container { width: 100%; max-width: 450px; }

        h1 { text-align: center; font-size: 24px; margin-bottom: 20px; letter-spacing: 1px; }

        #reader { 
            width: 100%; border-radius: 24px; background: #000; 
            min-height: 250px; border: 3px solid #334155; 
            overflow: hidden; position: relative;
        }
        
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }

        .card { 
            background: var(--card); border-radius: 24px; padding: 20px; 
            margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            transition: transform 0.2s;
        }

        .btn { 
            border: none; padding: 18px; width: 100%; border-radius: 16px; 
            font-size: 16px; font-weight: 800; cursor: pointer; 
            transition: all 0.2s; text-transform: uppercase; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        .btn:active { transform: scale(0.97); filter: brightness(0.9); }
        .btn-blue { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .btn-success { background: var(--success); color: white; margin-top: 10px; }
        .btn-red { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); padding: 8px 15px; font-size: 12px; width: auto; }

        .hidden { display: none !important; }

        input, textarea { 
            width: 100%; padding: 18px; margin: 12px 0; border-radius: 14px; 
            background: #0d1117; color: white; border: 2px solid #334155; 
            font-size: 18px; outline: none; transition: border-color 0.2s;
        }
        
        input:focus { border-color: var(--primary); }

        #sync-status { 
            background: var(--accent); color: #000; padding: 12px; 
            border-radius: 12px; font-size: 13px; font-weight: bold; 
            margin-bottom: 15px; width: 100%; text-align: center; 
            display: none; animation: pulse 2s infinite;
        }

        .user-tag { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(56, 189, 248, 0.1); padding: 12px 15px; 
            border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--primary); 
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; }
        }

        .version-tag { margin-top: 30px; font-size: 11px; color: #475569; text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>AQ TECH <span style="color:var(--primary)">PRO</span></h1>
    
    <div id="sync-status">⏳ SYNCHRONIZACE DAT...</div>
    
    <div id="reader"></div>
    
    <div id="status" style="text-align:center; margin:15px 0; font-size:14px; color:var(--primary); font-weight: bold;">
        Systém připraven
    </div>

    <audio id="beep" src="https://www.soundjay.com/buttons/beep-07a.mp3" preload="auto"></audio>

    <div id="sec-login" class="card">
        <button class="btn btn-blue" onclick="startCamera('login')">
            📷 SKENOVAT IDENTIFIKACI
        </button>
        
        <div id="ui-login" class="hidden" style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px;">
            <small style="color: #94a3b8;">VYBRANÝ TECHNIK:</small>
            <h2 id="worker-label" style="color: var(--primary); margin: 5px 0 15px 0;"></h2>
            <input type="password" id="pin" placeholder="Zadejte 4místný PIN" inputmode="numeric" maxlength="4">
            <button class="btn btn-success" onclick="verifyLogin()">POTVRDIT PŘIHLÁŠENÍ</button>
        </div>
    </div>

    <div id="sec-work" class="card hidden">
        <div class="user-tag">
            <div>
                <small style="color: var(--primary); display: block; font-size: 10px;">PŘIHLÁŠEN:</small>
                <span id="logged-name" style="font-weight: bold;">---</span>
            </div>
            <button class="btn-red" onclick="logout()">ODHLÁSIT</button>
        </div>

        <button class="btn btn-blue" onclick="startCamera('work')">
            🔍 SKENOVAT OBJEKT / QR
        </button>

        <div id="ui-work" class="hidden" style="margin-top: 20px;">
            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 16px; margin-bottom: 15px; border-left: 4px solid var(--primary);">
                <small style="color: #94a3b8; text-transform: uppercase; font-size: 10px;">AKTUÁLNÍ OBJEKT:</small>
                <div id="obj-label" style="font-size: 20px; font-weight: 900; color: var(--text); margin-top: 5px;">---</div>
            </div>
            
            <textarea id="note" rows="3" placeholder="Závada, provedená práce nebo poznámka..."></textarea>
            
            <button id="save-btn" class="btn btn-success" onclick="saveData()">
                🚀 ULOŽIT DO SYSTÉMU
            </button>
        </div>
    </div>

    <div class="version-tag">VERZE: v2026.2.1 • OFFLINE-FIRST ENGINE</div>
</div>

<script>
    // --- KONFIGURACE ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNf2EgoBJOUWvKflRisSFfQt6L2JivO3Lcw53amT7WcTTwgNBeQi9awfpzEXErjAI/exec";
    const EMPLOYEES = { 
        "T01": { name: "Jiří Bělíček", pin: "5481" }, 
        "T02": { name: "Dalibor Čech", pin: "2368" }, 
        "T03": { name: "René Russwurm st.", pin: "1798" }, 
        "T04": { name: "René Russwurm ml.", pin: "2849" }, 
        "T05": { name: "Roman Zámečník", pin: "6984" }, 
        "T06": { name: "Marek Slovák", pin: "1179" }, 
        "T07": { name: "Martin Kuneš", pin: "2538" }, 
        "T08": { name: "David Mirvald", pin: "1099" }, 
        "T09": { name: "Petr Illa", pin: "7923" }, 
        "T10": { name: "Mirek Švarný", pin: "1739" }, 
        "T11": { name: "Lukáš Sem", pin: "4197" }, 
        "T12": { name: "Laďa Poledna", pin: "5592" } 
    };

    let currentUser = null;
    let currentPlace = "";
    let html5QrCode = new Html5Qrcode("reader");
    let isSyncing = false;

    // --- INICIALIZACE ---
    window.onload = () => {
        const saved = localStorage.getItem('loggedWorker');
        if (saved) {
            currentUser = JSON.parse(saved);
            showWork();
        }
        sync();
        
        // Service Worker registrace
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    };

    // --- KAMERA A SKENOVÁNÍ ---
    async function startCamera(mode) {
        document.getElementById('status').innerText = "Spouštím kameru...";
        try {
            if (html5QrCode.getState() === 2) await html5QrCode.stop();
            
            const config = { fps: 20, qrbox: { width: 250, height: 250 } };
            
            await html5QrCode.start({ facingMode: "environment" }, config, (txt) => {
                onScanSuccess(txt, mode);
            });
            document.getElementById('status').innerText = "Hledám QR kód...";
        } catch (e) {
            alert("Chyba kamery: Ujistěte se, že jste povolili přístup.");
            document.getElementById('status').innerText = "Chyba kamery";
        }
    }

    function onScanSuccess(txt, mode) {
        // Zpětná vazba
        document.getElementById('beep').play().catch(()=>{});
        if (navigator.vibrate) navigator.vibrate(100);

        if (mode === 'login') {
            if (EMPLOYEES[txt]) {
                currentUser = EMPLOYEES[txt];
                document.getElementById('worker-label').innerText = currentUser.name;
                document.getElementById('ui-login').classList.remove('hidden');
                document.getElementById('pin').focus(); // Auto-focus pro rychlost
                html5QrCode.stop();
            } else {
                alert("Neznámý kód technika!");
            }
        } else {
            currentPlace = txt;
            document.getElementById('obj-label').innerText = txt;
            document.getElementById('ui-work').classList.remove('hidden');
            document.getElementById('note').focus();
            html5QrCode.stop();
        }
    }

    // --- LOGIKA A DATA ---
    function verifyLogin() {
        const pinInput = document.getElementById('pin');
        if (pinInput.value === currentUser.pin) {
            localStorage.setItem('loggedWorker', JSON.stringify(currentUser));
            showWork();
            pinInput.value = "";
        } else {
            alert("Nesprávný PIN!");
            pinInput.value = "";
        }
    }

    function showWork() {
        document.getElementById('sec-login').classList.add('hidden');
        document.getElementById('sec-work').classList.remove('hidden');
        document.getElementById('logged-name').innerText = currentUser.name;
        document.getElementById('status').innerText = "Přihlášen: " + currentUser.name;
    }

    function logout() {
        if(confirm("Opravdu se chcete odhlásit?")) {
            localStorage.removeItem('loggedWorker');
            location.reload();
        }
    }

    function saveData() {
        const note = document.getElementById('note').value.trim();
        const saveBtn = document.getElementById('save-btn');
        
        saveBtn.disabled = true;
        saveBtn.innerText = "Zjišťuji polohu...";

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const gps = `${pos.coords.latitude.toFixed(6)},${pos.coords.longitude.toFixed(6)}`;
                const time = new Date().toLocaleString("cs-CZ");
                
                let queue = JSON.parse(localStorage.getItem('aqQ')) || [];
                queue.push({ 
                    worker: currentUser.name, 
                    place: currentPlace, 
                    note: note || "Bez poznámky", 
                    gps: gps, 
                    time: time 
                });
                
                localStorage.setItem('aqQ', JSON.stringify(queue));
                
                // Úspěch UI
                alert("✅ DATA ULOŽENA (OFFLINE)");
                document.getElementById('ui-work').classList.add('hidden');
                document.getElementById('note').value = "";
                saveBtn.disabled = false;
                saveBtn.innerText = "🚀 ULOŽIT DO SYSTÉMU";
                
                sync();
            },
            (err) => {
                alert("GPS Chyba: Nutné povolit polohu pro zápis!");
                saveBtn.disabled = false;
                saveBtn.innerText = "🚀 ULOŽIT DO SYSTÉMU";
            },
            { enableHighAccuracy: true, timeout: 8000 }
        );
    }

    // --- SYNCHRONIZAČNÍ ENGINE ---
    async function sync() {
        if (isSyncing) return;
        
        let queue = JSON.parse(localStorage.getItem('aqQ')) || [];
        const statusEl = document.getElementById('sync-status');
        
        if (queue.length === 0) {
            statusEl.style.display = 'none';
            return;
        }

        if (!navigator.onLine) {
            statusEl.style.display = 'block';
            statusEl.innerText = `📡 ČEKÁM NA SIGNÁL (${queue.length} záznamů)`;
            statusEl.style.background = "#475569";
            statusEl.style.color = "white";
            return;
        }

        isSyncing = true;
        statusEl.style.display = 'block';
        statusEl.style.background = "#f59e0b";
        statusEl.style.color = "#000";
        statusEl.innerText = `🚀 ODESÍLÁM: ${queue.length} záznamů...`;

        const item = queue[0];
        const queryParams = new URLSearchParams(item).toString();
        
        try {
            // Použití timeoutu pro fetch
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            await fetch(`${SCRIPT_URL}?${queryParams}`, { 
                mode: 'no-cors',
                signal: controller.signal
            });

            clearTimeout(timeoutId);
            
            // Odstranění odeslaného prvku
            queue.shift();
            localStorage.setItem('aqQ', JSON.stringify(queue));
            
            isSyncing = false;
            // Rekurzivní volání pro další položku v frontě
            setTimeout(sync, 1000); 
            
        } catch (e) {
            console.error("Sync error:", e);
            isSyncing = false;
            statusEl.innerText = `⚠️ CHYBA PŘENOSU - ZKUSÍM ZNOVU`;
        }
    }

    // Automatický sync při obnovení internetu
    window.addEventListener('online', sync);
</script>

</body>
</html>
