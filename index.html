<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ CONTROL 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root { --bg: #020617; --glass: rgba(30, 41, 59, 0.7); --primary: #38bdf8; --success: #10b981; --error: #f43f5e; --warning: #f59e0b; --text-main: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 440px; }
        header h1 { text-align: center; font-size: 26px; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        #sync-box { width: 100%; background: var(--warning); color: #000; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; display: none; border: 2px solid #fff; }
        .btn-force { background: #000; color: #fff; border: none; padding: 12px; border-radius: 12px; margin-top: 10px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }

        .task-card { background: linear-gradient(135deg, rgba(244, 63, 94, 0.3), rgba(2, 6, 23, 0.8)); border: 3px solid var(--error); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 0 30px var(--error); }
        .btn-done { padding: 16px; border-radius: 12px; margin-top: 10px; font-size: 16px; width: 100%; border: none; font-weight: 900; cursor: pointer; color: white; text-transform: uppercase; }
        .btn-confirm-stage { background: var(--error) !important; animation: blink 0.3s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .scanner-wrap { width: 100%; border-radius: 28px; overflow: hidden; border: 2px solid var(--border); background: #000; }
        #reader { width: 100%; min-height: 250px; }
        .card { background: var(--glass); backdrop-filter: blur(16px); border-radius: 28px; padding: 20px; margin-top: 20px; border: 1px solid var(--border); }
        .btn { border: none; padding: 18px; width: 100%; border-radius: 18px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: #020617; }
        .btn-success { background: var(--success); color: white; margin-top: 15px; }
        textarea { width: 100%; padding: 16px; border-radius: 16px; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--border); font-size: 16px; resize: none; margin-top: 10px; }
        input { width: 100%; padding: 16px; margin: 12px 0; border-radius: 16px; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--border); text-align: center; font-size: 20px; }
        .hidden { display: none !important; }
        .history-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    </style>
</head>
<body>
<div class="app-container">
    <header><h1>AQ CONTROL</h1></header>
    
    <div id="sync-box">
        <div id="sync-info" style="font-weight: 900;"></div>
        <button id="force-btn" class="btn-force" onclick="initAudio(); forceSync();">VYNUTIT ODESLÁNÍ 🚀</button>
    </div>
    
    <div id="task-container"></div>
    <div class="scanner-wrap"><div id="reader"></div></div>
    
    <div id="sec-login" class="card">
        <button class="btn btn-primary" onclick="initAudio(); startCamera('login');">📷 PŘIHLÁSIT TECHNIKA</button>
        <div id="ui-login" class="hidden">
            <h2 id="worker-label" style="text-align:center; color:var(--primary)"></h2>
            <input type="password" id="pin" placeholder="PIN" inputmode="numeric" maxlength="4">
            <button class="btn btn-success" onclick="initAudio(); verifyLogin();">VSTOUPIT</button>
        </div>
    </div>

    <div id="sec-work" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span id="logged-name" style="font-weight:700;">---</span>
                <button style="background:none; border:1px solid var(--error); color:var(--error); padding:5px 10px; border-radius:8px;" onclick="logout()">ODHLÁSIT</button>
            </div>
            <button class="btn btn-primary" onclick="initAudio(); startCamera('work');">🔍 SKENOVAT OBJEKT</button>
            <div id="ui-work" class="hidden">
                <div style="background:rgba(56,189,248,0.1); padding:15px; border-radius:15px; margin:15px 0; text-align:center;">
                    <small>OBJEKT:</small><div id="obj-label" style="font-size:22px; font-weight:800;">---</div>
                </div>
                <textarea id="note" placeholder="Poznámka..." rows="3"></textarea>
                <button class="btn btn-success" id="save-btn" onclick="initAudio(); saveData();">🚀 ODESLAT DO ZÁZNAMŮ</button>
            </div>
        </div>
        <div id="history-section" style="margin-top:20px;">
            <h3 style="font-size:14px; color:var(--primary); margin-bottom:10px;">POSLEDNÍCH 10 ZÁPISŮ</h3>
            <div id="history-list"></div>
        </div>
    </div>
    <div style="margin-top:20px; font-size:10px; color:#475569; text-align:center;">VERZE: v2026.52 (Sound Fix)</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec";
    const EMPLOYEES = { "T01": { name: "Jiří Bělíček", pin: "5481" }, "T02": { name: "Dalibor Čech", pin: "2368" }, "T03": { name: "René Russwurm st.", pin: "1798" }, "T04": { name: "René Russwurm ml.", pin: "2849" }, "T05": { name: "Roman Zámečník", pin: "6984" }, "T06": { name: "Marek Slovák", pin: "1179" }, "T07": { name: "Martin Kuneš", pin: "2538" }, "T08": { name: "David Mirvald", pin: "1099" }, "T09": { name: "Petr Illa", pin: "7923" }, "T10": { name: "Mirek Švarný", pin: "1739" }, "T11": { name: "Lukáš Sem", pin: "4197" }, "T12": { name: "Laďa Poledna", pin: "5592" } };
    
    let currentUser = null; let html5QrCode = new Html5Qrcode("reader"); 
    let isSyncing = false; let audioCtx = null; let notifiedTasks = new Set();

    // ODEMKNUTÍ AUDIO KONTEXTU (Klíčové pro Safari)
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playBeep() {
        if (!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = "square"; o.frequency.setValueAtTime(950, audioCtx.currentTime);
        g.gain.setValueAtTime(0.8, audioCtx.currentTime); 
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.6);
    }

    function playTaskAlert() {
        if (!audioCtx) return;
        const dur = 1.2; const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = "sawtooth"; o.frequency.setValueAtTime(400, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
        o.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.6);
        o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.9);
        g.gain.setValueAtTime(1.0, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
        if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
    }

    function getNow() { return new Date().toLocaleString("cs-CZ"); }

    async function checkTasks() { 
        if (!currentUser || !navigator.onLine) return; 
        try { 
            const res = await fetch(`${SCRIPT_URL}?action=getTasks&worker=${encodeURIComponent(currentUser.name)}`); 
            const tasks = await res.json(); 
            const container = document.getElementById('task-container'); 
            let hasNew = false;
            tasks.forEach(t => { if (!notifiedTasks.has(t.place + t.note)) { hasNew = true; notifiedTasks.add(t.place + t.note); } });
            if (hasNew) playTaskAlert();
            container.innerHTML = tasks.length > 0 ? tasks.map(t => `
                <div class="task-card">
                    <div style="color:var(--error); font-weight:900; font-size:20px; margin-bottom:10px;">🚨 NOVÝ ÚKOL!</div>
                    <div style="font-weight:bold; font-size:19px; color:#fff;">${t.place}</div>
                    <div style="font-size:14px; opacity:0.9; margin:10px 0;">${t.note}</div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-done" style="background:var(--success);" onclick="initAudio(); completeTask(this, '${t.place.replace(/'/g, "\\'")}', 'HOTOVO')">HOTOVO</button>
                        <button class="btn-done" style="background:var(--error);" onclick="initAudio(); completeTask(this, '${t.place.replace(/'/g, "\\'")}', 'NELZE')">NELZE</button>
                    </div>
                </div>`).join('') : ""; 
        } catch (e) {} 
    }

    async function completeTask(btn, place, status) {
        if (!btn.classList.contains('btn-confirm-stage')) {
            btn.classList.add('btn-confirm-stage'); btn.dataset.oldText = btn.innerText; btn.innerText = "POTVRĎ!";
            setTimeout(() => { if (btn) { btn.classList.remove('btn-confirm-stage'); btn.innerText = btn.dataset.oldText; } }, 3000);
            return;
        }
        const card = btn.closest('.task-card'); if (card) card.style.display = 'none';
        let q = JSON.parse(localStorage.getItem('aqQ')) || [];
        q.push({ action: "completeTask", worker: currentUser.name, place: place, status: status, time: getNow(), id: Date.now() });
        localStorage.setItem('aqQ', JSON.stringify(q));
        updateQueueUI(); sync(); 
    }

    async function startCamera(mode) { 
        try { 
            if (html5QrCode.getState() !== 1) await html5QrCode.stop().catch(()=>{}); 
            await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => { 
                playBeep();
                if (mode === 'login') { 
                    if (EMPLOYEES[txt]) { currentUser = EMPLOYEES[txt]; document.getElementById('worker-label').innerText = currentUser.name; document.getElementById('ui-login').classList.remove('hidden'); html5QrCode.stop(); } 
                } else { document.getElementById('obj-label').innerText = txt; document.getElementById('ui-work').classList.remove('hidden'); html5QrCode.stop(); } 
            }); 
        } catch (e) { alert("Chyba kamery."); } 
    }

    function verifyLogin() { if (document.getElementById('pin').value === currentUser.pin) { localStorage.setItem('loggedWorker', JSON.stringify(currentUser)); showWork(); } else alert("Špatný PIN!"); }
    function showWork() { document.getElementById('sec-login').classList.add('hidden'); document.getElementById('sec-work').classList.remove('hidden'); document.getElementById('logged-name').innerText = currentUser.name; checkTasks(); renderHistory(); updateQueueUI(); }
    function logout() { localStorage.removeItem('loggedWorker'); location.reload(); }

    function renderHistory() {
        const hist = JSON.parse(localStorage.getItem('aqHist')) || [];
        document.getElementById('history-list').innerHTML = hist.map(h => `<div class="history-item"><div><b>${h.place}</b><br><small>${h.time.split(',')[1]}</small></div><div style="color:var(--success)">OK ✅</div></div>`).join('');
    }

    function updateQueueUI() {
        const q = JSON.parse(localStorage.getItem('aqQ')) || [];
        const box = document.getElementById('sync-box');
        const info = document.getElementById('sync-info');
        if (q.length > 0) {
            box.style.display = "block";
            info.innerText = isSyncing ? `🚀 ODESÍLÁM: ${q.length} POLOŽEK` : `⚠️ VE FRONTĚ: ${q.length} POLOŽEK`;
        } else { box.style.display = "none"; }
    }

    function forceSync() {
        const btn = document.getElementById('force-btn');
        btn.innerText = "RESETOVÁNO ⚙️";
        btn.style.background = "red";
        isSyncing = false; 
        setTimeout(() => {
            btn.innerText = "VYNUTIT ODESLÁNÍ 🚀";
            btn.style.background = "black";
            updateQueueUI();
            sync();
        }, 1000);
    }

    function saveData() { 
        const btn = document.getElementById('save-btn'); btn.disabled = true; btn.innerText = "ZAMĚŘUJI GPS...";
        navigator.geolocation.getCurrentPosition((pos) => { 
            const item = { worker: currentUser.name, place: document.getElementById('obj-label').innerText, note: document.getElementById('note').value, gps: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`, time: getNow(), id: Date.now() }; 
            let q = JSON.parse(localStorage.getItem('aqQ')) || []; q.push(item); localStorage.setItem('aqQ', JSON.stringify(q)); 
            let hist = JSON.parse(localStorage.getItem('aqHist')) || []; hist.unshift(item); localStorage.setItem('aqHist', JSON.stringify(hist.slice(0, 10)));
            renderHistory(); updateQueueUI();
            document.getElementById('ui-work').classList.add('hidden'); document.getElementById('note').value = ""; btn.disabled = false; btn.innerText = "🚀 ODESLAT DO ZÁZNAMŮ"; sync(); 
        }, () => { alert("GPS chyba!"); btn.disabled = false; btn.innerText = "🚀 ODESLAT DO ZÁZNAMŮ"; }, { enableHighAccuracy: true, timeout: 8000 }); 
    }

    async function sync() { 
        if (isSyncing || !navigator.onLine) return; 
        let q = JSON.parse(localStorage.getItem('aqQ')) || []; 
        if (q.length === 0) { isSyncing = false; updateQueueUI(); return; } 
        
        isSyncing = true; updateQueueUI();
        const item = q[0]; 
        let url = item.action === "completeTask" ? 
            `${SCRIPT_URL}?action=completeTask&worker=${encodeURIComponent(item.worker)}&place=${encodeURIComponent(item.place)}&status=${encodeURIComponent(item.status)}&time=${encodeURIComponent(item.time)}` :
            `${SCRIPT_URL}?worker=${encodeURIComponent(item.worker)}&place=${encodeURIComponent(item.place)}&note=${encodeURIComponent(item.note)}&gps=${encodeURIComponent(item.gps)}&time=${encodeURIComponent(item.time)}`;
        
        fetch(url, { mode: 'no-cors' }).then(() => { 
            let currentQ = JSON.parse(localStorage.getItem('aqQ')) || [];
            let filteredQ = currentQ.filter(obj => obj.id !== item.id);
            localStorage.setItem('aqQ', JSON.stringify(filteredQ));
            isSyncing = false;
            updateQueueUI();
            if (filteredQ.length > 0) setTimeout(sync, 800); 
        }).catch(() => { 
            isSyncing = false; 
            updateQueueUI(); 
        });
    }

    setInterval(sync, 15000); setInterval(checkTasks, 20000);
    window.onload = () => { 
        const saved = localStorage.getItem('loggedWorker'); 
        if (saved) { currentUser = JSON.parse(saved); showWork(); } 
        sync(); 
    };
</script>
</body>
</html>
