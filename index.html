<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM Control system</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1a1a1a; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; --navy: #000080; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); color: var(--text); text-align: center; -webkit-tap-highlight-color: transparent; }
        .card { background: var(--card); padding: 15px; margin-bottom: 10px; border: 1px solid #333; border-radius: 4px; }
        input, select, textarea, #task-text, .report-content, #boss-task-text { font-size: 20px !important; font-weight: bold; width: 100%; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; padding: 12px; margin: 5px 0; border-radius: 4px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #1a1a1a; border-top: 1px solid #333; display: flex; z-index: 1000; }
        .tab-btn { flex: 1; background: none; border: none; color: #777; font-weight: bold; font-size: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 2px; }
        .report-item { position: relative; background: #222; padding: 12px; margin-bottom: 8px; text-align: left; border: 1px solid #555; border-radius: 4px; }
        .report-meta { font-size: 14px; color: var(--danger); border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 6px; display: block; font-weight: bold; }
        .delete-btn-mini { position: absolute; top: 8px; right: 8px; width: 100px; height: 40px; background: #1a331a; border: 1px solid var(--success); display: flex; align-items: center; justify-content: center; touch-action: none; overflow: hidden; font-size: 11px; font-weight: bold; color: white; border-radius: 4px; }
        #flash-ok, #flash-error { position: fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; z-index:10000; }
        #flash-ok { background: var(--success); } #flash-error { background: var(--danger); }
        .btn { border: none; font-weight: bold; width: 100%; padding: 18px; font-size: 17px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; border-radius: 4px; }
        .btn-hold { position: relative; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.4); z-index: 1; }
        .slider-container { position: relative; width: 100%; height: 55px; border-radius: 30px; border: 2px solid var(--danger); background: #200; overflow: hidden; margin-top: 8px; user-select: none; }
        .slider-handle { position: absolute; left: 4px; top: 4px; width: 45px; height: 45px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; font-size: 22px; cursor: pointer; z-index: 10; transition: transform 0.1s; }
        .slider-text { line-height: 55px; font-size: 16px; font-weight: bold; pointer-events: none; z-index: 5; position: relative; }
        .slider-work { border-color: var(--primary); background: #001529; }
        .slider-work .slider-handle { background: var(--primary); }
        .slider-end { border-color: var(--danger); background: #220000; }
        .slider-end .slider-handle { background: var(--danger); }
        .slider-azor { border-color: var(--warning); background: #221a00; height: 60px; border-radius: 10px; margin-top: 15px; overflow: visible; }
        .slider-azor .slider-handle { background: none; border: none; width: 80px; height: 80px; top: -10px; left: -10px; font-size: 65px; display: flex; align-items: center; justify-content: center; }
        .slider-azor .slider-text { line-height: 60px; color: var(--warning); }
        table { width: 100%; font-size: 13px; margin-top: 8px; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: left; }
        .row-ok { color: var(--success) !important; font-weight: bold; }
        .hidden { display: none !important; }
        #photo-preview { max-width: 100%; max-height: 150px; margin-top: 10px; border: 1px solid #444; border-radius: 4px; display: none; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">

<div id="flash-ok"><svg width="120" height="120" fill="white" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></div>
<div id="flash-error"><svg width="120" height="120" fill="white" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>

<div class="tab-bar hidden" id="main-nav">
    <button class="tab-btn active" id="nav-op" onclick="showTab('operativa')">OPERATIVA</button>
    <button class="tab-btn" id="nav-com" onclick="showTab('komunikace')">KOMUNIKACE</button>
</div>

<div id="tab-operativa" class="hidden" style="padding-bottom:70px;">
    <textarea id="scan-note" placeholder="Poznámka ke skenu..."></textarea>
    <button class="btn" style="background:var(--navy);" onclick="startScanner()">QR SKEN BODU</button>
    <div id="cam-container" style="display:none; padding: 10px; background: #222; border-radius: 8px; margin-top: 10px;"><video id="video" style="width:100%; background:#000; border-radius:4px;"></video></div>
    <div class="slider-container slider-azor" id="azor-slider"><div class="slider-text">POTÁHNI PRO AZORA</div><div id="h-azor" class="slider-handle">🐕</div></div>
    <button id="az-stop" class="btn btn-hold hidden" style="background:#222; color:var(--warning); border:2px solid var(--warning);" ontouchstart="startHold(event, 'AZ_STOP', null, 3.33)" onmousedown="startHold(event, 'AZ_STOP', null, 3.33)" ontouchend="stopHold()" onmouseup="stopHold()"><div class="hold-progress" id="prog-az"></div><span id="az-timer">⏳ AZOR AKTIVNÍ (Podrž 3s)</span></button>
    <div class="slider-container" id="sos-slider"><div id="sos-text" class="slider-text">>>> SOS PŘEJETÍ >>></div><div id="h-sos" class="slider-handle">🆘</div></div>
    <div class="card" id="history-section"><table id="h-table"><tbody></tbody></table></div>
</div>

<div id="tab-komunikace" class="hidden" style="padding-bottom:70px;">
    <div class="card">
        <h3 style="margin-top:0;">📋 NÁSTĚNKA</h3>
        <div id="report-list" style="max-height: 400px; overflow-y:auto;"></div>
        <textarea id="new-report-text" placeholder="Zapsat na nástěnku..."></textarea>
        <button class="btn" style="background:var(--success);" onclick="addReport()">➕ PŘIDAT ZÁZNAM</button>
    </div>
    
    <div class="card">
        <h3 style="margin-top:0;">🛠 NAHLÁSIT ZÁVADU</h3>
        <textarea id="quick-msg" placeholder="Popis závady (Outlook)..."></textarea>
        <input type="file" id="photo-input" accept="image/*" capture="camera" style="display:none" onchange="previewPhoto(event)">
        <button class="btn" style="background:#444; font-size:14px; padding:10px;" onclick="document.getElementById('photo-input').click()">📸 VYFOTIT ZÁVADU</button>
        <img id="photo-preview" src="">
        <button class="btn" style="background:var(--navy); margin-top:10px;" onclick="sendDefect()">✉ ODESLAT HLÁŠENÍ</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    
    const MAPA_NAZVU = {
        "KB001":"ROZVADĚČ WELLNESS RM.010","KB002":"ROZVADĚČ WEL. OCHLAZOVÁK","KB003":"ROZVADĚČ U KOČÁRKÁRNA",
        "KB004":"ROZVODNA RS 1.1","KB005":"ROZVODNA RS 2.1","KB006":"KOTELNA","KB007":"VZT. BAZÉNOVÁ HALA",
        "KB008":"KGJ. NAŠE","KB009":"VZT. STŘECHA 1","KB010":"VZT. STŘECHA 2","KB011":"VZT. ADROŠ-VRCHNÍ JEDNOTKY",
        "KB012":"HLAVNÍ ROZVODNA","KB013":"BATERKÁRNA","KB014":"VZT. GASTRO","KB015":"ROZVODNA ADROŠ RM0.2",
        "KB016":"SCHNEIDER","KB017":"VZT ADROŠ-SPODNÍ JEDNOTKY","KB018":"ROZVADĚČ KAVÁRNA","KB019":"STROJOVNA VLNY, ATRAKCE",
        "KB020":"ROZVADĚČ RS3.1","KB021":"STROJOVNA ABYSS","KB022":"NOVÝ AREÁL KOTELNA","KB023":"NOVÝ AREÁL VZT",
        "KB024":"NOVÝ A. FILTRY","KB025":"NOVÝ A. STROJ. ČERPADLA","KB026":"JÍMKA PITNÉ VODY","KB027":"REWAT PLASTOVÁ JÍMKA",
        "KB028":"JÍMKA JEZERNÍ VODY","KB029":"ROZVODNA WELL. 2 NP","KB030":"KGJ E.ON","KB031":"VZT WELLNESS",
        "KB032":"TEPELKO","KB033":"OZONGENERÁTOR-ÚPRAVNA","KB034":"ROZVADĚČ RS 2.2","KB035":"ROZVADĚČ- CHODBA GASTRO",
        "KB036":"CHLOROVNA","KB037":"WELLNESS RS 0.3","KB038":"ZÁVLAHA STARÝ AREÁL","KB039":"VRT","KB040":"SHZ",
        "44":"ŠACHTA-U BURGERU","45":"ŠACHTA- U PARSHALLU","46":"ŠACHTA-U HRADU","47":"ŠACHTA-ROH ŘEKY",
        "48":"ŠACHTA-VEDLE MOSTU","49":"ŠACHTA POD H5","50":"STROJOVNA A","51":"STROJOVNA B",
        "52":"Tech. míst. Bečka","53":"STROJOVNA 2.60","54":"STŘECHA 1","55":"STŘECHA 2",
        "56":"STŘECHA 3","57":"ROZVODNA ABYSS","58":"SNĚŽNÁ-TECHNICKÁ MÍSTNOST","59":"TECHNICKÁ PANORAMA",
        "60":"PAROGENERÁTORY/ROZVADĚČ 2.NP","61":"TECHNICKÁ-CALDARIUM","62":"CHLOROVNA-NOVÝ AREÁL",
        "63":"ROZVADĚČ RM 4/1","64":"HL. ROZVODNA v NOVÉM AREÁLU","65":"FILTR E.ON V TUNELU"
    };
    const ALLOWED = Object.keys(MAPA_NAZVU);

    let tech = "", role = "", reader = null, azTimer = null, frozenLoc = "", audio = null, queue = [], history = [], processing = false, holdT = null, holdP = 0, currentPhoto = null;

    navigator.geolocation.watchPosition(p => frozenLoc = `${p.coords.latitude},${p.coords.longitude}`);
    window.addEventListener('online', processQueue);

    function initAudio() { if(!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); }
    function playOk() { if(!audio) return; let o = audio.createOscillator(); o.connect(audio.destination); o.frequency.setValueAtTime(800, audio.currentTime); o.start(); o.stop(audio.currentTime+0.1); }
    function playErr() { if(!audio) return; let o = audio.createOscillator(); o.type='sawtooth'; o.connect(audio.destination); o.frequency.setValueAtTime(150, audio.currentTime); o.start(); o.stop(audio.currentTime+0.5); }

    function showTab(t) { document.querySelectorAll('[id^="tab-"]').forEach(x=>x.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); if(t==='komunikace') loadReports(); }
    
    function checkAuth() { 
        let t = document.getElementById('tech-select').value, pInput = document.getElementById('tech-pin'), p = pInput.value, r = document.getElementById('role-select').value; 
        const PINS = {"Král":"2013","Vaibar":"2013","Janča":"2013","Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
        if (p.length === 4) { 
            if (PINS[t] === p) { tech = t; role = r; document.getElementById('login-card').classList.add('hidden'); document.getElementById('main-nav').classList.remove('hidden'); showTab('operativa'); history = JSON.parse(localStorage.getItem('h_'+tech)||'[]'); renderHistory(); setInterval(processQueue, 5000); } 
            else { pInput.value = ""; playErr(); } 
        } 
    }

    function addToQueue(type, code, msg = "", photo = null) {
        const ts = new Date().getTime(); 
        const item = { type, code, technician: tech, role: role, message: msg, location: "http://maps.google.com/?q="+frozenLoc, timestamp: ts, photoData: photo };
        queue.push(item); localStorage.setItem('q_'+tech, JSON.stringify(queue));
        if(type === 'scan') { history.push({ ts, code, status: 'ok', name: MAPA_NAZVU[code] || code }); localStorage.setItem('h_'+tech, JSON.stringify(history)); renderHistory(); }
        processQueue();
    }

    async function processQueue() {
        if (processing || !tech || !navigator.onLine || queue.length === 0) return; processing = true; 
        let p = queue[0];
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) });
            queue.shift(); localStorage.setItem('q_'+tech, JSON.stringify(queue));
        } catch (e) {}
        processing = false; if(queue.length > 0) setTimeout(processQueue, 500);
    }

    function renderHistory() { const b = document.querySelector("#h-table tbody"); b.innerHTML = ""; [...history].reverse().slice(0, 5).forEach(h => { b.innerHTML += `<tr><td>${new Date(h.ts).toLocaleTimeString()}</td><td>${h.name}</td><td>✔️</td></tr>`; }); }

    function startScanner() { if(!reader) reader = new ZXing.BrowserMultiFormatReader(); document.getElementById('cam-container').style.display='block'; reader.decodeFromVideoDevice(null,'video', res => { if(res){ let c = res.text.trim(); if(ALLOWED.includes(c)){ stopScanner(); playOk(); addToQueue('scan', c, ""); } } }); }
    function stopScanner() { if(reader) reader.reset(); document.getElementById('cam-container').style.display='none'; }

    // Mazání na nástěnce - krok 5 (100% / 5 = 20 kroků po 100ms = 2 sekundy)
    function startHold(e, v, id=null, step=5) { 
        e.preventDefault(); holdP = 0; 
        holdT = setInterval(() => { 
            holdP += step; 
            let pId = (v==='AZ_STOP'?'prog-az':(v==='RESOLVE'?'prog-res-'+id:'prog-clear'));
            let el = document.getElementById(pId); if(el) el.style.width = holdP + '%'; 
            if(holdP>=100) { clearInterval(holdT); if(v==='AZ_STOP') stopAzor(); else if(v==='RESOLVE') resolveReport(id); stopHold(); } 
        }, 100); 
    }
    function stopHold() { clearInterval(holdT); document.querySelectorAll('.hold-progress').forEach(x => x.style.width='0%'); }

    function previewPhoto(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            currentPhoto = e.target.result;
            document.getElementById('photo-preview').src = currentPhoto;
            document.getElementById('photo-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function sendDefect() {
        const m = document.getElementById('quick-msg').value.trim();
        if(!m) { alert("Popiš závadu!"); return; }
        addToQueue('message', 'ZÁVADA', m, currentPhoto);
        document.getElementById('quick-msg').value = "";
        document.getElementById('photo-preview').style.display = 'none';
        currentPhoto = null;
        alert("Odesláno na Outlook!");
    }

    async function addReport() { let m = document.getElementById('new-report-text').value.trim(); if(!m) return; await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'add_report', technician: tech, message: m }) }); document.getElementById('new-report-text').value=""; loadReports(); }
    async function loadReports() { const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'get_reports' }) }); const d = await resp.json(); let html = ""; d.reports.forEach(x => { html += `<div class="report-item"><span class="report-meta">Autor: ${x.author}</span><br>${x.text}<div class="delete-btn-mini btn-hold" ontouchstart="startHold(event,'RESOLVE',${x.id},5)" onmousedown="startHold(event,'RESOLVE',${x.id},5)" ontouchend="stopHold()" onmouseup="stopHold()"><div class="hold-progress" id="prog-res-${x.id}"></div>HOTOVO</div></div>`; }); document.getElementById('report-list').innerHTML = html; }
    async function resolveReport(id) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'resolve_report', rowId: id }) }); loadReports(); }

    function startAzor() { addToQueue('azor_start', 'AZOR', 'Start'); document.getElementById('az-stop').classList.remove('hidden'); }
    function stopAzor() { addToQueue('azor_stop', 'AZOR', 'Konec'); document.getElementById('az-stop').classList.add('hidden'); }

    function setupSlider(hId, sId, cb) { 
        const h = document.getElementById(hId), s = document.getElementById(sId); let d = false; 
        const mv = (cX) => { if(!d) return; let x = cX - s.getBoundingClientRect().left - 25; x = Math.max(5, Math.min(x, s.offsetWidth-55)); h.style.left = x+'px'; if(x > s.offsetWidth-60){ d=false; h.style.left='4px'; cb(); } }; 
        h.addEventListener('touchstart', () => d=true); h.addEventListener('mousedown', () => d=true);
        window.addEventListener('touchmove', e => mv(e.touches[0].clientX)); window.addEventListener('mousemove', e => mv(e.clientX));
        window.addEventListener('touchend', () => { d=false; h.style.left='4px'; }); window.addEventListener('mouseup', () => { d=false; h.style.left='4px'; });
    }
    setupSlider('h-sos','sos-slider',() => addToQueue('SOS','SOS', 'SOS ALARM!'));
</script>
</body>
</html>
