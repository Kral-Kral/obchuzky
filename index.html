<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8;
            --success: #10b981; --accent: #f59e0b; --text: #f8fafc;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; 
            padding: 0; margin: 0; min-height: 100vh;
        }
        .app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        header { text-align: left; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 26px; font-weight: 800; }
        h1 span { color: var(--primary); }
        
        #reader { 
            width: 100%; border-radius: 24px; background: #000; 
            min-height: 280px; overflow: hidden;
            border: 2px solid #334155; position: relative;
        }
        /* Oprava pro černé video - zajistí, že video vyplní kontejner */
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }

        .card {
            background: var(--card); border-radius: 24px; padding: 20px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            border: 1px solid rgba(255,255,255,0.05); margin-top: 20px;
        }
        .btn {
            border: none; padding: 18px; width: 100%; border-radius: 16px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(56,189,248,0.3); }
        .btn-success { background: var(--success); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        
        input, textarea {
            width: 100%; padding: 16px; margin: 12px 0;
            border: 2px solid #334155; border-radius: 14px;
            font-size: 18px; background: #0d1117; color: white; box-sizing: border-box;
        }
        .hidden { display: none !important; }
        #status-bar {
            margin-top: 15px; padding: 10px; border-radius: 12px;
            font-size: 13px; text-align: center; background: rgba(255,255,255,0.05);
            color: #94a3b8; width: 100%;
        }
        .user-badge { color: var(--primary); font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>AQ TECH <span>PRO</span></h1>
        <div id="logged-info" class="hidden">
            <span class="user-badge" id="active-user-name"></span>
        </div>
    </header>

    <div id="reader"></div>
    <div id="status-bar">Inicializace systému...</div>

    <div id="section-login" class="card">
        <button id="btn-auth" class="btn btn-primary" onclick="initScanner('login')">
            📷 SKENOVAT KARTU
        </button>
        <div id="auth-box" class="hidden">
            <h2 id="scanned-name" style="color: var(--primary); margin: 5px 0;"></h2>
            <input type="password" id="pin-input" placeholder="PIN" inputmode="numeric" maxlength="4">
            <button class="btn btn-success" onclick="confirmLogin()">PŘIHLÁSIT</button>
        </div>
    </div>

    <div id="section-work" class="card hidden">
        <button id="btn-scan-place" class="btn btn-primary" onclick="initScanner('work')">
            🔍 SKENOVAT MÍSTO
        </button>
        <div id="work-box" class="hidden">
            <div style="margin: 15px 0;">
                <small>Místo:</small>
                <div id="place-id" style="font-size: 22px; font-weight: 900;">---</div>
            </div>
            <textarea id="note-text" placeholder="Poznámka / závada..."></textarea>
            <button id="btn-send" class="btn btn-accent" onclick="submitData()">ODESLAT DATA</button>
        </div>
    </div>
</div>
