<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { 
            --bg: #121212; 
            --card: #1e1e1e; 
            --primary: #0a84ff; 
            --danger: #ff453a; 
            --warning: #ff9f0a; 
            --success: #32d74b; 
            --text: #ffffff; 
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 10px; 
            background: var(--bg); 
            color: var(--text); 
            text-align: center;
            font-size: 18px; /* Zvětšený základ */
        }

        .card { 
            background: var(--card); 
            padding: 25px 15px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 20px; 
            border: 1px solid #333; 
            width: 100%;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        h2 { font-size: 24px; margin-bottom: 20px; }

        #task-box { 
            background: #2c2c2e; 
            border: 3px solid var(--warning); 
            border-radius: 20px; 
            padding: 20px; 
            margin: 20px 0; 
            display: none; 
            text-align: left; 
        }

        #task-text { font-size: 20px; font-weight: bold; margin: 10px 0; }

        .task-btn-group { display: flex; gap: 15px; margin-top: 20px; }

        .btn-h, .btn-n { 
            padding: 20px; 
            flex: 1; 
            border-radius: 15px; 
            border:none; 
            color:white; 
            font-weight:bold; 
            font-size: 18px;
            cursor: pointer;
        }
        .btn-h { background: var(--success); }
        .btn-n { background: var(--danger); }

        select, input, textarea { 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0; 
            border: 2px solid #333; 
            border-radius: 15px; 
            font-size: 18px; 
            background: #2c2c2e; 
            color: #fff; 
            outline: none;
        }

        .btn { 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            padding: 22px; 
            font-size: 20px; 
            margin-bottom: 12px; 
        }

        .btn-scan { background: var(--primary); box-shadow: 0 4px 15px rgba(10, 132, 255, 0.3); }

        .btn-logout { 
            background: transparent; 
            border: 2px solid var(--danger); 
            color: var(--danger); 
            padding: 12px 20px; 
            font-size: 16px; 
            width: auto; 
            display: inline-flex; 
            margin-bottom: 20px; 
            border-radius: 12px;
        }

        .sos-container { 
            position: relative; 
            width: 100%; 
            height: 80px; 
            background: #251010; 
            border-radius: 40px; 
            margin-top: 25px; 
            overflow: hidden; 
            border: 3px solid var(--danger); 
        }

        .sos-text { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items:center; 
            color: var(--danger); 
            font-weight: bold; 
            font-size: 18px;
            pointer-events: none; 
        }

        .sos-handle { 
            position: absolute; 
            left: 5px; 
            top: 5px; 
            width: 66px; 
            height: 66px; 
            background: var(--danger); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 2; 
            font-size: 30px; 
            touch-action: none; 
        }

        #status { font-weight: bold; margin: 20px; color: var(--warning); font-size: 16px; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 16px; }
        td { padding: 15px 10px; border-bottom: 1px solid #333; text-align: left; }

        #flash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--success); display:none; justify-content:center; align-items:center; z-index:9999; color:white; font-size:120px; }
        .disabled { opacity: 0.15; pointer-events: none; }
        
        video { border-radius: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div id="flash">✅</div>

<div class="card">
    <button class="btn-logout" onclick="logout()">🔒 ODHLÁSIT / ZAMKNOUT</button>
    
    <select id="tech-select" onchange="checkAuth()">
        <option value="">-- Vyber pracovníka --</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
    </select>
    
    <input type="password" id="tech-pin" placeholder="Zadejte PIN" oninput="checkAuth()">
    
    <div id="task-box">
        <small style="color: var(--warning); font-weight: bold; text-transform: uppercase;">⚠️ Nový úkol:</small>
        <div id="task-text"></div>
        <div class="task-btn-group">
            <button class="btn-h" onclick="resolveTask('HOTOVO')">HOTOVO</button>
            <button class="btn-n" onclick="resolveTask('NELZE')">NELZE</button>
        </div>
    </div>

    <div id="controls" class="disabled">
        <div id="camera-container" style="display:none;">
            <video id="video" style="width:100%; background:#000;"></video>
            <button class="btn" onclick="stopScanner()" style="background:#444; border-radius:0 0 15px 15px; margin-top:-15px;">ZAVŘÍT KAMERU</button>
        </div>
        
        <input type="text" id="scan-note" placeholder="Poznámka ke skenu (volitelné)">
        
        <button class="btn btn-scan" onclick="startScanner()">
            📸 SKENOVAT QR KÓD
        </button>
        
        <div class="sos-container" id="sos-slider">
            <div class="sos-text">TAŽENÍM AKTIVUJ SOS >>></div>
            <div class="sos-handle" id="handle">🆘</div>
        </div>
    </div>
</div>

<div class="card">
    <textarea id="boss-msg" rows="3" placeholder="Zpráva pro dispečink..."></textarea>
    <button class="btn" onclick="sendQuickMsg()" style="background:#444;">✉ ODESLAT ZPRÁVU</button>
    <div id="status">SYSTÉM UZAMČEN</div>
    <table id="history-table"><tbody></tbody></table>
</div>

<div style="font-size: 12px; color: #555; margin: 20px 0;">v1.4.1 | AQM CONTROL PRO</div>

<script>
    // JS logika zůstává stejná jako v předchozí funkční verzi
    const PINS = {"Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    let selectedTech = "";
    let codeReader = new ZXing.BrowserMultiFormatReader();
    let lastLoc = "GPS: Zjišťování...";
    let queue = JSON.parse(localStorage.getItem('offlineQueue') || "[]");
    let audioCtx = null;
    let currentTask = "";

    navigator.geolocation.watchPosition((p) => { 
        lastLoc = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`; 
    }, null, { enableHighAccuracy: true });

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function playSound() {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = 880; g.gain.value = 0.1;
        o.start(); o.stop(audioCtx.currentTime + 0.3);
    }

    function checkAuth() {
        let t = document.getElementById('tech-select').value;
        if (PINS[t] === document.getElementById('tech-pin').value) {
            selectedTech = t;
            document.getElementById('controls').classList.remove('disabled');
            document.getElementById('status').innerText = "✅ PŘIPOJENO";
            setInterval(processQueue, 10000);
        }
    }

    function addToQueue(type, code, msg = "") {
        const item = {
            id: Date.now(),
            type: type,
            code: code,
            technician: selectedTech,
            message: msg || document.getElementById('scan-note').value,
            location: lastLoc,
            timestamp: new Date().toISOString()
        };
        queue.push(item);
        localStorage.setItem('offlineQueue', JSON.stringify(queue));
        processQueue();
    }

    function processQueue() {
        if (!selectedTech) return;
        if (queue.length === 0) {
            google.script.run.withSuccessHandler(res => {
                const r = JSON.parse(res);
                if (r.task && r.task !== currentTask) {
                    currentTask = r.task;
                    document.getElementById('task-text').innerText = r.task;
                    document.getElementById('task-box').style.display = 'block';
                    playSound();
                } else if (!r.task) {
                    document.getElementById('task-box').style.display = 'none';
                }
            }).checkTasks(selectedTech);
            return;
        }

        const item = queue[0];
        document.getElementById('status').innerText = "⏳ ODESÍLÁNÍ...";
        
        google.script.run.withSuccessHandler(res => {
            const r = JSON.parse(res);
            queue.shift();
            localStorage.setItem('offlineQueue', JSON.stringify(queue));
            document.getElementById('status').innerText = "✅ DATA ULOŽENA";
            updateTable(item, r.name);
            processQueue();
        }).doPost({postData: {contents: JSON.stringify(item)}});
    }

    function updateTable(item, serverName) {
        const row = `<tr><td>${new Date(item.timestamp).toLocaleTimeString()}</td><td><b>${serverName || item.code}</b></td></tr>`;
        document.querySelector("#history-table tbody").insertAdjacentHTML('afterbegin', row);
    }

    function startScanner() {
        document.getElementById('camera-container').style.display = 'block';
        codeReader.decodeFromVideoDevice(null, 'video', (res) => {
            if (res) {
                stopScanner();
                addToQueue('scan', res.text);
                document.getElementById('flash').style.display = 'flex';
                setTimeout(() => document.getElementById('flash').style.display='none', 600);
                document.getElementById('scan-note').value = "";
            }
        });
    }

    function stopScanner() { codeReader.reset(); document.getElementById('camera-container').style.display = 'none'; }
    function resolveTask(s) { addToQueue('task_response', s); document.getElementById('task-box').style.display = 'none'; currentTask = ""; }
    function sendQuickMsg() { const m = document.getElementById('boss-msg').value; if(m) { addToQueue('message', 'ZPRÁVA', m); document.getElementById('boss-msg').value = ""; } }
    function logout() { location.reload(); }

    const h = document.getElementById('handle'), s = document.getElementById('sos-slider');
    let drag = false; h.addEventListener('touchstart', () => { drag = true; initAudio(); });
    window.addEventListener('touchmove', (e) => {
        if (!drag) return; 
        let x = e.touches[0].clientX - s.getBoundingClientRect().left - 33;
        x = Math.max(5, Math.min(x, s.offsetWidth - 75)); 
        h.style.left = x + 'px';
        if (x > s.offsetWidth - 80) { drag = false; h.style.left = '5px'; addToQueue('SOS', 'SOS'); playSound(); }
    });
    window.addEventListener('touchend', () => { drag = false; h.style.left = '5px'; });
</script>
</body>
</html>
