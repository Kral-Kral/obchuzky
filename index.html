<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.3);
            --success: #10b981;
            --error: #f43f5e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), 
                              radial-gradient(circle at bottom left, #0f172a, transparent);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 440px; }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { 
            font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #sync-status {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid rgba(245, 158, 11, 0.3);
            backdrop-filter: blur(10px);
            display: none;
        }

        /* QR Scanner Frame */
        #reader {
            width: 100%;
            border-radius: 28px;
            background: #000;
            min-height: 280px;
            border: 2px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #status {
            margin: 15px 0;
            font-size: 14px;
            font-weight: 500;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Cards Style */
        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 24px;
            margin-top: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Buttons */
        .btn {
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: #020617;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-primary:active { transform: scale(0.96); box-shadow: 0 0 5px var(--primary-glow); }

        .btn-success { background: var(--success); color: white; margin-top: 15px; }

        .btn-logout {
            background: rgba(244, 63, 94, 0.1);
            color: var(--error);
            border: 1px solid rgba(244, 63, 94, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Inputs */
        input, textarea {
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.6);
            color: white;
            border: 1px solid var(--border);
            font-size: 17px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
        }

        /* Info Tags */
        .user-tag {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .object-display {
            background: rgba(56, 189, 248, 0.1);
            padding: 20px;
            border-radius: 20px;
            margin: 15px 0;
            border-left: 4px solid var(--primary);
        }

        .object-display small { color: var(--text-dim); display: block; margin-bottom: 5px; font-weight: 600; }
        .object-display div { font-size: 24px; font-weight: 800; color: var(--text-main); }

        /* History */
        .history-section { margin-top: 25px; width: 100%; }
        .history-section h3 { font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-left: 10px; }
        
        .history-list { margin-top: 10px; }
        .history-item {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item .info b { display: block; font-size: 15px; color: var(--primary); }
        .history-item .info span { font-size: 12px; color: var(--text-dim); }
        .history-item .status { font-size: 10px; background: rgba(16, 185, 129, 0.2); color: var(--success); padding: 4px 8px; border-radius: 8px; font-weight: 700; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>AQ TECH <span style="font-weight: 300;">PRO</span></h1>
    </header>

    <div id="sync-status">⏳ AKTUALIZACE DATABÁZE...</div>

    <div id="reader"></div>
    <div id="status">SYSTÉM PŘIPRAVEN</div>

    <div id="sec-login" class="card">
        <button class="btn btn-primary" onclick="startCamera('login')">
            <span style="font-size: 20px;">📷</span> PŘIHLÁSIT TECHNIKA
        </button>
        <div id="ui-login" class="hidden">
            <div style="margin-top:20px; text-align:center;">
                <small style="color:var(--text-dim)">VÍTEJTE,</small>
                <h2 id="worker-label" style="margin:5px 0 20px 0; color:var(--primary)"></h2>
            </div>
            <input type="password" id="pin" placeholder="Zadejte PIN" inputmode="numeric" maxlength="4">
            <button class="btn btn-success" onclick="verifyLogin()">POTVRDIT PŘÍSTUP</button>
        </div>
    </div>

    <div id="sec-work" class="hidden" style="width: 100%;">
        <div class="card">
            <div class="user-tag">
                <div>
                    <small style="color:var(--text-dim); display:block;">TECHNIK</small>
                    <span id="logged-name" style="font-weight: 700; font-size: 18px;">---</span>
                </div>
                <button class="btn-logout" onclick="logout()">ODHLÁSIT</button>
            </div>
            
            <button class="btn btn-primary" onclick="startCamera('work')">
                <span style="font-size: 20px;">🔍</span> SKENOVAT OBJEKT
            </button>
            
            <div id="ui-work" class="hidden">
                <div class="object-display">
                    <small>IDENTIFIKOVANÝ OBJEKT</small>
                    <div id="obj-label">---</div>
                </div>
                <textarea id="note" placeholder="Poznámka k servisu / závada..."></textarea>
                <button class="btn btn-success" id="save-btn" onclick="saveData()">🚀 ULOŽIT DO SYSTÉMU</button>
            </div>
        </div>

        <div class="history-section">
            <h3>Poslední aktivita</h3>
            <div id="history-list" class="history-list">
                </div>
        </div>
    </div>

    <footer style="margin-top: 30px; text-align: center; opacity: 0.5; font-size: 11px;">
        AQ TECH PRO • v2026.NEXT • CLOUD SYNC ACTIVE
    </footer>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNf2EgoBJOUWvKflRisSFfQt6L2JivO3Lcw53amT7WcTTwgNBeQi9awfpzEXErjAI/exec";
    const EMPLOYEES = { "T01": { name: "Jiří Bělíček", pin: "5481" }, "T02": { name: "Dalibor Čech", pin: "2368" }, "T03": { name: "René Russwurm st.", pin: "1798" }, "T04": { name: "René Russwurm ml.", pin: "2849" }, "T05": { name: "Roman Zámečník", pin: "6984" }, "T06": { name: "Marek Slovák", pin: "1179" }, "T07": { name: "Martin Kuneš", pin: "2538" }, "T08": { name: "David Mirvald", pin: "1099" }, "T09": { name: "Petr Illa", pin: "7923" }, "T10": { name: "Mirek Švarný", pin: "1739" }, "T11": { name: "Lukáš Sem", pin: "4197" }, "T12": { name: "Laďa Poledna", pin: "5592" } };

    let currentUser = null;
    let currentPlace = "";
    let html5QrCode = new Html5Qrcode("reader");

    function playSuccessSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } catch (e) {}
    }

    window.onload = () => {
        const saved = localStorage.getItem('loggedWorker');
        if (saved) { currentUser = JSON.parse(saved); showWork(); }
        sync(); renderHistory();
    };

    async function startCamera(mode) {
        try {
            if (html5QrCode.getState() !== 1) { await html5QrCode.stop().catch(() => {}); }
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
                playSuccessSound();
                if (navigator.vibrate) navigator.vibrate(100);
                if (mode === 'login') {
                    if (EMPLOYEES[txt]) {
                        currentUser = EMPLOYEES[txt];
                        document.getElementById('worker-label').innerText = currentUser.name;
                        document.getElementById('ui-login').classList.remove('hidden');
                        document.getElementById('pin').focus();
                        html5QrCode.stop();
                    }
                } else {
                    currentPlace = txt;
                    document.getElementById('obj-label').innerText = txt;
                    document.getElementById('ui-work').classList.remove('hidden');
                    document.getElementById('note').focus();
                    html5QrCode.stop();
                }
            });
            document.getElementById('status').innerText = "SKENUJTE QR KÓD";
        } catch (e) { alert("Chyba kamery! Povolte přístup."); }
    }

    function verifyLogin() {
        if (document.getElementById('pin').value === currentUser.pin) {
            localStorage.setItem('loggedWorker', JSON.stringify(currentUser));
            showWork();
        } else { alert("NEPLATNÝ PIN"); document.getElementById('pin').value = ""; }
    }

    function showWork() {
        document.getElementById('sec-login').classList.add('hidden');
        document.getElementById('sec-work').classList.remove('hidden');
        document.getElementById('logged-name').innerText = currentUser.name;
        document.getElementById('status').innerText = "AUTORIZOVÁNO";
        renderHistory();
    }

    function logout() { localStorage.removeItem('loggedWorker'); location.reload(); }

    function saveData() {
        const note = document.getElementById('note').value;
        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.innerText = "ZÍSKÁVÁM POLOHU...";

        navigator.geolocation.getCurrentPosition((pos) => {
            const gps = pos.coords.latitude.toFixed(6) + "," + pos.coords.longitude.toFixed(6);
            const time = new Date().toLocaleString("cs-CZ");
            let q = JSON.parse(localStorage.getItem('aqQ')) || [];
            q.push({ worker: currentUser.name, place: currentPlace, note, gps, time });
            localStorage.setItem('aqQ', JSON.stringify(q));
            
            document.getElementById('ui-work').classList.add('hidden');
            document.getElementById('note').value = "";
            btn.disabled = false; btn.innerText = "🚀 ULOŽIT DO SYSTÉMU";
            sync();
        }, () => { alert("GPS chyba!"); btn.disabled = false; }, { enableHighAccuracy: true });
    }

    async function sync() {
        let q = JSON.parse(localStorage.getItem('aqQ')) || [];
        const s = document.getElementById('sync-status');
        if (q.length === 0) { s.style.display = 'none'; return; }
        
        s.style.display = 'block'; s.innerText = `🔄 ODESÍLÁNÍ DATA (${q.length})`;
        const i = q[0];
        const url = `${SCRIPT_URL}?worker=${encodeURIComponent(i.worker)}&place=${encodeURIComponent(i.place)}&note=${encodeURIComponent(i.note)}&gps=${encodeURIComponent(i.gps)}&time=${encodeURIComponent(i.time)}`;
        
        try {
            await fetch(url, { mode: 'no-cors' });
            let hist = JSON.parse(localStorage.getItem('aqHist')) || [];
            hist.unshift(i);
            localStorage.setItem('aqHist', JSON.stringify(hist.slice(0, 10)));
            q.shift(); localStorage.setItem('aqQ', JSON.stringify(q));
            renderHistory(); sync();
        } catch (e) { s.innerText = `⚠️ OFFLINE REŽIM (${q.length})`; }
    }

    function renderHistory() {
        const hist = JSON.parse(localStorage.getItem('aqHist')) || [];
        const container = document.getElementById('history-list');
        if (hist.length === 0) { container.innerHTML = "<div style='text-align:center; color:var(--text-dim); padding:20px;'>Žádná nedávná aktivita</div>"; return; }
        container.innerHTML = hist.map(h => `
            <div class="history-item">
                <div class="info">
                    <b>${h.place}</b>
                    <span>${h.time.split(',')[1]}</span>
                </div>
                <div class="status">ODESLÁNO</div>
            </div>
        `).join('');
    }

    window.addEventListener('online', sync);
</script>
</body>
</html>
