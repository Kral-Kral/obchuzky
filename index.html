<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        #reader { width: 100%; border-radius: 20px; background: #000; min-height: 300px; border: 2px solid #334155; overflow: hidden; }
        /* Klíčové pro zobrazení videa */
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: #000; }
        .hidden { display: none !important; }
        #error-log { color: #ff4444; font-size: 12px; margin-top: 10px; text-align: center; background: rgba(255,0,0,0.1); border-radius: 10px; padding: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center">AQ TECH <span>PRO</span></h1>
    
    <div id="reader"></div>
    <div id="error-log" class="hidden"></div>

    <div id="sec-login" class="card">
        <button class="btn btn-primary" onclick="startCamera('login')">ZAPNOUT SKENER</button>
        <div id="auth-box" class="hidden">
            <h2 id="worker-name" style="color: var(--primary)"></h2>
            <input type="password" id="pin-field" placeholder="PIN" inputmode="numeric" style="width:100%; padding:15px; font-size:20px; border-radius:10px; margin:10px 0;">
            <button class="btn" style="background:#10b981; color:white;" onclick="login()">PŘIHLÁSIT</button>
        </div>
    </div>

    <div id="sec-work" class="card hidden">
        <button class="btn btn-primary" onclick="startCamera('work')">SKENOVAT OBJEKT</button>
        <div id="work-box" class="hidden">
            <p
