<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); text-align: center; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #333; }
        #task-box { background: #2c2c2e; border: 2px solid var(--warning); border-radius: 15px; padding: 15px; margin: 15px 0; display: none; text-align: left; }
        .task-btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-h { background: var(--success); padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; }
        .btn-n { background: var(--danger); padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; }
        select, input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #333; border-radius: 12px; font-size: 16px; background: #2c2c2e; color: #fff; box-sizing: border-box; }
        .btn { border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 18px; font-size: 17px; margin-bottom: 10px; }
        .btn-scan { background: var(--primary); }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px; font-size: 13px; width: auto; display: inline-flex; margin-bottom: 15px; }
        .sos-container { position: relative; width: 100%; height: 70px; background: #251010; border-radius: 35px; margin-top: 20px; overflow: hidden; border: 2px solid var(--danger); }
        .sos-text { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items:center; color: var(--danger); font-weight: bold; pointer-events: none; }
        .sos-handle { position: absolute; left: 5px; top: 5px; width: 60px; height: 60px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; font-size: 24px; touch-action: none; }
        #status { font-weight: bold; margin: 15px; color: var(--warning); font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        td { padding: 10px 8px; border-bottom: 1px solid #222; text-align: left; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--success); display:none; justify-content:center; align-items:center; z-index:9999; color:white; font-size:100px; }
        .disabled { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>
<div id="flash">✅</div>
<div class="card">
    <button class="btn-logout" onclick="logout()">🔒 ODHLÁSIT</button>
    <select id="tech-select" onchange="checkAuth()">
        <option value="">-- Vyber pracovníka --</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
    </select>
    <input type="password" id="tech-pin" placeholder="PIN" oninput="checkAuth()">
    
    <div id="task-box">
        <small style="color: var(--warning);">ÚKOL:</small>
        <div id="task-text" style="font-weight: bold; margin-top: 5px;"></div>
        <div class="task-btn-group">
            <button class="btn-h" onclick="resolveTask('HOTOVO')">HOTOVO</button>
            <button class="btn-n" onclick="resolveTask('NELZE')">NELZE</button>
        </div>
    </div>

    <div id="controls" class="disabled">
        <div id="camera-container" style="display:none; border-radius:15px; overflow:hidden; border:2px solid var(--primary); margin-bottom:10px;">
            <video id="video" style="width:100%; background:#000;"></video>
            <button class="btn" onclick="stopScanner()" style="background:#444; margin:0; border-radius:0;">ZAVŘÍT</button>
        </div>
        <input type="text" id="scan-note" placeholder="Poznámka...">
        <button class="btn btn-scan" onclick="startScanner()">QR SKEN BODU</button>
        <div class="sos-container" id="sos-slider">
            <div class="sos-text">PŘETÁHNI PRO SOS >>></div>
            <div class="sos-handle" id="handle">🆘</div>
        </div>
    </div>
</div>

<div class="card">
    <textarea id="boss-msg" placeholder="Zpráva pro vedení..."></textarea>
    <button class="btn" onclick="sendQuickMsg()" style="background:#444;">✉ ODESLAT</button>
    <div id="status">SYSTÉM UZAMČEN</div>
    <table id="history-table"><tbody></tbody></table>
</div>

<div style="font-size: 10px; color: #444;">v1.4.0 | AQM CONTROL PRO</div>

<script>
    const PINS = {"Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    let selectedTech = "";
    let codeReader = new ZXing.BrowserMultiFormatReader();
    let lastLoc = "GPS: Nenalezeno";
    let queue = JSON.parse(localStorage.getItem('offlineQueue') || "[]");
    let audioCtx = null;
    let currentTask = "";

    navigator.geolocation.watchPosition((p) => { 
        lastLoc = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`; 
    }, null, { enableHighAccuracy: true });

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function playSound() {
        initAudio();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = 880; g.gain.value = 0.1;
        o.start(); o.stop(audioCtx.currentTime + 0.2);
    }

    function checkAuth() {
        let t = document.getElementById('tech-select').value;
        if (PINS[t] === document.getElementById('tech-pin').value) {
            selectedTech = t;
            document.getElementById('controls').classList.remove('disabled');
            document.getElementById('status').innerText = "PŘIPOJENO";
            setInterval(processQueue, 10000); // Každých 10s zkus odeslat a zkontrolovat úkoly
        }
    }

    function addToQueue(type, code, msg = "") {
        const item = {
            id: Date.now(),
            type: type,
            code: code,
            technician: selectedTech,
            message: msg || document.getElementById('scan-note').value,
            location: lastLoc,
            timestamp: new Date().toISOString()
        };
        queue.push(item);
        localStorage.setItem('offlineQueue', JSON.stringify(queue));
        processQueue();
    }

    function processQueue() {
        if (!selectedTech) return;
        
        // Pokud je fronta prázdná, aspoň kontrolujeme úkoly
        if (queue.length === 0) {
            google.script.run.withSuccessHandler(res => {
                const r = JSON.parse(res);
                if (r.task && r.task !== currentTask) {
                    currentTask = r.task;
                    document.getElementById('task-text').innerText = r.task;
                    document.getElementById('task-box').style.display = 'block';
                    playSound();
                } else if (!r.task) {
                    document.getElementById('task-box').style.display = 'none';
                }
            }).checkTasks(selectedTech);
            return;
        }

        const item = queue[0];
        document.getElementById('status').innerText = "⏳ SYNCHRONIZACE...";
        
        google.script.run.withSuccessHandler(res => {
            const r = JSON.parse(res);
            queue.shift();
            localStorage.setItem('offlineQueue', JSON.stringify(queue));
            document.getElementById('status').innerText = "✅ OK";
            updateTable(item, r.name);
            processQueue(); // Zkus další v pořadí
        }).doPost({postData: {contents: JSON.stringify(item)}});
    }

    function updateTable(item, serverName) {
        const row = `<tr><td>${new Date(item.timestamp).toLocaleTimeString()}</td><td>${serverName || item.code}</td></tr>`;
        document.querySelector("#history-table tbody").insertAdjacentHTML('afterbegin', row);
    }

    function startScanner() {
        document.getElementById('camera-container').style.display = 'block';
        codeReader.decodeFromVideoDevice(null, 'video', (res) => {
            if (res) {
                stopScanner();
                addToQueue('scan', res.text);
                document.getElementById('flash').style.display = 'flex';
                setTimeout(() => document.getElementById('flash').style.display='none', 600);
                document.getElementById('scan-note').value = "";
            }
        });
    }

    function stopScanner() { codeReader.reset(); document.getElementById('camera-container').style.display = 'none'; }
    function resolveTask(s) { addToQueue('task_response', s); document.getElementById('task-box').style.display = 'none'; currentTask = ""; }
    function sendQuickMsg() { const m = document.getElementById('boss-msg').value; if(m) { addToQueue('message', 'ZPRÁVA', m); document.getElementById('boss-msg').value = ""; } }
    function logout() { location.reload(); }

    const h = document.getElementById('handle'), s = document.getElementById('sos-slider');
    let drag = false; h.addEventListener('touchstart', () => { drag = true; initAudio(); });
    window.addEventListener('touchmove', (e) => {
        if (!drag) return; let x = e.touches[0].clientX - s.getBoundingClientRect().left - 30;
        x = Math.max(5, Math.min(x, s.offsetWidth - 65)); h.style.left = x + 'px';
        if (x > s.offsetWidth - 70) { drag = false; h.style.left = '5px'; addToQueue('SOS', 'SOS'); }
    });
    window.addEventListener('touchend', () => { drag = false; h.style.left = '5px'; });
</script>
</body>
</html>
