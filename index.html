<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 28px; padding: 30px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; }
        #reader, #reader-point { width: 100% !important; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 20px; min-height: 300px; border: 2px solid var(--primary); }
        .input-box { background: #f1f5f9; border-radius: 15px; padding: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; margin-top: 10px; }
        .icon-btn { background: var(--primary); color: white; border: none; border-radius: 12px; width: 48px; height: 48px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5); }
        input { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 24px; text-align: center; margin-top: 15px; background: #fff; }
        button.confirm-btn { width: 100%; padding: 20px; background: #10b981; color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .hidden { display: none !important; }
        label { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="login-screen">
        <h2 style="margin: 0 0 25px 0; font-size: 26px;">Control <span style="color:var(--primary)">PRO</span></h2>
        
        <div id="reader"></div>
        
        <div style="text-align: left;">
            <label>PRACOVNÍK / TECHNIK</label>
            <div class="input-box">
                <span id="worker-name" style="font-weight: 600;">Naskenujte ID kartu</span>
                <button class="icon-btn" onclick="startScan('reader', onWorkerScan)">👤</button>
            </div>
        </div>

        <div id="pin-area" class="hidden">
            <input type="password" id="pin-input" placeholder="****" inputmode="numeric">
            <button class="confirm-btn" onclick="checkPin()">PŘIHLÁSIT SE</button>
        </div>
    </div>

    <div class="card hidden" id="main-screen">
        <h3 id="active-user" style="color:var(--primary); margin-top:0;"></h3>
        <div id="reader-point" class="hidden"></div>
        
        <div style="text-align: left;">
            <label>KONTROLNÍ BOD</label>
            <div class="input-box">
                <span id="point-name" style="font-weight: 600;">Naskenujte kód bodu</span>
                <button class="icon-btn" onclick="startScan('reader-point', onPointScan)">📍</button>
            </div>
        </div>
        
        <button class="confirm-btn" onclick="saveData()">ULOŽIT ZÁZNAM</button>
    </div>
</div>
