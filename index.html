<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM Control system</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); text-align: center; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        
        #login-card select, #login-card input { padding: 22px; font-size: 20px; margin: 15px 0; border-radius: 15px; border: 1px solid #444; }
        
        #flash-ok, #flash-error { position: fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; z-index:10000; }
        #flash-ok { background: var(--success); } #flash-error { background: var(--danger); }
        .flash-svg { width: 150px; height: 150px; fill: white; }

        #report-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 20000; display:none; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .report-item { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: left; border-left: 4px solid var(--primary); }
        
        /* VELKÉ TEXTY */
        #new-report-text, #quick-msg, #scan-note, #boss-task-text { font-size: 22px; font-weight: bold; }
        #task-text { font-size: 24px; font-weight: 900; color: var(--warning); }
        #az-timer { font-size: 50px; font-weight: 900; display: block; margin: 10px 0; }

        .btn { border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; color: white; padding: 18px; font-size: 18px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-hold { position: relative; overflow: hidden; touch-action: none; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.4); }
        
        input, select, textarea { width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        
        .slider-container { position: relative; width: 100%; height: 65px; border-radius: 35px; border: 2px solid var(--danger); background: #200; overflow: hidden; margin-top: 10px; }
        .slider-handle { position: absolute; left: 5px; top: 5px; width: 55px; height: 55px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; font-size: 26px; }
        .slider-text { line-height: 65px; font-size: 19px; font-weight: 900; pointer-events: none; text-transform: uppercase; }

        /* HISTORIE - BAREVNÁ (ZELENÁ OK / ČERVENÁ ČEKÁ) */
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: left; }
        .row-ok { color: var(--success) !important; font-weight: bold; }
        .row-wait { color: var(--danger) !important; font-weight: bold; }
        .hidden { display: none !important; }
        #status-area { display: flex; justify-content: center; align-items: center; gap: 10px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">

<div id="flash-ok"><svg class="flash-svg" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></div>
<div id="flash-error"><svg class="flash-svg" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>

<div id="report-modal">
    <h3>📋 NÁSTĚNKA</h3>
    <div id="report-list" style="flex:1; overflow-y:auto; color:white;"></div>
    <textarea id="new-report-text" placeholder="Zapsat vzkaz..."></textarea>
    <button class="btn" style="background:var(--success);" onclick="addReport()">➕ PŘIDAT</button>
    <button class="btn" style="background:#444;" onclick="toggleReports(false)">ZAVŘÍT</button>
</div>

<div class="card" id="login-card">
    <h2 style="color:var(--primary);">AQM Control system</h2>
    <span class="app-version">v3.0.0</span>
    <select id="role-select">
        <option value="">-- VYBER ROLI --</option>
        <option value="Tech. velká strojovna">Tech. velká strojovna</option>
        <option value="Technolog wellness">Technolog wellness</option>
        <option value="Technolog - Nový areál">Technolog - Nový areál</option>
        <option value="Údržba">Údržba</option>
        <option value="VEDOUCÍ">VEDOUCÍ (Admin)</option>
    </select>
    <select id="tech-select" onchange="document.getElementById('auth-section').classList.remove('hidden')">
        <option value="">-- VYBER JMÉNO --</option>
        <optgroup label="VEDENÍ"><option value="Král">Král</option><option value="Vaibar">Vaibar</option><option value="Janča">Janča</option></optgroup>
        <optgroup label="TECHNOLOGOVÉ">
            <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
        </optgroup>
    </select>
    <div id="auth-section" class="hidden"><input type="password" id="tech-pin" placeholder="PIN" oninput="checkAuth()"></div>
</div>

<div class="card hidden" id="boss-card">
    <h3 style="color:var(--success);">⭐ PANEL VEDOUCÍHO</h3>
    <button class="btn" style="background:var(--primary);" onclick="toggleReports(true)">📋 OTEVŘÍT NÁSTĚNKU</button>
    <select id="target-tech">
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
    </select>
    <textarea id="boss-task-text" placeholder="Zadej úkol..."></textarea>
    <button class="btn" style="background:var(--success);" onclick="submitBossTask()">🚀 ODESLAT ÚKOL</button>
    <button onclick="location.reload()" style="background:none; border:none; color:red; margin-top:20px; font-weight:bold;">ODHLÁSIT</button>
</div>

<div class="card hidden" id="main-card">
    <button class="btn" style="background:var(--primary);" onclick="toggleReports(true)">📋 NÁSTĚNKA</button>
    
    <div id="task-box">
        <div id="task-text"></div>
        <button class="btn" style="background:var(--primary);" id="btn-ack" onclick="ackTask()">ROZUMÍM (2H)</button>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-hold" style="background:#1a5c27;" ontouchstart="startHold(event, 'HOTOVO', null, 3.33)" ontouchend="stopHold()"><div class="hold-progress" id="prog-h"></div>HOTOVO</button>
            <button class="btn btn-hold" style="background:#7a1a14;" ontouchstart="startHold(event, 'NELZE', null, 3.33)" ontouchend="stopHold()"><div class="hold-progress" id="prog-n"></div>NELZE</button>
        </div>
    </div>

    <div class="card" style="border:1px solid var(--primary); background:#222;">
        <div id="work-status" style="font-weight:bold; color:var(--primary); margin-bottom:10px;">PŘIPRAVEN</div>
        <div class="slider-container slider-work" id="work-slider"><div class="slider-text">>>> START PRÁCE >>></div><div id="h-work" class="slider-handle">🚩</div></div>
        <button id="btn-work-end" class="btn hidden" style="background:var(--danger); margin-top:10px;" onclick="handleWork('end')">🏁 KONEC PRÁCE</button>
    </div>
    
    <textarea id="scan-note" placeholder="Poznámka ke skenu..."></textarea>
    <button class="btn" style="background:var(--success);" onclick="startScanner()">QR SKEN BODU</button>
    <div id="cam-container" style="display:none;"><video id="video" style="width:100%; border-radius:15px; background:#000;"></video><button class="btn" style="background:var(--danger); margin-top:10px;" onclick="stopScanner()">✖ ZAVŘÍT</button></div>

    <button id="deadman-btn" class="btn" style="background:var(--warning); color:#000;" onclick="showAzor()">🐕 AZOR</button>
    <div id="azor-setup" style="display:none;" class="card">
        <input type="range" min="1" max="60" value="15" oninput="document.getElementById('az-val').value=this.value">
        <input type="number" id="az-val" value="15" style="font-size:30px; text-align:center; background:#000; border:2px solid var(--success); width:120px;"> min.
        <button class="btn" style="background:var(--success);" onclick="startAzor()">START</button>
        <button class="btn" style="background:#444;" onclick="hideAzor()">ZAVŘÍT</button>
    </div>
    <button id="az-stop" class="btn btn-hold hidden" style="border:3px solid var(--warning); height: 130px;" ontouchstart="startHold(event, 'AZ_STOP', null, 3.33)" ontouchend="stopHold()">
        <div class="hold-progress" id="prog-az"></div>
        <div style="z-index:10;"><span id="az-timer">⏳ --:--</span></div>
    </button>
    
    <textarea id="quick-msg" placeholder="Telegram..."></textarea>
    <button class="btn" style="background:#444;" onclick="sendQuickMsg()">✉ ODESLAT</button>

    <div class="slider-container" id="sos-slider"><div class="slider-text">SOS PŘEJETÍ</div><div id="h-sos" class="slider-handle">🆘</div></div>
    <div class="slider-container" id="call-slider" style="border-color:#fff;"><div class="slider-text">VOLAT 112</div><div id="h-call" class="slider-handle" style="background:#fff;">📞</div></div>
</div>

<div class="card hidden" id="history-section">
    <div id="status-area" onclick="processQueue()"><div id="status" style="color:var(--success); font-weight:bold;">ONLINE</div><div id="queue-count" class="hidden">0</div></div>
    <table id="h-table"><tbody></tbody></table>
    <button onclick="clearHistory()" style="font-size:10px; color:#555; background:none; border:none; margin-top:10px;">SMAZAT HISTORII</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    const PINS = {"Král":"2013","Vaibar":"2013","Janča":"2013","Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    const ALLOWED = ["KB001", "KB002", "KB003", "KB004", "KB005", "KB006", "KB007", "KB008", "KB009", "KB010", "KB011", "KB012", "KB013", "KB014", "KB015", "KB016", "KB017", "KB018", "KB020", "KB021", "KB022", "KB023", "KB024", "KB025", "KB026", "KB027", "KB028", "KB029", "KB030", "KB031", "KB032", "KB033", "KB034", "KB035", "KB036", "KB037", "KB038", "KB039", "KB040", "KB044", "KB045", "KB046", "KB047", "KB048", "KB049", "KB050", "KB051", "KB052", "KB053", "KB054", "KB055", "KB056", "KB057", "KB058"];
    
    let tech = "", role = "", reader = new ZXing.BrowserMultiFormatReader(), azTimer = null, frozenLoc = "", audio = null, queue = [], history = [], processing = false, holdT = null, holdP = 0, lastTask = "", isSiren = false, batt = "??", snooze = 0;

    // GPS A BATERKA
    navigator.geolocation.watchPosition(p => frozenLoc = `${p.coords.latitude},${p.coords.longitude}`);
    if(navigator.getBattery) navigator.getBattery().then(b => batt = Math.floor(b.level * 100));

    function initAudio() { if(!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); }
    function playOk() { initAudio(); let o=audio.createOscillator(); let g=audio.createGain(); o.connect(g); g.connect(audio.destination); o.frequency.setValueAtTime(800, audio.currentTime); g.gain.setValueAtTime(0.1, audio.currentTime); o.start(); o.stop(audio.currentTime+0.1); }
    function playErr() { initAudio(); let o=audio.createOscillator(); o.type='sawtooth'; o.connect(audio.destination); o.frequency.setValueAtTime(150, audio.currentTime); o.start(); o.stop(audio.currentTime+0.5); }
    function startAlarm() { if(isSiren) return; isSiren=true; const loop=()=>{ if(!isSiren) return; playOk(); setTimeout(loop, 1500); }; loop(); }

    function checkAuth() {
        let t = document.getElementById('tech-select').value, r = document.getElementById('role-select').value, p = document.getElementById('tech-pin').value;
        if (PINS[t] === p && r !== "") { 
            tech = t; role = r; document.getElementById('login-card').classList.add('hidden'); 
            if (r === "VEDOUCÍ") document.getElementById('boss-card').classList.remove('hidden'); 
            else { 
                document.getElementById('main-card').classList.remove('hidden'); document.getElementById('history-section').classList.remove('hidden'); 
                history = JSON.parse(localStorage.getItem('h_'+tech)||'[]'); queue = JSON.parse(localStorage.getItem('q_'+tech)||'[]');
                renderHistory(); updateQueueUI(); setInterval(processQueue, 5000);
                const savedAz = localStorage.getItem('azor_end'); if(savedAz) resumeAzor(parseInt(savedAz));
            }
        }
    }

    function addToQueue(type, code, msg = "") {
        const ts = new Date().toISOString(); 
        const loc = "https://www.google.com/maps?q="+frozenLoc;
        let pText = msg; if (type === 'scan') pText = document.getElementById('scan-note').value.trim();
        const item = { type, code, technician: tech, role: role, message: pText, location: loc, timestamp: ts, battery: batt };
        
        if (type === 'azor_start') item.endTime = Date.now() + (parseInt(document.getElementById('az-val').value)*60*1000);

        queue.push(item); localStorage.setItem('q_'+tech, JSON.stringify(queue));
        updateQueueUI();
        
        if(type !== 'check' && type !== 'task_response') {
            history.push({ ts, code, status: 'wait', name: code });
            localStorage.setItem('h_'+tech, JSON.stringify(history)); renderHistory();
            if(type==='scan') { playOk(); document.getElementById('scan-note').value=""; document.getElementById('flash-ok').style.display='flex'; setTimeout(()=>document.getElementById('flash-ok').style.display='none', 1200); }
        }
        processQueue();
    }

    async function processQueue() {
        if (processing || !tech || role === "VEDOUCÍ") return;
        processing = true;
        let p = queue.length > 0 ? queue[0] : { type: 'check', technician: tech };
        try {
            const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) });
            const res = await resp.json();
            if (p.type !== 'check' && res.status === "OK") {
                queue.shift(); localStorage.setItem('q_'+tech, JSON.stringify(queue)); updateQueueUI();
                let idx = history.findIndex(h => h.ts === p.timestamp);
                if (idx > -1) { history[idx].status = 'ok'; history[idx].name = res.name || p.code; localStorage.setItem('h_'+tech, JSON.stringify(history)); renderHistory(); }
            }
            if (res.task && res.task !== lastTask && Date.now() > snooze) { 
                document.getElementById('task-box').style.display = 'block'; document.getElementById('task-text').innerText = res.task; startAlarm(); 
            } else if (!res.task) { document.getElementById('task-box').style.display = 'none'; isSiren=false; }
            document.getElementById('status').innerText = "ONLINE"; document.getElementById('status').style.color = "var(--success)";
        } catch (e) {
            document.getElementById('status').innerText = "OFFLINE"; document.getElementById('status').style.color = "var(--danger)";
        } finally { processing = false; }
    }

    function renderHistory() { const b = document.querySelector("#h-table tbody"); b.innerHTML = ""; [...history].reverse().slice(0, 8).forEach(h => { b.innerHTML += `<tr class="${h.status==='ok'?'row-ok':'row-wait'}"><td>${new Date(h.ts).toLocaleTimeString()}</td><td>${h.name}</td><td>${h.status==='ok'?'✔️':'⌛'}</td></tr>`; }); }
    function startScanner() { document.getElementById('cam-container').style.display='block'; reader.decodeFromVideoDevice(null,'video', res => { if(res){ const c = res.text.trim(); if(ALLOWED.includes(c)){ stopScanner(); addToQueue('scan', c); } else { stopScanner(); playErr(); document.getElementById('flash-error').style.display='flex'; setTimeout(()=>document.getElementById('flash-error').style.display='none', 1500); } } }); }
    function stopScanner() { reader.reset(); document.getElementById('cam-container').style.display='none'; }
    function startHold(e, v, id=null, s=10) { e.preventDefault(); holdP = 0; holdT = setInterval(() => { holdP += s; let pId = (v==='RESOLVE'?'prog-res-'+id:(v==='HOTOVO'?'prog-h':(v==='NELZE'?'prog-n':'prog-az'))); document.getElementById(pId).style.width = holdP + '%'; if(holdP>=100) { clearInterval(holdT); if(v==='AZ_STOP') stopAzor(); else if(v==='RESOLVE') resolveReport(id); else resolveTask(v); stopHold(); } }, 100); }
    function stopHold() { clearInterval(holdT); document.querySelectorAll('.hold-progress').forEach(x => x.style.width='0%'); }
    function setupSlider(hId, sId, cb) { const h = document.getElementById(hId), s = document.getElementById(sId); let d = false; h.addEventListener('touchstart',()=>d=true); window.addEventListener('touchmove',e=>{ if(!d) return; let x = e.touches[0].clientX - s.getBoundingClientRect().left - 25; x = Math.max(5, Math.min(x, s.offsetWidth-55)); h.style.left = x+'px'; if(x > s.offsetWidth-60){ d=false; h.style.left='5px'; cb(); } }); window.addEventListener('touchend',()=> { d=false; h.style.left='5px'; }); }
    setupSlider('h-sos','sos-slider',()=>addToQueue('SOS','SOS')); setupSlider('h-work','work-slider',()=>handleWork('start')); setupSlider('h-call','call-slider',()=>window.location.href="tel:112");
    function showAzor() { document.getElementById('azor-setup').style.display='block'; }
    function hideAzor() { document.getElementById('azor-setup').style.display='none'; }
    function startAzor() { let s = document.getElementById('az-val').value*60; let end = Date.now()+(s*1000); localStorage.setItem('azor_end', end); addToQueue('azor_start','START'); document.getElementById('azor-setup').style.display='none'; resumeAzor(end); }
    function resumeAzor(end) { document.getElementById('az-stop').classList.remove('hidden'); document.getElementById('deadman-btn').style.display='none'; azTimer = setInterval(() => { let r = Math.floor((end - Date.now()) / 1000); if(r<=0){ stopAzor(); addToQueue('deadman_alarm','ALARM'); } else document.getElementById('az-timer').innerText = "⏳ "+Math.floor(r/60)+":"+(r%60).toString().padStart(2,'0'); }, 1000); }
    function stopAzor() { clearInterval(azTimer); localStorage.removeItem('azor_end'); addToQueue('azor_stop','STOP'); document.getElementById('az-stop').classList.add('hidden'); document.getElementById('deadman-btn').style.display='block'; }
    function ackTask() { isSiren=false; snooze = Date.now()+(2*60*60*1000); }
    function handleWork(t) { if(t==='start'){ addToQueue('work_start','START'); document.getElementById('work-slider').classList.add('hidden'); document.getElementById('btn-work-end').classList.remove('hidden'); } else { addToQueue('work_end','STOP'); document.getElementById('work-slider').classList.remove('hidden'); document.getElementById('btn-work-end').classList.add('hidden'); } }
    async function submitBossTask() { const t = document.getElementById('target-tech').value, x = document.getElementById('boss-task-text').value.trim(); if(!x) return; await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'add_task', targetTech:t, taskText:x, technician:tech})}); document.getElementById('boss-task-text').value=""; alert("OK!"); }
    async function toggleReports(s) { const m = document.getElementById('report-modal'); if(s) { m.style.display='flex'; const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'get_reports' }) }); const d = await r.json(); const l = document.getElementById('report-list'); l.innerHTML = ""; if(d.reports) d.reports.forEach(x => { const t = new Date(x.time); const f = t.toLocaleDateString('cs-CZ')+" "+t.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}); l.innerHTML += `<div class="report-item"><small>${f} | ${x.author}</small><br>${x.text}<br><button class="btn btn-hold" style="background:var(--success); height:40px; margin-top:5px;" ontouchstart="startHold(event,'RESOLVE',${x.id},5)" ontouchend="stopHold()"><div class="hold-progress" id="prog-res-${x.id}"></div>SMAZAT (2s)</button></div>`; }); } else m.style.display='none'; }
    async function addReport() { const t = document.getElementById('new-report-text').value.trim(); if(!t) return; await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'add_report', technician: tech, message: t }) }); document.getElementById('new-report-text').value=""; toggleReports(true); }
    async function resolveReport(id) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'resolve_report', rowId: id }) }); toggleReports(true); }
    function sendQuickMsg() { const m = document.getElementById('quick-msg').value.trim(); if(m) { addToQueue('message', 'ZPRÁVA', m); document.getElementById('quick-msg').value=""; } }
    function clearHistory() { if(confirm("Smazat?")){ history=[]; localStorage.setItem('h_'+tech,'[]'); renderHistory(); } }
</script>
</body>
</html>
