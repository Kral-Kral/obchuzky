<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALFA OMEGA</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .btn { border: none; padding: 18px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; margin-bottom: 10px; color: white; }
        .btn-scan { background: #1a73e8; }
        .btn-sos { background: #d93025; height: 100px; font-size: 26px; margin-top: 20px; border: 4px solid #fff; }
        .btn-deadman { background: #f9ab00; }
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        #camera-container { width: 100%; display: none; border-radius: 15px; overflow: hidden; margin-bottom: 10px; }
        #video { width: 100%; background: #000; }
        #status { font-weight: bold; margin: 10px; color: #555; }
        .badge { display: inline-block; background: #1a73e8; color: white; padding: 6px 12px; border-radius: 20px; margin: 3px; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h2>🛠 ALFA OMEGA</h2>
    <select id="tech-select" onchange="addTech()">
        <option value="">-- Kdo provádí kontrolu? --</option>
        <option value="Jakub">Jakub</option>
        <option value="Petr">Petr</option>
        <option value="Pavel">Pavel</option>
    </select>
    <div id="selected-techs"></div>
    <hr>
    <div id="camera-container">
        <video id="video"></video>
        <button class="btn" onclick="stopScanner()" style="background:#555; width:100%; border-radius:0;">ZAVŘÍT</button>
    </div>
    <button class="btn btn-scan" onclick="startScanner()">📷 SPUSTIT SKENER</button>
    <button id="deadman-btn" class="btn btn-deadman" onclick="toggleDeadman()">⏲ MRTVÝ MUŽ</button>
    <button class="btn btn-sos" onclick="sendSOS()">🆘 SOS POPLACH</button>
</div>
<div class="card">
    <textarea id="boss-msg" placeholder="Vzkaz vedoucímu..."></textarea>
    <div id="status">PŘIPRAVENO</div>
</div>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec";
    let selectedTechs = [];
    let codeReader = new ZXing.BrowserMultiFormatReader();
    let deadmanTimer = null;
    function addTech() {
        let val = document.getElementById('tech-select').value;
        if (val && !selectedTechs.includes(val)) {
            selectedTechs.push(val);
            document.getElementById('selected-techs').innerHTML += `<span class="badge">${val}</span>`;
        }
    }
    async function startScanner() {
        if (selectedTechs.length === 0) return alert("Vyber technika!");
        document.getElementById('camera-container').style.display = 'block';
        codeReader.decodeFromVideoDevice(null, 'video', (result) => {
            if (result) { stopScanner(); sendData('scan', result.text); }
        });
    }
    function stopScanner() { codeReader.reset(); document.getElementById('camera-container').style.display = 'none'; }
    function sendSOS() {
        if (selectedTechs.length === 0) return alert("Vyber technika!");
        if (confirm("VYSLAT SOS?")) { sendData('SOS', 'SOS'); }
    }
    function toggleDeadman() {
        if (selectedTechs.length === 0) return alert("Vyber technika!");
        if (!deadmanTimer) {
            let mins = prompt("Za kolik minut?", "15");
            if (!mins) return;
            deadmanTimer = setTimeout(() => { sendData('deadman_alarm', 'TIME_OUT'); }, mins * 60000);
            document.getElementById('deadman-btn').innerText = "⏲ BĚŽÍ ODPOCET";
        } else {
            clearTimeout(deadmanTimer); deadmanTimer = null;
            document.getElementById('deadman-btn').innerText = "⏲ MRTVÝ MUŽ (VYP)";
        }
    }
    function sendData(type, code) {
        document.getElementById('status').innerText = "⏳ ODESÍLÁM...";
        navigator.geolocation.getCurrentPosition(
            (pos) => { submit(type, code, `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`); },
            () => { submit(type, code, "Poloha nedostupná"); },
            { timeout: 3000 }
        );
    }
    function submit(type, code, loc) {
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ type: type, code: code, technicians: selectedTechs, message: document.getElementById('boss-msg').value, location: loc })
        }).then(() => {
            document.getElementById('status').innerText = "✅ ODESLÁNO";
            if (type === 'SOS') alert("SOS ODESLÁNO!");
        }).catch(() => { document.getElementById('status').innerText = "❌ CHYBA SÍTĚ!"; });
    }
</script>
</body>
</html>
