<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM Control system</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1a1a1a; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; --navy: #000080; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); color: var(--text); text-align: center; -webkit-tap-highlight-color: transparent; }
        .card { background: var(--card); padding: 15px; margin-bottom: 10px; border: 1px solid #333; border-radius: 4px; }
        input, select, textarea, #task-text, .report-content, #boss-task-text { font-size: 20px !important; font-weight: bold; width: 100%; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; padding: 12px; margin: 5px 0; border-radius: 4px; }
        @keyframes border-blink { 0% { border-color: var(--warning); } 50% { border-color: #fff; } 100% { border-color: var(--warning); } }
        .blink-active { animation: border-blink 0.6s infinite; border-width: 5px !important; }
        .tech-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #222; padding: 10px; border: 1px solid #444; max-height: 200px; overflow-y: auto; text-align: left; margin: 10px 0; }
        .tech-item { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; color: #bbb; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #1a1a1a; border-top: 1px solid #333; display: flex; z-index: 1000; }
        .tab-btn { flex: 1; background: none; border: none; color: #777; font-weight: bold; font-size: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 2px; }
        .report-item { position: relative; background: #222; padding: 12px; margin-bottom: 8px; text-align: left; border: 1px solid #555; border-radius: 4px; }
        .delete-btn-mini { position: absolute; top: 8px; right: 8px; width: 100px; height: 40px; background: #1a331a; border: 1px solid var(--success); display: flex; align-items: center; justify-content: center; touch-action: none; overflow: hidden; font-size: 11px; font-weight: bold; color: white; border-radius: 4px; }
        .btn { border: none; font-weight: bold; width: 100%; padding: 18px; font-size: 17px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; border-radius: 4px; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.4); z-index: 1; }
        .slider-container { position: relative; width: 100%; height: 55px; border-radius: 30px; border: 2px solid var(--danger); background: #200; overflow: hidden; margin-top: 8px; user-select: none; }
        .slider-handle { position: absolute; left: 4px; top: 4px; width: 45px; height: 45px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; font-size: 22px; z-index: 10; }
        .hidden { display: none !important; }
        #defect-photo-preview { max-width: 100%; max-height: 150px; margin-top: 10px; border-radius: 4px; display: none; border: 1px solid #444; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">

<div id="flash-ok" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--success); z-index:10000; justify-content:center; align-items:center;"><svg width="120" height="120" fill="white" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></div>

<div class="tab-bar hidden" id="main-nav">
    <button class="tab-btn active" id="nav-op" onclick="showTab('operativa')"><svg viewBox="0 0 24 24"><path d="M13.13 7.11l-4.97 4.97 1.06 1.06 4.97-4.97V15h1.5V6H6.5v1.5h6.63zM20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>OPERATIVA</button>
    <button class="tab-btn" id="nav-com" onclick="showTab('komunikace')"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-10H6v2h12V4z"/></svg>KOMUNIKACE</button>
</div>

<div class="card" id="login-card" style="margin-top:20px;">
    <h2 style="color:var(--primary);">AQM System</h2>
    <div style="color:var(--warning); font-size:12px; font-weight:bold; margin-bottom:15px;">MASTER VERZE 10.3.0</div>
    <select id="role-select"><option value="Technolog">Technolog</option><option value="VEDOUCÍ">VEDOUCÍ</option></select>
    <select id="tech-select">
        <optgroup label="VEDENÍ"><option value="Král">Král</option><option value="Vaibar">Vaibar</option><option value="Janča">Janča</option></optgroup>
        <optgroup label="TECHNOLOGOVÉ"><option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option></optgroup>
    </select>
    <input type="password" id="tech-pin" placeholder="PIN" maxlength="4" oninput="checkAuth()" inputmode="numeric">
</div>

<div class="card hidden" id="boss-card">
    <h3 style="color:var(--success);">⭐ PANEL VEDOUCÍHO</h3>
    <div id="tech-checkboxes" class="tech-grid"></div>
    <textarea id="boss-task-text" placeholder="Zadej úkol..."></textarea>
    <button class="btn" style="background:var(--success);" onclick="submitBossTask()">🚀 ODESLAT ÚKOL</button>
    <hr style="border-color:#444;">
    <div id="boss-report-list" style="max-height: 250px; overflow-y:auto; background:#111; padding:5px;"></div>
    <button onclick="location.reload()" style="background:none; border:none; color:red; margin-top:10px; font-weight:bold;">ODHLÁSIT</button>
</div>

<div id="tab-operativa" class="hidden" style="padding-bottom:70px;">
    <div id="task-box" class="card" style="display:none; border:5px solid var(--warning);">
        <div id="task-text" style="font-size:24px; color:white;"></div>
        <button class="btn" style="background:var(--primary);" onclick="ackTask()">ROZUMÍM</button>
        <div style="display:flex; gap:5px;">
            <button class="btn btn-hold" style="background:#1a5c27;" ontouchstart="startHold(event,'HOTOVO',null,3.33)" onmousedown="startHold(event,'HOTOVO',null,3.33)" ontouchend="stopHold()" onmouseup="stopHold()"><div class="hold-progress" id="prog-h"></div>HOTOVO</button>
        </div>
    </div>
    
    <div class="slider-container" style="border-color:var(--primary); background:#001529;" id="work-slider"><div class="slider-text">>>> START PRÁCE >>></div><div id="h-work" class="slider-handle" style="background:var(--primary);">🚩</div></div>
    <div class="slider-container hidden" style="border-color:var(--danger); background:#200;" id="work-end-slider"><div class="slider-text">>>> KONEC PRÁCE >>></div><div id="h-work-end" class="slider-handle" style="background:var(--danger);">🏁</div></div>

    <button class="btn" style="background:var(--navy); margin-top:10px;" onclick="startScanner()">QR SKEN BODU</button>
    <div id="cam-container" style="display:none; padding:10px;"><video id="video" style="width:100%; border-radius:4px;"></video></div>
    
    <div class="slider-container" id="sos-slider"><div class="slider-text">>>> SOS PŘEJETÍ >>></div><div id="h-sos-handle" class="slider-handle">🆘</div></div>
    <div class="card"><table id="h-table" style="width:100%; font-size:12px;"><tbody></tbody></table></div>
</div>

<div id="tab-komunikace" class="hidden" style="padding-bottom:70px;">
    <div class="card">
        <h3>📋 NÁSTĚNKA</h3>
        <div id="report-list" style="max-height: 400px; overflow-y:auto;"></div>
        <textarea id="new-report-text" placeholder="Zapsat na nástěnku..."></textarea>
        <button class="btn" style="background:var(--success);" onclick="addReport()">➕ PŘIDAT</button>
    </div>
    
    <div class="card">
        <h3>🛠 NAHLÁSIT ZÁVADU</h3>
        <textarea id="defect-msg" placeholder="Popis závady (Email)..."></textarea>
        <input type="file" id="photo-input" accept="image/*" capture="camera" style="display:none" onchange="previewDefectPhoto(event)">
        <button class="btn" style="background:#444;" onclick="document.getElementById('photo-input').click()">📸 VYFOTIT ZÁVADU</button>
        <img id="defect-photo-preview" src="">
        <button class="btn" style="background:var(--navy); margin-top:10px;" onclick="sendDefect()">✉ ODESLAT HLÁŠENÍ</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    const PINS = {"Král":"2013","Vaibar":"2013","Janča":"2013","Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    
    let tech = "", role = "", frozenLoc = "", photoData = null, holdT = null, audio = null, alarmT = null, processing = false;

    navigator.geolocation.watchPosition(p => frozenLoc = p.coords.latitude + "," + p.coords.longitude);

    function initAudio() { if(!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); }
    function playAlarm() { if(!audio) return; if(audio.state==='suspended') audio.resume(); let o = audio.createOscillator(); o.connect(audio.destination); o.frequency.setValueAtTime(1500, audio.currentTime); o.start(); o.stop(audio.currentTime + 0.2); }
    function playErr() { if(!audio) return; let o = audio.createOscillator(); o.type='sawtooth'; o.connect(audio.destination); o.frequency.setValueAtTime(150, audio.currentTime); o.start(); o.stop(audio.currentTime+0.5); }

    function showTab(t) { document.querySelectorAll('[id^="tab-"]').forEach(x=>x.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); if(t==='komunikace') loadReports(); }
    
    function checkAuth() { 
        let t = document.getElementById('tech-select').value;
        let pInput = document.getElementById('tech-pin');
        if (pInput.value.length < 4) return;
        if (PINS[t] === pInput.value) { 
            tech = t; role = document.getElementById('role-select').value;
            document.getElementById('login-card').classList.add('hidden');
            if(role === "VEDOUCÍ") { 
                const grid = document.getElementById('tech-checkboxes'); grid.innerHTML = "";
                Object.keys(PINS).forEach(n => { if(!["Král","Vaibar","Janča"].includes(n)) grid.innerHTML += `<label class="tech-item"><input type="checkbox" name="target-tech" value="${n}"> ${n}</label>`; });
                document.getElementById('boss-card').classList.remove('hidden'); loadReports();
            } else { document.getElementById('main-nav').classList.remove('hidden'); showTab('operativa'); setInterval(processQueue, 5000); }
        } else { pInput.value = ""; playErr(); }
    }

    function previewDefectPhoto(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) { photoData = e.target.result; document.getElementById('defect-photo-preview').src = photoData; document.getElementById('defect-photo-preview').style.display = 'block'; };
        reader.readAsDataURL(file);
    }

    async function sendDefect() {
        let m = document.getElementById('defect-msg').value.trim();
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'message', technician: tech, message: m, photoData: photoData, location: frozenLoc})});
        alert("Odesláno na Outlook!");
        document.getElementById('defect-msg').value = ""; document.getElementById('defect-photo-preview').style.display = 'none'; photoData = null;
    }

    function startHold(e, v, id=null, step=5) { 
        e.preventDefault(); let p = 0;
        holdT = setInterval(() => {
            p += step; let pId = (v==='RESOLVE'?'prog-'+id:'prog-h');
            let el = document.getElementById(pId); if(el) el.style.width = p + '%';
            if(p >= 100) { clearInterval(holdT); if(v==='RESOLVE') resolveReport(id); else if(v==='HOTOVO') { document.getElementById('task-box').style.display='none'; } stopHold(); }
        }, 100);
    }
    function stopHold() { clearInterval(holdT); document.querySelectorAll('.hold-progress').forEach(el => el.style.width = '0%'); }

    async function processQueue() {
        if(processing) return; processing = true;
        try {
            const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'check', technician: tech}) });
            const res = await resp.json();
            if(res.task) { document.getElementById('task-box').style.display='block'; document.getElementById('task-text').innerText = res.task; playAlarm(); }
        } catch(e){}
        processing = false;
    }

    async function loadReports() {
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'get_reports'}) });
        const d = await resp.json();
        let html = "";
        d.reports.forEach(r => { html += `<div class="report-item"><b>${r.author}:</b> ${r.text}<div class="delete-btn-mini" ontouchstart="startHold(event,'RESOLVE',${r.id},5)" ontouchend="stopHold()" onmousedown="startHold(event,'RESOLVE',${r.id},5)" onmouseup="stopHold()"><div class="hold-progress" id="prog-${r.id}"></div>HOTOVO</div></div>`; });
        document.getElementById('report-list').innerHTML = html;
        if(document.getElementById('boss-report-list')) document.getElementById('boss-report-list').innerHTML = html;
    }

    async function addReport() {
        let m = document.getElementById('new-report-text').value;
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'add_report', technician: tech, message: m}) });
        document.getElementById('new-report-text').value = ""; loadReports();
    }

    async function resolveReport(id) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'resolve_report', rowId: id}) }); loadReports(); }

    function startScanner() {
        const codeReader = new ZXing.BrowserMultiFormatReader();
        document.getElementById('cam-container').style.display='block';
        codeReader.decodeFromVideoDevice(null,'video', (res) => { if(res){ codeReader.reset(); document.getElementById('cam-container').style.display='none'; fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'scan', code: res.text, technician: tech, role: role})}); } });
    }

    function setupSlider(hId, sId, cb) { 
        const h = document.getElementById(hId), s = document.getElementById(sId); let d = false; 
        const mv = (cX) => { if(!d) return; let x = cX - s.getBoundingClientRect().left - 25; x = Math.max(5, Math.min(x, s.offsetWidth-55)); h.style.left = x+'px'; if(x > s.offsetWidth-60){ d=false; h.style.left='4px'; cb(); } }; 
        h.addEventListener('touchstart', () => d=true); window.addEventListener('touchmove', e => mv(e.touches[0].clientX)); window.addEventListener('touchend', () => { d=false; h.style.left='4px'; });
    }
    setupSlider('h-sos-handle','sos-slider',() => fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'SOS', technician: tech, message: "SOS ALARM!"})}));
    setupSlider('h-work','work-slider',() => { document.getElementById('work-slider').classList.add('hidden'); document.getElementById('work-end-slider').classList.remove('hidden'); });
    setupSlider('h-work-end','work-end-slider',() => { document.getElementById('work-end-slider').classList.add('hidden'); document.getElementById('work-slider').classList.remove('hidden'); });

    async function submitBossTask() {
        const text = document.getElementById('boss-task-text').value;
        const targets = Array.from(document.querySelectorAll('input[name="target-tech"]:checked')).map(cb => cb.value);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'add_task', technician: tech, taskText: text, targetTech: targets.join(",")}) });
        alert("Úkol odeslán!");
    }
</script>
</body>
</html>
