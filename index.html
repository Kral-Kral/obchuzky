<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM CONTROL PRO v1.4.1</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); text-align: center; overflow-x: hidden; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #333; position: relative; }
        h2 { margin-top: 0; font-weight: 600; color: var(--primary); font-size: 22px; }
        
        /* ÚKOL BOX */
        #task-box { background: #2c2c2e; border: 2px solid var(--warning); border-radius: 12px; padding: 15px; margin: 15px 0; display: none; text-align: left; }
        .task-btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-h { background: var(--success); padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; }
        .btn-n { background: var(--danger); padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; }

        select, input, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #333; border-radius: 12px; font-size: 16px; background: #2c2c2e; color: #fff; box-sizing: border-box; outline: none; }
        .btn { border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 17px; margin-bottom: 10px; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-scan { background: var(--primary); }
        .btn-bdelost { background: var(--warning); color: #000; }
        .btn-msg { background: #444; border: 1px solid #555; }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px; font-size: 13px; margin-bottom: 15px; width: auto; display: inline-flex; }
        
        .sos-container { position: relative; width: 100%; height: 70px; background: #222; border-radius: 35px; margin-top: 20px; overflow: hidden; border: 2px solid var(--danger); }
        .sos-text { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items:center; color: var(--danger); font-weight: bold; pointer-events: none; }
        .sos-handle { position: absolute; left: 5px; top: 5px; width: 60px; height: 60px; background: var(--danger); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 2; font-size: 24px; touch-action: none; }
        
        #camera-container { width: 100%; display: none; border-radius: 15px; overflow: hidden; margin-bottom: 10px; border: 2px solid var(--primary); }
        #video { width: 100%; background: #000; }
        #status { font-weight: bold; margin: 10px; color: var(--success); font-size: 13px; }
        #version-tag { font-size: 10px; color: #555; margin-bottom: 10px; }
        #offline-badge { background: var(--warning); color: black; font-size: 11px; padding: 5px; border-radius: 10px; display: none; margin-bottom: 10px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; color: #ccc; }
        th, td { border-bottom: 1px solid #333; padding: 12px 8px; text-align: left; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--success); display:none; justify-content:center; align-items:center; z-index:9999; color:white; font-size:100px; }
    </style>
</head>
<body>
<div id="flash">✅</div>
<div class="card">
    <h2>AQM CONTROL PRO</h2>
    <div id="version-tag">SERIAL: v1.4.1</div>
    <select id="tech-select" onchange="checkAuth()">
        <option value="">-- Vyber pracovníka --</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
    </select>
    <input type="password" id="tech-pin" placeholder="PIN autorizace" oninput="checkAuth()">
    
    <div id="task-box">
        <strong style="color: var(--warning);">ÚKOL:</strong>
        <p id="task-text" style="margin: 5px 0; color: white;"></p>
        <div class="task-btn-group">
            <button class="btn-h" onclick="resolveTask('HOTOVO')">HOTOVO</button>
            <button class="btn-n" onclick="resolveTask('NELZE')">NELZE</button>
        </div>
    </div>

    <div id="controls" style="opacity: 0.1; pointer-events: none; transition: 0.4s;">
        <button class="btn btn-logout" onclick="logout()">🔒 ODHLÁSIT / ZAMKNOUT</button>
        <div id="offline-badge">MÁTE DATA VE FRONTĚ (ČEKÁM NA SIGNÁL)</div>
        <div id="camera-container"><video id="video"></video><button class="btn" onclick="stopScanner()" style="background:#444; border-radius:0;">ZAVŘÍT</button></div>
        <input type="text" id="scan-note" placeholder="Poznámka ke skenu...">
        <button class="btn btn-scan" onclick="startScanner()">
            <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm15 0h3v2h-3v-2zm0 3h3v2h-3v-2zm-3-3h2v2h-2v-2zm0 3h2v2h-2v-2zm3 3h3v2h-3v-2zm-3 0h2v2h-2v-2z"/></svg>
            QR SKEN KONTROLNÍHO BODU
        </button>
        <button id="deadman-btn" class="btn btn-bdelost" onclick="toggleDeadman()">
            <svg width="24" height="24" fill="black" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.5h7c-.47 4.17-3.05 7.85-7 8.94V11.5H5V6.3l7-3.11v8.31z"/></svg>
            NEBEZPEČNÁ ZÓNA
        </button>
        <div class="sos-container" id="sos-slider"><div class="sos-text">PŘETÁHNI PRO SOS >>></div><div class="sos-handle" id="handle">🆘</div></div>
    </div>
</div>
<div class="card">
    <textarea id="boss-msg" placeholder="Rychlá zpráva..."></textarea>
    <button class="btn btn-msg" onclick="sendQuickMsg()">✉️ ODESLAT ZPRÁVU</button>
    <div id="status">SYSTÉM UZAMČEN</div>
    <table id="history-table"><thead><tr><th>Čas</th><th>Aktivita</th></tr></thead><tbody></tbody></table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec";
    const PINS = {"Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    let selectedTech = "", codeReader = new ZXing.BrowserMultiFormatReader(), deadmanTimer = null, lastLoc = "Zjišťuji GPS...";
    let audioCtx = null, queue = JSON.parse(localStorage.getItem('aqm_queue') || "[]"), isProcessing = false;

    navigator.geolocation.watchPosition((pos) => { lastLoc = `http://googleusercontent.com/maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`; }, null, { enableHighAccuracy: true });

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playSound() { initAudio(); const t = (f, d) => { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value = f; g.gain.value = 0.2; o.start(audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d + 0.1); }; t(900, 0); t(1100, 0.12); }

    function checkAuth() {
        if (PINS[document.getElementById('tech-select').value] === document.getElementById('tech-pin').value) {
            selectedTech = document.getElementById('tech-select').value;
            document.getElementById('controls').style.opacity = "1"; document.getElementById('controls').style.pointerEvents = "all";
            document.getElementById('status').innerText = "AKTIVNÍ: " + selectedTech;
            initAudio(); addToQueue('auth', 'PŘIHLÁŠENÍ');
            setInterval(processQueue, 20000);
        }
    }

    function addToQueue(type, code, customMsg = "") {
        const item = { type: type, code: code, technicians: [selectedTech], technician: selectedTech, message: customMsg || document.getElementById('boss-msg').value, note: document.getElementById('scan-note').value, location: lastLoc, timestamp: new Date().toISOString() };
        queue.push(item); localStorage.setItem('aqm_queue', JSON.stringify(queue));
        if (type !== 'auth') {
            const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${code}</td></tr>`;
            document.querySelector("#history-table tbody").insertAdjacentHTML('afterbegin', row);
        }
        playSound(); document.getElementById('flash').style.display = 'flex'; setTimeout(() => document.getElementById('flash').style.display = 'none', 600);
        document.getElementById('boss-msg').value = ""; document.getElementById('scan-note').value = "";
        processQueue();
    }

    async function processQueue() {
        if (isProcessing || queue.length === 0) { document.getElementById('offline-badge').style.display = (queue.length > 0) ? 'block' : 'none'; return; }
        isProcessing = true;
        const item = queue[0];
        try {
            const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(item) });
            const res = await resp.json();
            queue.shift(); localStorage.setItem('aqm_queue', JSON.stringify(queue));
            if (res.task) { document.getElementById('task-text').innerText = res.task; document.getElementById('task-box').style.display = 'block'; }
            else { document.getElementById('task-box').style.display = 'none'; }
            processQueue();
        } catch (e) { console.log("Offline"); }
        finally { isProcessing = false; }
    }

    function resolveTask(s) { addToQueue('task_response', s); document.getElementById('task-box').style.display = 'none'; }
    function logout() { location.reload(); }
    async function startScanner() { document.getElementById('camera-container').style.display = 'block'; codeReader.decodeFromVideoDevice(null, 'video', (res) => { if (res) { stopScanner(); addToQueue('scan', res.text); } }); }
    function stopScanner() { codeReader.reset(); document.getElementById('camera-container').style.display = 'none'; }
    function sendQuickMsg() { if (document.getElementById('boss-msg').value) addToQueue('message', 'ZPRÁVA'); }

    function toggleDeadman() {
        const btn = document.getElementById('deadman-btn');
        if (!deadmanTimer) {
            let m = prompt("Za kolik minut?", "15"); if (!m) return;
            let sec = m * 60;
            deadmanTimer = setInterval(() => {
                sec--;
                if (sec <= 0) { clearInterval(deadmanTimer); deadmanTimer = null; addToQueue('deadman_alarm', 'ALARM'); btn.innerHTML = '🛡️ NEBEZPEČNÁ ZÓNA'; }
                else { btn.innerText = Math.floor(sec/60) + ":" + (sec%60).toString().padStart(2,'0'); }
            }, 1000);
        } else { clearInterval(deadmanTimer); deadmanTimer = null; btn.innerHTML = '🛡️ NEBEZPEČNÁ ZÓNA'; }
    }

    const h = document.getElementById('handle'), s = document.getElementById('sos-slider');
    let drag = false; h.addEventListener('touchstart', () => { drag = true; initAudio(); });
    window.addEventListener('touchmove', (e) => {
        if (!drag) return; let x = e.touches[0].clientX - s.getBoundingClientRect().left - 30;
        x = Math.max(5, Math.min(x, s.offsetWidth - 65)); h.style.left = x + 'px';
        if (x > s.offsetWidth - 70) { drag = false; h.style.left = '5px'; addToQueue('SOS', 'SOS'); }
    });
    window.addEventListener('touchend', () => { drag = false; h.style.left = '5px'; });
</script>
</body>
</html>
