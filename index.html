<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM System</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1a1a1a; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); color: var(--text); text-align: center; }
        .card { background: var(--card); padding: 15px; margin-bottom: 10px; border: 1px solid #333; border-radius: 4px; }
        input, select, textarea { font-size: 18px; width: 100%; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; padding: 10px; margin: 5px 0; border-radius: 4px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #1a1a1a; border-top: 1px solid #333; display: flex; z-index: 1000; }
        .tab-btn { flex: 1; background: none; border: none; color: #777; font-weight: bold; font-size: 14px; }
        .tab-btn.active { color: var(--primary); }
        .report-item { position: relative; background: #222; padding: 10px; margin-bottom: 5px; text-align: left; border-radius: 4px; border: 1px solid #444; }
        .delete-btn-mini { position: absolute; top: 5px; right: 5px; width: 80px; height: 35px; background: #1a331a; color: white; border: 1px solid var(--success); font-size: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.3); }
        .btn { border: none; font-weight: bold; width: 100%; padding: 15px; font-size: 16px; margin-bottom: 10px; color: white; border-radius: 4px; cursor: pointer; }
        .hidden { display: none !important; }
        #photo-preview { max-width: 100%; margin-top: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="tab-bar hidden" id="main-nav">
    <button class="tab-btn active" onclick="showTab('operativa')">OPERATIVA</button>
    <button class="tab-btn" onclick="showTab('komunikace')">KOMUNIKACE</button>
</div>

<div class="card" id="login-card">
    <h2>AQM System</h2>
    <select id="tech-select">
        <option value="Král">Král</option><option value="Vaibar">Vaibar</option><option value="Janča">Janča</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option>
    </select>
    <input type="password" id="tech-pin" placeholder="PIN" maxlength="4">
    <button class="btn" style="background:var(--primary)" onclick="checkAuth()">PŘIHLÁSIT</button>
</div>

<div id="tab-operativa" class="hidden" style="padding-bottom:70px;">
    <div class="card">
        <button class="btn" style="background:var(--primary)" onclick="startScanner()">QR SKENOVÁNÍ</button>
        <div id="cam-container" style="display:none"><video id="video" style="width:100%"></video></div>
        <table id="h-table" style="width:100%; font-size:12px; margin-top:10px;"><tbody></tbody></table>
    </div>
</div>

<div id="tab-komunikace" class="hidden" style="padding-bottom:70px;">
    <div class="card">
        <h3>📋 NÁSTĚNKA</h3>
        <div id="report-list"></div>
        <textarea id="new-report-text" placeholder="Nový záznam..."></textarea>
        <button class="btn" style="background:var(--success)" onclick="addReport()">PŘIDAT</button>
    </div>
    <div class="card">
        <h3>🛠 NAHLÁSIT ZÁVADU (Outlook)</h3>
        <textarea id="quick-msg" placeholder="Popis závady..."></textarea>
        <input type="file" id="photo-input" accept="image/*" capture="camera" style="display:none" onchange="previewPhoto(event)">
        <button class="btn" style="background:#444" onclick="document.getElementById('photo-input').click()">📸 VYFOTIT</button>
        <img id="photo-preview" src="">
        <button class="btn" style="background:var(--danger)" onclick="sendDefect()">✉ ODESLAT ZÁVADU</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec";
    const PINS = {"Král":"2013","Vaibar":"2013","Janča":"2013","Jiří Bělíček":"5481","Dalibor Čech":"2368"};
    const MAPA_NAZVU = {"KB001":"ROZVADĚČ RM.010","63":"ROZVADĚČ RM 4/1","65":"FILTR E.ON"};

    let tech = "", role = "Technik", photoData = null, queue = [], history = [];

    function showTab(t) { 
        document.getElementById('tab-operativa').classList.add('hidden');
        document.getElementById('tab-komunikace').classList.add('hidden');
        document.getElementById('tab-'+t).classList.remove('hidden');
        if(t==='komunikace') loadReports();
    }

    function checkAuth() {
        let t = document.getElementById('tech-select').value;
        let p = document.getElementById('tech-pin').value;
        if(PINS[t] === p) {
            tech = t;
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
            showTab('operativa');
        } else { alert("Špatný PIN"); }
    }

    function previewPhoto(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(f) {
            photoData = f.target.result;
            document.getElementById('photo-preview').src = photoData;
            document.getElementById('photo-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    async function sendDefect() {
        let msg = document.getElementById('quick-msg').value;
        if(!msg) return alert("Napiš popis!");
        let data = { type: 'message', technician: tech, message: msg, photoData: photoData, location: "Nezadána" };
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
        alert("Odesláno na Outlook!");
        document.getElementById('quick-msg').value = "";
        document.getElementById('photo-preview').style.display = "none";
        photoData = null;
    }

    // NÁSTĚNKA - 2 SEKUNDY DRŽENÍ
    let holdT;
    function startHold(id) {
        let p = 0;
        let el = document.getElementById('prog-'+id);
        holdT = setInterval(() => {
            p += 5;
            el.style.width = p + '%';
            if(p >= 100) { clearInterval(holdT); resolveReport(id); }
        }, 100);
    }
    function stopHold(id) { clearInterval(holdT); document.getElementById('prog-'+id).style.width = '0%'; }

    async function loadReports() {
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'get_reports'}) });
        const d = await resp.json();
        let h = "";
        d.reports.forEach(r => {
            h += `<div class="report-item"><b>${r.author}:</b> ${r.text}<div class="delete-btn-mini" onmousedown="startHold(${r.id})" onmouseup="stopHold(${r.id})" ontouchstart="startHold(${r.id})" ontouchend="stopHold(${r.id})"><div class="hold-progress" id="prog-${r.id}"></div>HOTOVO</div></div>`;
        });
        document.getElementById('report-list').innerHTML = h;
    }

    async function addReport() {
        let m = document.getElementById('new-report-text').value;
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'add_report', technician: tech, message: m}) });
        document.getElementById('new-report-text').value = "";
        loadReports();
    }

    async function resolveReport(id) {
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'resolve_report', rowId: id}) });
        loadReports();
    }

    function startScanner() {
        const codeReader = new ZXing.BrowserMultiFormatReader();
        document.getElementById('cam-container').style.display = "block";
        codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
            if (result) {
                codeReader.reset();
                document.getElementById('cam-container').style.display = "none";
                fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'scan', code: result.text, technician: tech}) });
                alert("Naskenováno: " + result.text);
            }
        });
    }
</script>
</body>
</html>
