<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --text: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; }
        #reader { width: 100%; border-radius: 24px; background: #000; min-height: 250px; border: 2px solid #334155; overflow: hidden; }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { border: none; padding: 20px; width: 100%; border-radius: 18px; font-size: 17px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-blue { background: var(--primary); color: #000; }
        .hidden { display: none !important; }
        input, textarea { width: 100%; padding: 18px; margin: 12px 0; border-radius: 14px; background: #0d1117; color: white; border: 1px solid #334155; box-sizing: border-box; font-size: 18px; }
        #version-tag { margin-top: 20px; font-size: 12px; color: #475569; text-align: center; }
        #status { margin-top: 10px; font-size: 14px; color: var(--primary); text-align: center; font-weight: bold; }
        /* Indikátor odesílání */
        #sync-status { background: #f59e0b; color: #000; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-bottom: 15px; width: 100%; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center; margin-bottom: 20px;">AQ TECH <span style="color:var(--primary)">PRO</span></h1>
    
    <div id="sync-status">⏳ ODESÍLÁM DATA DO TABULKY...</div>
    
    <div id="reader"></div>
    <div id="status">Připraven</div>

    <div id="sec-login" class="card">
        <button class="btn btn-blue" onclick="startCamera('login')">📷 SKENOVAT KARTU</button>
        <div id="ui-login" class="hidden">
            <h2 id="worker-label" style="color: var(--primary); margin: 5px 0;">---</h2>
            <input type="password" id="pin" placeholder="PIN" inputmode="numeric" maxlength="4">
            <button class="btn" style="background:var(--success); color:white" onclick="verifyLogin()">PŘIHLÁSIT</button>
        </div>
    </div>

    <div id="sec-work" class="card hidden">
        <button class="btn btn-blue" onclick="startCamera('work')">🔍 SKENOVAT OBJEKT</button>
        <div id="ui-work" class="hidden">
            <p>Objekt: <strong id="obj-label" style="color:var(--primary); font-size: 20px;">---</strong></p>
            <textarea id="note" placeholder="Poznámka..."></textarea>
            <button class="btn" style="background:var(--success); color:white" onclick="saveData()">🚀 ODESLAT</button>
        </div>
    </div>

    <div id="version-tag">VERZE: v2026.07</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNf2EgoBJOUWvKflRisSFfQt6L2JivO3Lcw53amT7WcTTwgNBeQi9awfpzEXErjAI/exec";

    const EMPLOYEES = {
        "T01": { name: "Jiří Bělíček", pin: "5481" }, "T02": { name: "Dalibor Čech", pin: "2368" },
        "T03": { name: "René Russwurm st.", pin: "1798" }, "T04": { name: "René Russwurm ml.", pin: "2849" },
        "T05": { name: "Roman Zámečník", pin: "6984" }, "T06": { name: "Marek Slovák", pin: "1179" },
        "T07": { name: "Martin Kuneš", pin: "2538" }, "T08": { name: "David Mirvald", pin: "1099" },
        "T09": { name: "Petr Illa", pin: "7923" }, "T10": { name: "Mirek Švarný", pin: "1739" },
        "T11": { name: "Lukáš Sem", pin: "4197" }, "T12": { name: "Laďa Poledna", pin: "5592" }
    };

    let user = null;
    let place = "";
    let html5QrCode = new Html5Qrcode("reader");

    window.onload = syncData;

    async function startCamera(mode) {
        document.getElementById('status').innerText = "Hledám kód...";
        try {
            if (html5QrCode.getState() === 2) await html5QrCode.stop();
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                if (mode === 'login') {
                    if (EMPLOYEES[txt]) {
                        user = EMPLOYEES[txt];
                        document.getElementById('worker-label').innerText = user.name;
                        document.getElementById('ui-login').classList.remove('hidden');
                        html5QrCode.stop();
                    }
                } else {
                    place = txt;
                    document.getElementById('obj-label').innerText = txt;
                    document.getElementById('ui-work').classList.remove('hidden');
                    html5QrCode.stop();
                }
            });
        } catch (err) { alert("Chyba kamery!"); }
    }

    function verifyLogin() {
        if (document.getElementById('pin').value === user.pin) {
            document.getElementById('sec-login').classList.add('hidden');
            document.getElementById('sec-work').classList.remove('hidden');
            document.getElementById('status').innerText = "Přihlášen: " + user.name;
        } else { alert("Špatný PIN!"); }
    }

    function saveData() {
        const note = document.getElementById('note').value;
        const scanTime = new Date().toLocaleString("cs-CZ");
        document.getElementById('status').innerText = "📍 Zaměřuji polohu...";

        navigator.geolocation.getCurrentPosition((pos) => {
            const gps = pos.coords.latitude.toFixed(6) + "," + pos.coords.longitude.toFixed(6);
            
            // ULOŽIT DO FRONTU (Mobilní paměť)
            let queue = JSON.parse(localStorage.getItem('aqQueue')) || [];
            queue.push({ worker: user.name, place, note, gps, time: scanTime });
            localStorage.setItem('aqQueue', JSON.stringify(queue));

            alert("ZÁZNAM ULOŽEN DO TELEFONU ✅\nProbíhá odesílání...");
            syncData(); // Pokusit se hned odeslat
            location.reload(); 
        }, () => { alert("Chyba GPS!"); }, { enableHighAccuracy: true });
    }

    async function syncData() {
        let queue = JSON.parse(localStorage.getItem('aqQueue')) || [];
        const syncLabel = document.getElementById('sync-status');

        if (queue.length === 0) {
            syncLabel.style.display = 'none';
            return;
        }

        syncLabel.style.display = 'block';
        syncLabel.innerText = `⏳ ODESÍLÁM: ${queue.length} ZÁZNAMŮ...`;

        const item = queue[0];
        // Sestavení URL adresy
        const query = `?worker=${encodeURIComponent(item.worker)}&place=${encodeURIComponent(item.place)}&note=${encodeURIComponent(item.note)}&gps=${encodeURIComponent(item.gps)}&time=${encodeURIComponent(item.time)}`;
        
        try {
            // Odeslání požadavku
            await fetch(SCRIPT_URL + query, { mode: 'no-cors' });
            
            // Pokud fetch nespadl, bereme to jako odeslané
            queue.shift(); // Smazat první odeslanou položku
            localStorage.setItem('aqQueue', JSON.stringify(queue));
            syncData(); // Pokračovat na další v řadě
        } catch (e) {
            syncLabel.innerText = `⚠️ CHYBA SIGNÁLU: ${queue.length} ČEKÁ`;
            console.error(e);
        }
    }
    
    // Automaticky zkusit odeslat při návratu signálu
    window.addEventListener('online', syncData);
</script>
</body>
</html>
