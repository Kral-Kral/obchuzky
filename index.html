<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM Control system</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1a1a1a; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; --navy: #000080; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); color: var(--text); text-align: center; -webkit-tap-highlight-color: transparent; }
        .card { background: var(--card); padding: 15px; margin-bottom: 10px; border: 1px solid #333; border-radius: 4px; }
        input, select, textarea { font-size: 20px !important; width: 100%; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; padding: 12px; margin: 5px 0; border-radius: 4px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #1a1a1a; border-top: 1px solid #333; display: flex; z-index: 1000; }
        .tab-btn { flex: 1; background: none; border: none; color: #777; font-weight: bold; font-size: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: var(--primary); }
        .hidden { display: none !important; }
        .btn { border: none; font-weight: bold; width: 100%; padding: 18px; font-size: 17px; margin-bottom: 8px; color: white; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .slider-container { position: relative; width: 100%; height: 55px; border-radius: 30px; border: 2px solid var(--danger); background: #200; overflow: hidden; margin-top: 8px; }
        .slider-handle { position: absolute; left: 4px; top: 4px; width: 45px; height: 45px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; font-size: 22px; cursor: pointer; z-index: 10; transition: transform 0.1s; }
        .slider-text { line-height: 55px; font-size: 16px; font-weight: bold; pointer-events: none; z-index: 5; position: relative; }
    </style>
</head>
<body onclick="initAudio()">

<div class="tab-bar hidden" id="main-nav">
    <button class="tab-btn active" id="nav-op" onclick="showTab('operativa')">OPERATIVA</button>
    <button class="tab-btn" id="nav-com" onclick="showTab('komunikace')">KOMUNIKACE</button>
</div>

<div class="card" id="login-card">
    <h2 style="color:var(--primary);">AQM System</h2>
    <select id="role-select"><option value="">-- VYBER ROLI --</option><option value="Technolog">Technolog</option><option value="Údržba">Údržba</option></select>
    <select id="tech-select"><option value="">-- JMÉNO --</option><option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="Král">Král</option><option value="Vaibar">Vaibar</option><option value="Janča">Janča</option></select>
    <input type="password" id="tech-pin" placeholder="PIN" oninput="checkAuth()">
</div>

<div id="tab-operativa" class="hidden" style="padding-bottom:70px;">
    <div class="card">
        <div id="work-status" style="font-weight:bold; color:var(--primary);">PŘIPRAVEN</div>
        <div class="slider-container" id="work-slider"><div class="slider-text">>>> START PRÁCE >>></div><div id="h-work" class="slider-handle">🚩</div></div>
    </div>
    <button class="btn" style="background:var(--navy);" onclick="startScanner()">QR SKEN BODU</button>
    <div id="cam-container" style="display:none;"><video id="video" style="width:100%;"></video></div>
    <div class="slider-container" id="sos-slider"><div id="sos-text" class="slider-text">>>> SOS PŘEJETÍ >>></div><div id="h-sos" class="slider-handle">🆘</div></div>
    <div class="slider-container" style="border-color:#fff; background:#222; margin-top:10px;" id="call-slider"><div class="slider-text" style="color:#fff;">>>> VOLAT VEDENÍ / 112 >>></div><div id="h-call" class="slider-handle" style="background:#fff; color:#000;">📞</div></div>
</div>

<div id="tab-komunikace" class="hidden" style="padding-bottom:70px;">
    <div class="card">
        <h3 style="margin-top:0; color:var(--danger);">🛠️ HLÁŠENÍ ZÁVADY</h3>
        <textarea id="issue-text" placeholder="Popište závadu..."></textarea>
        <div style="background:#222; padding:10px; border-radius:4px; margin-bottom:10px;">
            <label style="display:block; font-size:13px; color:#aaa;">FOTO (POVINNÉ):</label>
            <input type="file" id="issue-img" accept="image/*" capture="camera">
        </div>
        <button id="btn-send-issue" class="btn" style="background:var(--danger);" onclick="sendIssueReport()">📧 ODESLAT NA ÚDRŽBU</button>
    </div>
</div>

<script>
    // SEM VLOŽ SVOJI URL PO NASAZENÍ Z NOVÉHO ÚČTU:
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    
    let tech = "", role = "", frozenLoc = "0,0", batt = "??";

    function checkAuth() {
        let t = document.getElementById('tech-select').value, p = document.getElementById('tech-pin').value, r = document.getElementById('role-select').value;
        if(p.length === 4) { tech = t; role = r; document.getElementById('login-card').classList.add('hidden'); document.getElementById('main-nav').classList.remove('hidden'); showTab('operativa'); }
    }

    function showTab(t) { document.querySelectorAll('[id^="tab-"]').forEach(x=>x.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); }

    async function sendIssueReport() {
        const textEl = document.getElementById('issue-text');
        const fileInput = document.getElementById('issue-img');
        const btn = document.getElementById('btn-send-issue');

        if (!textEl.value.trim() || fileInput.files.length === 0) { alert("⚠️ Chybí popis nebo fotka!"); return; }
        
        btn.innerText = "⏳ ODESÍLÁM..."; btn.disabled = true;
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const payload = { 
                type: 'report_issue', technician: tech, role: role, message: textEl.value, 
                image: e.target.result.split(',')[1], mimeType: fileInput.files[0].type, 
                battery: batt, location: "http://maps.google.com/?q=" + frozenLoc 
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("✅ Závada odeslána na e-mail."); textEl.value = ""; fileInput.value = "";
            } catch (err) { alert("❌ Chyba při odesílání!"); }
            finally { btn.innerText = "📧 ODESLAT NA ÚDRŽBU"; btn.disabled = false; }
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    // Slider logika pro SOS a Volání
    function setupSlider(hId, sId, cb) {
        const h = document.getElementById(hId), s = document.getElementById(sId); let d = false;
        const mv = (cX) => { if(!d) return; let rect = s.getBoundingClientRect(); let x = cX - rect.left - 25; x = Math.max(5, Math.min(x, rect.width-55)); h.style.left = x+'px'; if(x > rect.width-60){ d=false; h.style.left='4px'; cb(); } };
        h.addEventListener('touchstart', () => d=true);
        window.addEventListener('touchmove', e => mv(e.touches[0].clientX));
        window.addEventListener('touchend', () => { d=false; h.style.left='4px'; });
    }
    setupSlider('h-sos', 'sos-slider', () => { alert("SOS Odesláno!"); });
    setupSlider('h-call', 'call-slider', () => { let c = prompt("1=112, 2=Král, 3=Vaibar, 4=Janča"); if(c==="1") window.location.href="tel:112"; });
</script>
</body>
</html>
