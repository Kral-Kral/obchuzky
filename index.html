<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALFA OMEGA PRO</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; transition: background 0.3s; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; position: relative; }
        .btn { border: none; padding: 18px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; margin-bottom: 10px; color: white; -webkit-tap-highlight-color: transparent; }
        .btn-scan { background: #1a73e8; }
        .btn-sos { background: #d93025; height: 100px; font-size: 24px; border: 5px solid #fff; animation: pulse 2s infinite; }
        .btn-deadman { background: #f9ab00; }
        .btn-disabled { background: #ccc !important; pointer-events: none; opacity: 0.5; }
        select, textarea, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        #camera-container { width: 100%; display: none; border-radius: 15px; overflow: hidden; margin-bottom: 10px; }
        #video { width: 100%; background: #000; }
        #status { font-weight: bold; margin: 10px; color: #555; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(217, 48, 37, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(217, 48, 37, 0); } 100% { box-shadow: 0 0 0 0 rgba(217, 48, 37, 0); } }
        /* Zelený záblesk přes celý displej */
        #flash-success { position: fixed; top:0; left:0; width:100%; height:100%; background: #2ecc71; display:none; justify-content:center; align-items:center; z-index:9999; color:white; font-size:120px; }
    </style>
</head>
<body>

<div id="flash-success">✅</div>

<div class="card">
    <h2>🛠 ALFA OMEGA PRO</h2>
    <select id="tech-select" onchange="checkAuth()">
        <option value="">-- Vyber pracovníka --</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option>
        <option value="Dalibor Čech">Dalibor Čech</option>
        <option value="René Russwurm st.">René Russwurm st.</option>
        <option value="René Russwurm ml.">René Russwurm ml.</option>
        <option value="Roman Zámečník">Roman Zámečník</option>
        <option value="Marek Slovák">Marek Slovák</option>
        <option value="Martin Kuneš">Martin Kuneš</option>
        <option value="David Mirvald">David Mirvald</option>
        <option value="Petr Illa">Petr Illa</option>
        <option value="Mirek Švarný">Mirek Švarný</option>
        <option value="Lukáš Sem">Lukáš Sem</option>
        <option value="Laďa Poledna">Laďa Poledna</option>
    </select>
    <input type="password" id="tech-pin" placeholder="Zadej svůj PIN" oninput="checkAuth()">
    <hr>
    <div id="controls" class="btn-disabled">
        <div id="camera-container">
            <video id="video"></video>
            <button class="btn" onclick="stopScanner()" style="background:#555; width:100%; border-radius:0;">ZAVŘÍT</button>
        </div>
        <button class="btn btn-scan" onclick="startScanner()">📷 SPUSTIT SKENER</button>
        <button id="deadman-btn" class="btn btn-deadman" onclick="toggleDeadman()">⏲ KONTROLA BDĚLOSTI</button>
        <button class="btn btn-sos" ondblclick="sendSOS()" onclick="sosHint()">🆘 SOS (DVOJKLIK)</button>
    </div>
</div>

<div class="card">
    <textarea id="boss-msg" placeholder="Vzkaz pro vedoucího..."></textarea>
    <div id="status">ZADEJ PIN</div>
    <h3>Historie (posledních 10)</h3>
    <table id="history-table">
        <thead><tr><th>Čas</th><th>Akce</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec";
    const PINS = {"Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    
    let selectedTech = "", codeReader = new ZXing.BrowserMultiFormatReader(), deadmanTimer = null, historyData = [], lastLoc = "Zjišťuji...";
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Sledování polohy na pozadí pro okamžité odeslání
    navigator.geolocation.watchPosition((pos) => {
        lastLoc = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
    }, null, { enableHighAccuracy: true });

    function feedback() {
        // Zvuk
        const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination); osc.frequency.value = 880; g.gain.value = 0.1;
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        // Vizuální záblesk
        const flash = document.getElementById('flash-success');
        flash.style.display = 'flex';
        setTimeout(() => { flash.style.display = 'none'; }, 700);
    }

    function checkAuth() {
        let t = document.getElementById('tech-select').value;
        let p = document.getElementById('tech-pin').value;
        if (PINS[t] === p) {
            selectedTech = t;
            document.getElementById('controls').classList.remove('btn-disabled');
            document.getElementById('status').innerText = "AUTORIZOVÁNO: " + t;
        } else {
            document.getElementById('controls').classList.add('btn-disabled');
            document.getElementById('status').innerText = "ZADEJ PIN";
        }
    }

    function sosHint() { document.getElementById('status').innerText = "PRO SOS KLIKNI 2x!"; }

    async function startScanner() {
        document.getElementById('camera-container').style.display = 'block';
        codeReader.decodeFromVideoDevice(null, 'video', (res) => { if (res) { stopScanner(); sendData('scan', res.text); } });
    }

    function stopScanner() { codeReader.reset(); document.getElementById('camera-container').style.display = 'none'; }

    function sendSOS() { sendData('SOS', 'SOS'); alert("SOS ODESLÁNO!"); }

    function toggleDeadman() {
        if (!deadmanTimer) {
            let m = prompt("Za kolik minut?", "15"); if (!m) return;
            deadmanTimer = setTimeout(() => { sendData('deadman_alarm', 'ALARM-BDĚLOST'); }, m * 60000);
            document.getElementById('deadman-btn').innerText = "⏲ BĚŽÍ ODPOCET";
        } else {
            clearTimeout(deadmanTimer); deadmanTimer = null;
            document.getElementById('deadman-btn').innerText = "⏲ KONTROLA BDĚLOSTI";
        }
    }

    function sendData(type, code) {
        document.getElementById('status').innerText = "⏳ ODESÍLÁM...";
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ type: type, code: code, technicians: [selectedTech], message: document.getElementById('boss-msg').value, location: lastLoc })
        }).then(() => {
            feedback();
            document.getElementById('status').innerText = "✅ ODESLÁNO";
            const now = new Date().toLocaleTimeString();
            historyData.unshift({ t: now, a: type + ": " + code });
            if (historyData.length > 10) historyData.pop();
            document.querySelector("#history-table tbody").innerHTML = historyData.map(h => `<tr><td>${h.t}</td><td>${h.a}</td></tr>`).join("");
        });
    }
</script>
</body>
</html>
