<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8;
            --success: #10b981; --accent: #f59e0b; --text: #f8fafc;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; 
            padding: 0; margin: 0; min-height: 100vh;
        }
        .app-container { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        h1 span { color: var(--primary); }
        
        #reader { 
            width: 100%; border-radius: 28px; background: #000; 
            min-height: 320px; overflow: hidden;
            border: 2px solid #334155; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }

        .card {
            background: var(--card); border-radius: 24px; padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05); margin-top: 20px;
        }
        .btn {
            border: none; padding: 20px; width: 100%; border-radius: 18px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.2s; text-transform: uppercase;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-success { background: var(--success); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn:disabled { background: #475569; opacity: 0.6; cursor: not-allowed; }
        
        input, textarea {
            width: 100%; padding: 18px; margin: 12px 0;
            border: 2px solid #334155; border-radius: 16px;
            font-size: 18px; background: #0d1117; color: white; box-sizing: border-box;
        }
        .hidden { display: none !important; }
        #status-bar {
            margin-top: 15px; padding: 12px; border-radius: 14px;
            font-size: 13px; text-align: center; background: rgba(56, 189, 248, 0.1);
            color: var(--primary); width: 100%; border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .user-tag { background: var(--success); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>AQ TECH <span>PRO</span></h1>
        <div id="user-info" class="hidden"><span class="user-tag" id="logged-name"></span></div>
    </header>

    <div id="reader"></div>
    <div id="status-bar">Systém načten</div>

    <div id="sec-login" class="card">
        <button id="btn-auth" class="btn btn-primary" onclick="startQR('login')">📷 PŘIHLÁSIT TECHNIKA</button>
        <div id="box-auth" class="hidden">
            <h2 id="worker-display" style="color: var(--primary); margin: 10px 0;"></h2>
            <input type="password" id="pin-field" placeholder="ZADEJ PIN" inputmode="numeric" maxlength="4">
            <button class="btn btn-success" onclick="verifyLogin()">POTVRDIT PŘIHLÁŠENÍ</button>
        </div>
    </div>

    <div id="sec-work" class="card hidden">
        <button id="btn-scan-obj" class="btn btn-primary" onclick="startQR('work')">🔍 SKENOVAT OBJEKT</button>
        <div id="box-work" class="hidden">
            <div style="margin: 15px 0; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px;">
                <small style="color: #64748b">ID OBJEKTU:</small>
                <div id="obj-display" style="font-size: 24px; font-weight: 900; color: var(--primary)">---</div>
            </div>
            <textarea id="note-field" placeholder="Poznámka / Závada..."></textarea>
            <button id="btn-send" class="btn btn-accent" onclick="sendFinalData()">🚀 ODESLAT ZÁZNAM</button>
        </div>
    </div>
</div>

<script>
    // TVÁ URL ADRESA ZE SCRIPTU
    const URL_API = "https://script.google.com/macros/s/AKfycbxNf2EgoBJOUWvKflRisSFfQt6L2JivO3Lcw53amT7WcTTwgNBeQi9awfpzEXErjAI/exec";

    const EMPLOYEES = {
        "T01": { name: "Jiří Bělíček", pin: "5481" }, "T02": { name: "Dalibor Čech", pin: "2368" },
        "T03": { name: "René Russwurm st.", pin: "1798" }, "T04": { name: "René Russwurm ml.", pin: "2849" },
        "T05": { name: "Roman Zámečník", pin: "6984" }, "T06": { name: "Marek Slovák", pin: "1179" },
        "T07": { name: "Martin Kuneš", pin: "2538" }, "T08": { name: "David Mirvald", pin: "1099" },
        "T09": { name: "Petr Illa", pin: "7923" }, "T10": { name: "Mirek Švarný", pin: "1739" },
        "T11": { name: "Lukáš Sem", pin: "4197" }, "T12": { name: "Laďa Poledna", pin: "5592" }
    };

    let currentUser = null;
    let currentObj = "";
    let html5QrCode = new Html5Qrcode("reader");

    async function startQR(mode) {
        updateStatus("Spouštím skener...");
        try {
            if (html5QrCode.getState() === 2) await html5QrCode.stop();
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
                if (navigator.vibrate) navigator.vibrate(60);
                if (mode === 'login') handleLogin(txt.trim());
                else handleObj(txt.trim());
            });
            updateStatus("Skenujte QR kód...");
        } catch (e) { updateStatus("Chyba kamery!"); }
    }

    function handleLogin(id) {
        if (EMPLOYEES[id]) {
            currentUser = { id, ...EMPLOYEES[id] };
            document.getElementById('worker-display').innerText = currentUser.name;
            document.getElementById('box-auth').classList.remove('hidden');
            document.getElementById('btn-auth').classList.add('hidden');
            html5QrCode.stop();
            updateStatus("Zadejte PIN");
        } else alert("Neznámý kód technika!");
    }

    function verifyLogin() {
        if (document.getElementById('pin-field').value === currentUser.pin) {
            document.getElementById('sec-login').classList.add('hidden');
            document.getElementById('sec-work').classList.remove('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('logged-name').innerText = currentUser.name;
            updateStatus("Technik přihlášen: " + currentUser.name);
        } else alert("ŠPATNÝ PIN!");
    }

    function handleObj(id) {
        currentObj = id;
        document.getElementById('obj-display').innerText = id;
        document.getElementById('box-work').classList.remove('hidden');
        html5QrCode.stop();
        updateStatus("Objekt načten.");
    }

    function updateStatus(t) { document.getElementById('status-bar').innerText = t; }

    function sendFinalData() {
        const btn = document.getElementById('btn-send');
        const note = document.getElementById('note-field').value;
        
        // --- MRAŽENÝ ČAS SKENU TEĎ ---
        const now = new Date();
        const scanTime = now.toLocaleDateString("cs-CZ") + " " + now.toLocaleTimeString("cs-CZ");

        btn.disabled = true;
        updateStatus("📍 Zaměřuji GPS...");

        navigator.geolocation.getCurrentPosition((pos) => {
            const gps = pos.coords.latitude.toFixed(6) + "," + pos.coords.longitude.toFixed(6);
            
            const url = URL_API + 
                `?worker=${encodeURIComponent(currentUser.name)}` +
                `&place=${encodeURIComponent(currentObj)}` +
                `&note=${encodeURIComponent(note)}` +
                `&gps=${encodeURIComponent(gps)}` +
                `&time=${encodeURIComponent(scanTime)}`;

            updateStatus("🚀 Odesílám (čekám na signál)...");

            fetch(url, { mode: 'no-cors' }).then(() => {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                alert("ZÁZNAM ULOŽEN\nČas skenu: " + scanTime);
                document.getElementById('box-work').classList.add('hidden');
                document.getElementById('note-field').value = "";
                btn.disabled = false;
                updateStatus("✅ Hotovo. Připraveno.");
            }).catch(() => {
                alert("Chyba signálu. Až budete na datech, zkuste znovu.");
                btn.disabled = false;
            });
        }, () => {
            alert("Chyba GPS! Poloha je povinná.");
            btn.disabled = false;
        }, { enableHighAccuracy: true });
    }
</script>
</body>
