<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --success: #10b981;
            --accent: #f59e0b;
            --text: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex; flex-direction: column; align-items: center; 
            padding: 0; margin: 0; min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: left;
            margin-bottom: 30px;
            padding: 10px;
        }

        h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        h1 span { color: var(--primary); }

        .user-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            font-size: 14px;
            margin-top: 10px;
            color: var(--primary);
        }

        #reader { 
            width: 100%; 
            border-radius: 24px; 
            background: #000; 
            overflow: hidden;
            border: 2px solid #334155;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
            margin-bottom: 25px;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn {
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:active { transform: scale(0.98); background: #7dd3fc; }
