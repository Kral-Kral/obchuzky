<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8;
            --success: #10b981; --accent: #f59e0b; --text: #f8fafc;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; 
            padding: 0; margin: 0; min-height: 100vh; overflow-x: hidden;
        }
        .app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        header { text-align: left; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        h1 span { color: var(--primary); }
        
        #reader { 
            width: 100%; border-radius: 28px; background: #000; 
            min-height: 320px; overflow: hidden;
            border: 2px solid #334155; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }

        .card {
            background: var(--card); border-radius: 24px; padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05); margin-top: 20px;
            backdrop-filter: blur(10px);
        }
        .btn {
            border: none; padding: 20px; width: 100%; border-radius: 18px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn:active { transform: scale(0.95); opacity: 0.9; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-success { background: var(--success); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; transform: none; }
        
        input, textarea {
            width: 100%; padding: 18px; margin: 12px 0;
            border: 2px solid #334155; border-radius: 16px;
            font-size: 18px; background: #0d1117; color: white; box-sizing: border-box;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        input:focus { border-color: var(--primary); outline: none; }
        
        .hidden { display: none !important; }
        #status-bar {
            margin-top: 15px; padding: 14px; border-radius: 16px;
            font-size: 13px; text-align: center; background: rgba(56, 189, 248, 0.07);
            color: var(--primary); width: 100%; border: 1px solid rgba(56, 189, 248, 0.15);
            font-weight: 500;
        }
        .badge { background: var(--success); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
