<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM CONTROL PRO v1.4.1</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); text-align: center; overflow-x: hidden; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #333; position: relative; }
        #task-box { background: #2c2c2e; border: 2px solid var(--warning); border-radius: 15px; padding: 15px; margin: 15px 0; display: none; text-align: left; }
        .task-btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-h { background: var(--success); padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; }
        .btn-n { background: var(--danger); padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; }
        select, input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #333; border-radius: 12px; font-size: 16px; background: #2c2c2e; color: #fff; box-sizing: border-box; outline: none; }
        .btn { border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { padding: 18px; font-size: 17px; margin-bottom: 10px; }
        .btn-scan { background: var(--primary); }
        .btn-bdelost { background: var(--warning); color: #000; }
        .sos-container { position: relative; width: 100%; height: 70px; background: #251010; border-radius: 35px; margin-top: 20px; overflow: hidden; border: 2px solid var(--danger); }
        .sos-text { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items:center; color: var(--danger); font-weight: bold; pointer-events: none; font-size: 12px; }
        .sos-handle { position: absolute; left: 5px; top: 5px; width: 60px; height: 60px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; font-size: 24px; touch-action: none; }
        #status { font-weight: bold; margin: 15px; color: var(--success); font-size: 13px; }
        #offline-badge { background: var(--warning); color: black; font-size: 11px; padding: 5px; border-radius: 10px; display: none; margin-bottom: 10px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; color: #ccc; }
        td { padding: 10px 8px; border-bottom: 1px solid #222; text-align: left; }
    </style>
</head>
<body>
<div id="flash" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--success);display:none;z-index:9999;color:white;font-size:100px;justify-content:center;align-items:center;">✅</div>

<div class="card">
    <button class="btn" style="background:transparent; border:1px solid var(--danger); color:var(--danger); padding:8px; font-size:12px; margin-bottom:15px; width:auto;" onclick="location.reload()">🔒 ODHLÁSIT</button>
    <div id="offline-badge">⚠️ ČEKÁM NA SIGNÁL (DATA VE FRONTĚ)</div>
    <select id="tech-select" onchange="checkAuth()">
        <option value="">-- Vyber pracovníka --</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
    </select>
    <input type="password" id="tech-pin" placeholder="PIN" oninput="checkAuth()">
    
    <div id="task-box">
        <small style="color: var(--warning);">NOVÝ ÚKOL:</small>
        <div id="task-text" style="font-weight: bold; margin-top: 5px; font-size: 18px;"></div>
        <div class="task-btn-group">
            <button class="btn-h" onclick="resolveTask('HOTOVO')">HOTOVO</button>
            <button class="btn-n" onclick="resolveTask('NELZE')">NELZE</button>
        </div>
    </div>

    <div id="controls" style="opacity: 0.1; pointer-events: none;">
        <div id="camera-container" style="display:none; border-radius:15px; overflow:hidden; border:2px solid var(--primary); margin-bottom:10px;">
            <video id="video" style="width:100%; background:#000;"></video>
            <button class="btn btn-main" onclick="stopScanner()" style="background:#444; border-radius:0; margin:0;">ZAVŘÍT</button>
        </div>
        <input type="text" id="scan-note" placeholder="Poznámka ke skenu...">
        <button class="btn btn-main btn-scan" onclick="startScanner()">QR SKEN BODU</button>
        <button id="deadman-btn" class="btn btn-main btn-bdelost" onclick="toggleDeadman()">🛡️ NEBEZPEČNÁ ZÓNA</button>
        <div class="sos-container" id="sos-slider"><div class="sos-text">PŘETÁHNI PRO SOS >>></div><div id="handle" class="sos-handle">🆘</div></div>
    </div>
</div>
<div class="card">
    <textarea id="boss-msg" placeholder="Zpráva pro velín..."></textarea>
    <button class="btn btn-main" onclick="sendQuickMsg()" style="background:#444;">✉ ODESLAT ZPRÁVU</button>
    <div id="status">SYSTÉM UZAMČEN</div>
    <table id="history-table"><tbody></tbody></table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    const PINS = {"Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    let selectedTech = "", codeReader = new ZXing.BrowserMultiFormatReader(), deadmanTimer = null, lastLoc = "GPS: Zjišťuji...";
    let audioCtx = null;
    let queue = JSON.parse(localStorage.getItem('aqm_queue') || "[]");
    let isProcessing = false;

    navigator.geolocation.watchPosition((p) => { lastLoc = `http://googleusercontent.com/maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`; }, null, { enableHighAccuracy: true });

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

    function playSound() {
        initAudio();
        const t = (f, d) => {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f; g.gain.value = 0.3;
            o.start(audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d + 0.12);
        };
        t(900, 0); t(1100, 0.15);
    }

    function checkAuth() {
        let t = document.getElementById('tech-select').value;
        if (PINS[t] === document.getElementById('tech-pin').value) {
            initAudio(); selectedTech = t; 
            document.getElementById('controls').style.opacity = "1"; document.getElementById('controls').style.pointerEvents = "all";
            document.getElementById('status').innerText = "✅ PŘIHLÁŠEN: " + selectedTech;
            addToQueue('auth', 'PŘIHLÁŠENÍ');
            setInterval(processQueue, 15000); 
        }
    }

    function addToQueue(type, code, msg = "") {
        const item = {
            type: type,
            code: code,
            technician: selectedTech,
            message: msg || document.getElementById('scan-note').value || document.getElementById('boss-msg').value,
            location: lastLoc,
            timestamp: new Date().toISOString()
        };
        queue.push(item);
        localStorage.setItem('aqm_queue', JSON.stringify(queue));
        if (type !== 'auth' && type !== 'refresh') updateHistoryLocally(item);
        feedback();
        processQueue();
    }

    function feedback() {
        playSound(); document.getElementById('flash').style.display = 'flex'; 
        setTimeout(() => document.getElementById('flash').style.display='none', 600);
        document.getElementById('scan-note').value = ""; document.getElementById('boss-msg').value = "";
    }

    async function processQueue() {
        if (isProcessing || queue.length === 0) { 
            document.getElementById('offline-badge').style.display = (queue.length > 0) ? 'block' : 'none';
            return; 
        }
        isProcessing = true;
        document.getElementById('offline-badge').style.display = 'block';
        
        const item = queue[0];
        try {
            const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(item) });
            const res = await resp.json();
            
            queue.shift();
            localStorage.setItem('aqm_queue', JSON.stringify(queue));
            
            if (res.task && res.task !== "") {
                document.getElementById('task-text').innerText = res.task;
                document.getElementById('task-box').style.display = 'block';
                playSound();
            } else {
                document.getElementById('task-box').style.display = 'none';
            }
            document.getElementById('status').innerText = "✅ DATA SYNCHRONIZOVÁNA";
        } catch (e) {
            document.getElementById('status').innerText = "📡 OFFLINE - ČEKÁM";
        } finally {
            isProcessing = false;
            if (queue.length > 0) setTimeout(processQueue, 1000);
        }
    }

    function updateHistoryLocally(item) {
        const row = `<tr><td>${new Date(item.timestamp).toLocaleTimeString()}</td><td>${item.code}</td></tr>`;
        document.querySelector("#history-table tbody").insertAdjacentHTML('afterbegin', row);
    }

    function resolveTask(s) { addToQueue('task_response', s); document.getElementById('task-box').style.display = 'none'; }
    function sendQuickMsg() { if (document.getElementById('boss-msg').value) addToQueue('message', 'ZPRÁVA'); }
    
    async function startScanner() { 
        document.getElementById('camera-container').style.display = 'block'; 
        codeReader.decodeFromVideoDevice(null, 'video', (res) => { if (res) { stopScanner(); addToQueue('scan', res.text); } }); 
    }
    function stopScanner() { codeReader.reset(); document.getElementById('camera-container').style.display = 'none'; }

    function toggleDeadman() {
        const btn = document.getElementById('deadman-btn');
        if (!deadmanTimer) {
            let m = prompt("Za kolik minut zazvonit?", "15");
            if (!m) return;
            let sec = m * 60;
            btn.innerText = "⏳ ODPOCET: " + m + "m";
            deadmanTimer = setInterval(() => {
                sec--;
                if (sec <= 0) {
                    clearInterval(deadmanTimer);
                    deadmanTimer = null;
                    addToQueue('deadman_alarm', 'ALARM BDĚLOSTI');
                    btn.innerText = "🛡️ NEBEZPEČNÁ ZÓNA";
                } else {
                    btn.innerText = "⏳ " + Math.floor(sec/60) + "m " + (sec%60) + "s";
                }
            }, 1000);
        } else {
            clearInterval(deadmanTimer);
            deadmanTimer = null;
            btn.innerText = "🛡️ NEBEZPEČNÁ ZÓNA";
        }
    }

    const h = document.getElementById('handle'), s = document.getElementById('sos-slider');
    let drag = false; h.addEventListener('touchstart', () => { drag = true; initAudio(); });
    window.addEventListener('touchmove', (e) => {
        if (!drag) return; let x = e.touches[0].clientX - s.getBoundingClientRect().left - 30;
        x = Math.max(5, Math.min(x, s.offsetWidth - 65)); h.style.left = x + 'px';
        if (x > s.offsetWidth - 70) { drag = false; h.style.left = '5px'; addToQueue('SOS', 'SOS'); }
    });
    window.addEventListener('touchend', () => { drag = false; h.style.left = '5px'; });
</script>
</body>
</html>
