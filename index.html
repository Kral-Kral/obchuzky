<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO - Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        #reader { width: 100%; border-radius: 15px; background: #000; min-height: 300px; margin-bottom: 20px; border: 3px solid #3b82f6; overflow: hidden; }
        .btn { border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-start { background: #3b82f6; color: white; }
        .btn-ok { background: #10b981; color: white; }
        .btn-send { background: #f59e0b; color: white; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        .hidden { display: none !important; }
        #status-msg { margin: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="app-title">Přihlášení <span style="color:#3b82f6">TECHNIKA</span></h2>
    
    <div id="reader"></div>
    
    <div id="phase-login">
        <button id="btn-camera" class="btn btn-start" onclick="startScanner('login')">SKENOVAT MOJI KARTU</button>
        <div id="login-box" class="hidden">
            <p id="worker-label" style="font-weight: bold; font-size: 22px; color: #3b82f6;"></p>
            <input type="password" id="pin-input" placeholder="ZADEJ PIN" inputmode="numeric" maxlength="4">
            <button class="btn btn-ok" onclick="checkPin()">PŘIHLÁSIT SE</button>
        </div>
    </div>

    <div id="phase-work" class="hidden">
        <p id="active-worker-name" style="color: #10b981; font-weight: bold;"></p>
        <button class="btn btn-start" onclick="startScanner('work')">SKENOVAT KÓD MÍSTA</button>
        
        <div id="work-box" class="hidden">
            <p>Místo: <strong id="place-label">---</strong></p>
            <textarea id="note-input" placeholder="Poznámka / závada..."></textarea>
            <p id="status-msg"></p>
            <button id="btn-submit" class="btn btn-send" onclick="sendData()">ODESLAT ZÁZNAM</button>
        </div>
    </div>
</div>

<script>
    const DB = {
        "T01": { name: "Jiří Bělíček", pin: "5481" },
        "T02": { name: "Dalibor Čech", pin: "2368" },
        "T03": { name: "René Russwurm st.", pin: "1798" },
        "T04": { name: "René Russwurm ml.", pin: "2849" },
        "T05": { name: "Roman Zámečník", pin: "6984" },
        "T06": { name: "Marek Slovák", pin: "1179" },
        "T07": { name: "Martin Kuneš", pin: "2538" },
        "T08": { name: "David Mirvald", pin: "1099" },
        "T09": { name: "Petr Illa", pin: "7923" },
        "T10": { name: "Mirek Švarný", pin: "1739" }
    };

    // SEM VLOŽTE URL VAŠEHO GOOGLE SCRIPTU (viz návod níže)
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/VASE_ID/exec";

    let loggedWorker = null;
    let lastScannedPlace = "";
    let scanner = new Html5Qrcode("reader");

    function startScanner(mode) {
        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 260 }, (text) => {
            let code = text.trim();
            
            if (mode === 'login') {
                if (DB[code]) {
                    loggedWorker = { id: code, name: DB[code].name, pin: DB[code].pin };
                    document.getElementById('worker-label').innerText = loggedWorker.name;
                    document.getElementById('login-box').classList.remove('hidden');
                    document.getElementById('btn-camera').classList.add('hidden');
                    scanner.stop();
                } else {
                    alert("Neznámý technik!");
                }
            } else if (mode === 'work') {
                lastScannedPlace = code;
                document.getElementById('place-label').innerText = code;
                document.getElementById('work-box').classList.remove('hidden');
                document.getElementById('status-msg').innerText = "GPS se načítá...";
                scanner.stop();
            }
            if (navigator.vibrate) navigator.vibrate(200);
        }).catch(err => alert("Chyba kamery: " + err));
    }

    function checkPin() {
        const pin = document.getElementById('pin-input').value;
        if (loggedWorker.pin === pin) {
            document.getElementById('phase-login').classList.add('hidden');
            document.getElementById('phase-work').classList.remove('hidden');
            document.getElementById('active-worker-name').innerText = "Přihlášen: " + loggedWorker.name;
            document.getElementById('app-title').innerHTML = "Kontrola <span style='color:#3b82f6'>MÍSTA</span>";
        } else {
            alert("ŠPATNÝ PIN!");
        }
    }

    function sendData() {
        const btn = document.getElementById('btn-submit');
        const note = document.getElementById('note-input').value;
        btn.disabled = true;
        btn.innerText = "ODESÍLÁM...";

        // Získání GPS polohy
        navigator.geolocation.getCurrentPosition((pos) => {
            const gps = pos.coords.latitude + "," + pos.coords.longitude;
            
            const data = {
                worker: loggedWorker.name,
                place: lastScannedPlace,
                note: note,
                gps: gps
            };

            // Odeslání do Google Tabulky
            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                alert("ZÁZNAM ULOŽEN!");
                // Reset formuláře pro další skenování místa
                document.getElementById('work-box').classList.add('hidden');
                document.getElementById('note-input').value = "";
                btn.disabled = false;
                btn.innerText = "ODESLAT ZÁZNAM";
            }).catch(e => alert("Chyba při odesílání: " + e));

        }, (err) => {
            alert("Musíte povolit GPS polohu!");
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
