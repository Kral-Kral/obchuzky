<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM Control system</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1a1a1a; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; --navy: #000080; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); color: var(--text); text-align: center; }
        
        .card { background: var(--card); padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
        
        input, select, textarea, #task-text, .report-content, #boss-task-text { font-size: 20px !important; font-weight: bold; width: 100%; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; padding: 12px; margin: 5px 0; }

        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #1a1a1a; border-top: 1px solid #333; display: flex; z-index: 1000; }
        .tab-btn { flex: 1; background: none; border: none; color: #777; font-weight: bold; font-size: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .report-item { position: relative; background: #222; padding: 12px; margin-bottom: 8px; text-align: left; border-left: 4px solid var(--primary); }
        .report-meta { font-size: 14px; color: #bbb; border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 6px; display: block; font-weight: bold; }
        
        .delete-btn-mini { position: absolute; top: 8px; right: 8px; width: 45px; height: 45px; background: #311; border: 1px solid #522; display: flex; align-items: center; justify-content: center; touch-action: none; overflow: hidden; }

        #flash-ok, #flash-error { position: fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; z-index:10000; }
        #flash-ok { background: var(--success); } #flash-error { background: var(--danger); }
        
        .btn { border: none; font-weight: bold; width: 100%; padding: 18px; font-size: 17px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; }
        .btn-hold { position: relative; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.4); }
        
        .slider-container { position: relative; width: 100%; height: 55px; border-radius: 30px; border: 2px solid var(--danger); background: #200; overflow: hidden; margin-top: 8px; user-select: none; }
        .slider-handle { position: absolute; left: 4px; top: 4px; width: 45px; height: 45px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; font-size: 22px; cursor: pointer; }
        .slider-text { line-height: 55px; font-size: 16px; font-weight: bold; pointer-events: none; }
        .slider-work { border-color: var(--primary); background: #001529; }
        .slider-work .slider-handle { background: var(--primary); }

        table { width: 100%; font-size: 13px; margin-top: 8px; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: left; }
        .row-ok { color: var(--success) !important; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">

<div id="flash-ok"><svg width="150" height="150" fill="white" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></div>
<div id="flash-error"><svg width="150" height="150" fill="white" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>

<div class="tab-bar hidden" id="main-nav">
    <button class="tab-btn active" id="nav-op" onclick="showTab('operativa')"><svg viewBox="0 0 24 24"><path d="M13.13 7.11l-4.97 4.97 1.06 1.06 4.97-4.97V15h1.5V6H6.5v1.5h6.63zM20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>OPERATIVA</button>
    <button class="tab-btn" id="nav-com" onclick="showTab('komunikace')"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-10H6v2h12V4z"/></svg>KOMUNIKACE</button>
</div>

<div class="card" id="login-card" style="margin-top:20px;">
    <h2 style="color:var(--primary); margin:0;">AQM System</h2>
    <span style="color:var(--warning); font-size:14px; font-weight:bold;">VERZE 4.5.0 (FINAL)</span>
    
    <select id="role-select">
        <option value="">-- VYBER ROLI --</option>
        <option value="Technolog hl. strojovna">Technolog hl. strojovna</option>
        <option value="Technolog Wellness">Technolog Wellness</option>
        <option value="Technolog Nový areál">Technolog Nový areál</option>
        <option value="Údržba">Údržba</option>
        <option value="VEDOUCÍ">VEDOUCÍ (Admin)</option>
    </select>
    
    <select id="tech-select" onchange="document.getElementById('auth-section').classList.remove('hidden')">
        <option value="">-- VYBER JMÉNO --</option>
        <optgroup label="VEDENÍ">
            <option value="Král">Král</option><option value="Vaibar">Vaibar</option><option value="Janča">Janča</option>
        </optgroup>
        <optgroup label="TECHNOLOGOVÉ">
            <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
        </optgroup>
    </select>
    <div id="auth-section" class="hidden"><input type="password" id="tech-pin" placeholder="ZADEJ PIN" oninput="checkAuth()"></div>
</div>

<div class="card hidden" id="boss-card">
    <h3 style="color:var(--success);">⭐ PANEL VEDOUCÍHO</h3>
    <select id="target-tech"></select>
    <textarea id="boss-task-text" style="min-height:220px; font-size: 26px !important;" placeholder="Zadej úkol..."></textarea>
    <button class="btn" style="background:var(--success);" onclick="submitBossTask()">🚀 ODESLAT ÚKOL</button>
    
    <hr style="border-color:#444; margin: 25px 0;">
    <h3 style="margin-top:0;">📋 NÁSTĚNKA (LIVE)</h3>
    <div id="boss-report-list" style="max-height: 350px; overflow-y:auto; text-align:left; background:#111; padding:5px; border-radius:5px;"></div>
    <textarea id="boss-new-report-text" placeholder="Zapsat na nástěnku..." style="margin-top:10px;"></textarea>
    <button class="btn" style="background:var(--primary);" onclick="addReport()">➕ PŘIDAT ZÁZNAM</button>

    <button onclick="location.reload()" style="background:none; border:none; color:red; margin-top:15px; font-weight:bold; font-size:18px;">ODHLÁSIT VEDOUCÍHO</button>
</div>

<div id="tab-operativa" class="hidden" style="padding-bottom:70px;">
    
    <div id="task-box" class="card" style="display:none; border:3px solid var(--warning);"><div id="task-text"></div>
        <button class="btn" style="background:var(--primary);" onclick="ackTask()">OK ROZUMÍM (2H ZTLUMIT)</button>
        <div style="display:flex; gap:5px;">
            <button class="btn btn-hold" style="background:#1a5c27;" ontouchstart="startHold(event, 'HOTOVO', null, 3.33)" ontouchend="stopHold()" onmousedown="startHold(event, 'HOTOVO', null, 3.33)" onmouseup="stopHold()" onmouseleave="stopHold()"><div class="hold-progress" id="prog-h"></div>HOTOVO (3s)</button>
            <button class="btn btn-hold" style="background:#7a1a14;" ontouchstart="startHold(event, 'NELZE', null, 3.33)" ontouchend="stopHold()" onmousedown="startHold(event, 'NELZE', null, 3.33)" onmouseup="stopHold()" onmouseleave="stopHold()"><div class="hold-progress" id="prog-n"></div>NELZE (3s)</button>
        </div>
    </div>
    
    <div class="card">
        <div id="work-status" style="font-weight:bold; color:var(--primary); font-size:16px;">PŘIPRAVEN</div>
        <div class="slider-container slider-work" id="work-slider"><div class="slider-text">>>> START PRÁCE >>></div><div id="h-work" class="slider-handle">🚩</div></div>
        <button id="btn-work-end" class="btn hidden" style="background:var(--danger); margin-top:8px;" onclick="handleWork('end')">🏁 KONEC PRÁCE</button>
    </div>
    
    <textarea id="scan-note" placeholder="Poznámka ke skenu..."></textarea>
    <button class="btn" style="background:var(--navy);" onclick="startScanner()">QR SKEN BODU</button>
    
    <div id="cam-container" style="display:none; padding: 10px; background: #222; border-radius: 8px; margin-top: 10px;">
        <video id="video" style="width:100%; background:#000;"></video>
        <button class="btn" style="background:var(--danger); margin-top:10px;" onclick="stopScanner()">❌ ZAVŘÍT SKENER</button>
    </div>
    
    <button id="deadman-btn" class="btn" style="background:var(--warning); color:#000;" onclick="showAzor()">🐕 AZOR (HLÍDAČ)</button>
    
    <div id="azor-setup" style="display:none;" class="card">
        <label style="font-size:18px; font-weight:bold;">Odpočet (minuty):</label>
        <input type="number" id="az-val" value="15" style="text-align:center; font-size: 24px;">
        <input type="range" id="az-slider-input" min="1" max="120" value="15" style="width: 100%; margin: 15px 0;" oninput="document.getElementById('az-val').value = this.value">
        <button class="btn" style="background:var(--success);" onclick="startAzor()">SPUSTIT ODPOČET</button>
        <button class="btn" style="background:#444;" onclick="hideAzor()">ZPĚT / ZRUŠIT</button>
    </div>
    <button id="az-stop" class="btn btn-hold hidden" style="background:#222; color:var(--warning); border:2px solid var(--warning);" ontouchstart="startHold(event, 'AZ_STOP', null, 3.33)" ontouchend="stopHold()" onmousedown="startHold(event, 'AZ_STOP', null, 3.33)" onmouseup="stopHold()" onmouseleave="stopHold()"><div class="hold-progress" id="prog-az"></div><span id="az-timer">⏳ AZOR AKTIVNÍ (Podrž 3s)</span></button>
    
    <div class="slider-container" id="sos-slider"><div class="slider-text">>>> SOS PŘEJETÍ >>></div><div id="h-sos" class="slider-handle">🆘</div></div>
    <div class="slider-container" style="border-color:#fff; background:#222; margin-top:10px;" id="call-slider"><div class="slider-text" style="color:#fff;">>>> VOLAT 112 / VEDENÍ >>></div><div id="h-call" class="slider-handle" style="background:#fff; color:#000;">📞</div></div>
    
    <div class="card" id="history-section"><div id="status-area" onclick="processQueue()"><div id="status" style="font-weight:bold; font-size:12px; color:var(--success);">ONLINE</div><div id="queue-count" class="hidden">0</div></div><table id="h-table"><tbody></tbody></table></div>
    
    <button class="btn" style="background:#333; margin-top:15px; padding: 12px; font-size: 14px;" onclick="location.reload()">ODHLÁSIT UŽIVATELE</button>
</div>

<div id="tab-komunikace" class="hidden" style="padding-bottom:70px;">
    <div class="card">
        <h3 style="margin-top:0;">📋 NÁSTĚNKA</h3>
        <div id="report-list" style="max-height: 350px; overflow-y:auto;"></div>
        <textarea id="new-report-text" placeholder="Zapsat na nástěnku..."></textarea>
        <button class="btn" style="background:var(--success);" onclick="addReport()">➕ PŘIDAT ZÁZNAM</button>
    </div>
    <div class="card">
        <h3 style="margin-top:0;">✉ TELEGRAM ZPRÁVA</h3>
        <textarea id="quick-msg" placeholder="Přímá zpráva na Telegram..."></textarea>
        <button class="btn" style="background:#444;" onclick="sendQuickMsg()">✉ ODESLAT</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    
    const PINS = {"Král":"2013","Vaibar":"2013","Janča":"2013","Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    
    const MAPA_NAZVU = {"KB001":"Rozvaděč wel. RM.010","KB002":"ROZVADĚČ WEL. OCHLAZOVÁK","KB003":"ROZVADĚČ U KOČÁRKÁRNA","KB004":"ROZVODNA RS 1.1","KB005":"ROZVODNA RS 2.1","KB006":"KOTELNA","KB007":"VZT. BAZÉNOVÁ HALA","KB008":"KGJ. NAŠE","KB009":"VZT. STŘECHA 1","KB010":"VZT. STŘECHA 2","KB011":"VZT. ADROŠ-HORNÍ","KB012":"HLAVNÍ ROZVODNA","KB013":"BATERKÁRNA","KB014":"VZT. GASTRO","KB015":"ROZVODNA ADROŠ RM0.2","KB016":"SCHNEIDER","KB017":"VZT ADROŠ DOLE","KB018":"ROZVADĚČ KAVÁRNA","KB019":"STROJOVNA VLNY, ATRAKCE","KB020":"ROZVADĚČ RS3.1","KB021":"STROJOVNA ABYSS","KB022":"NOVÝ AREÁL KOTELNA","KB023":"NOVÝ AREÁL VZT","KB024":"NOVÝ A. FILTRY","KB025":"NOVÝ A. STROJ. ČERPADLA","KB026":"JÍMKA PITNÉ VODY","KB027":"REWAT PLASTOVÁ JÍMKA","KB028":"JÍMKA JEZERNÍ VODY","KB029":"ROZVODNA WELL. 2 NP","KB030":"KGJ e-on","KB031":"VZT WELLNESS","KB032":"TEPELKO","KB033":"OZONGENERÁTOR ÚPRAVNA","KB034":"ROZVADĚČ RS 2.2","KB035":"ROZVADĚČ- HÁJEK","KB036":"CHLOROVNA","KB037":"WELLNESS RS 0.3","KB038":"ZÁVLAHA STARÝ AREÁL","KB039":"VRT","KB040":"SHZ","KB044":"ŠACHTA-STÁNEK","KB045":"ŠACHTA-PARSHALL","KB046":"ŠACHTA-HRAD","KB047":"ŠACHTA-ROH ŘEKY","KB048":"ŠACHTA-VEDLE MOSTU","KB049":"ŠACHTA POD H5","KB050":"Strojovna A","KB051":"Strojovna B","KB052":"Tech. míst. Bečka","KB053":"Strojovna 2.60","KB054":"Střecha 1","KB055":"Střecha 2","KB056":"Střecha 3","KB057":"Rozvodna Abyss","KB058":"Sněžná-technická místnost"};
    const ALLOWED = Object.keys(MAPA_NAZVU);

    let tech = "", role = "", reader = null, azTimer = null, frozenLoc = "", audio = null, queue = [], history = [], processing = false, holdT = null, holdP = 0, snooze = 0, batt = "??";

    navigator.geolocation.watchPosition(p => frozenLoc = `${p.coords.latitude},${p.coords.longitude}`);
    
    window.addEventListener('online', processQueue);
    window.addEventListener('visibilitychange', () => { if(document.visibilityState === 'visible') processQueue(); });
    window.addEventListener('focus', processQueue);
    document.addEventListener('touchstart', () => { if(queue.length > 0) processQueue(); }, {passive: true});

    if(navigator.getBattery) navigator.getBattery().then(b => batt = Math.floor(b.level * 100)).catch(()=>batt="??");

    function initAudio() { if(!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); }
    function beep(f, d, l) { if(!audio) return; if(audio.state==='suspended') audio.resume(); let o = audio.createOscillator(); let g = audio.createGain(); o.connect(g); g.connect(audio.destination); o.frequency.setValueAtTime(f, audio.currentTime+d); g.gain.setValueAtTime(0.1, audio.currentTime+d); o.start(audio.currentTime+d); o.stop(audio.currentTime+d+l); }
    function playOk() { beep(800,0,0.1); beep(1000,0.15,0.1); }
    function playErr() { let o = audio.createOscillator(); o.type='sawtooth'; o.connect(audio.destination); o.frequency.setValueAtTime(150, audio.currentTime); o.start(); o.stop(audio.currentTime+0.5); }

    function showTab(t) { 
        document.querySelectorAll('[id^="tab-"]').forEach(x=>x.classList.add('hidden')); 
        document.getElementById('tab-'+t).classList.remove('hidden'); 
        document.getElementById('nav-op').classList.toggle('active', t==='operativa'); 
        document.getElementById('nav-com').classList.toggle('active', t==='komunikace'); 
        if(t==='komunikace') loadReports(); 
    }
    
    function checkAuth() { 
        let t = document.getElementById('tech-select').value, p = document.getElementById('tech-pin').value, r = document.getElementById('role-select').value;
        if (PINS[t] === p) { 
            if (r === "") {
                alert("⚠️ ZAPOMNĚL JSI VYBRAT ROLI Z PRVNÍHO MENU!");
                document.getElementById('tech-pin').value = "";
                return;
            }
            
            // --- OCHRANA PŘÍSTUPU VEDOUCÍHO ---
            if (r === "VEDOUCÍ" && t !== "Král" && t !== "Vaibar" && t !== "Janča") {
                alert("⛔ PŘÍSTUP ODEPŘEN: Do sekce VEDOUCÍ mají přístup pouze Král, Vaibar a Janča!");
                document.getElementById('tech-pin').value = "";
                return;
            }

            tech = t; role = r; 
            document.getElementById('login-card').classList.add('hidden'); 
            
            if(role === "VEDOUCÍ") {
                document.getElementById('target-tech').innerHTML = document.getElementById('tech-select').innerHTML;
                document.getElementById('boss-card').classList.remove('hidden');
                loadReports();
                setInterval(loadReports, 10000);
            } else { 
                document.getElementById('main-nav').classList.remove('hidden'); 
                showTab('operativa'); 
                history = JSON.parse(localStorage.getItem('h_'+tech)||'[]'); 
                queue = JSON.parse(localStorage.getItem('q_'+tech)||'[]'); 
                renderHistory(); updateQueueUI(); 
                setInterval(processQueue, 5000); 
                
                let saved = localStorage.getItem('az_end_'+tech); 
                if(saved && parseInt(saved) > Date.now()) startAzor(parseInt(saved));
            }
        }
    }

    function addToQueue(type, code, msg = "", endTime = null) {
        const ts = new Date().getTime(); 
        const loc = "http://maps.google.com/?q=0"+frozenLoc;
        const item = { type, code, technician: tech, role: role, message: msg, location: loc, timestamp: ts, battery: batt, endTime: endTime };
        queue.push(item); 
        localStorage.setItem('q_'+tech, JSON.stringify(queue)); 
        updateQueueUI();
        
        if(type !== 'check' && type !== 'task_response') {
            let hName = MAPA_NAZVU[code] || code; 
            history.push({ ts, code, status: 'wait', name: hName }); 
            localStorage.setItem('h_'+tech, JSON.stringify(history)); 
            renderHistory();
        }
        processQueue();
    }

    async function processQueue() {
        if (processing || !tech) return;
        if (!navigator.onLine) { document.getElementById('status').innerText = "OFFLINE (FRONTA)"; return; }
        processing = true; 
        
        let isCheck = false;
        let p;
        
        if (queue.length > 0) {
            p = queue[0];
        } else {
            p = { type: 'check', technician: tech, timestamp: Date.now() };
            isCheck = true;
        }
        
        try {
            const resp = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(p)
            });
            const text = await resp.text(); 
            let res;
            try { res = JSON.parse(text); } catch (err) { throw new Error("Chyba z GAS"); }
            
            if (res.status === "OK") { 
                if (!isCheck) {
                    queue.shift(); localStorage.setItem('q_'+tech, JSON.stringify(queue)); updateQueueUI(); 
                    let idx = history.findIndex(h => h.ts === p.timestamp); 
                    if (idx > -1) { history[idx].status = 'ok'; renderHistory(); }
                }
                
                if (res.task && Date.now() > snooze) { 
                    document.getElementById('task-box').style.display = 'block'; 
                    document.getElementById('task-text').innerText = res.task; 
                } else if (!res.task) { 
                    document.getElementById('task-box').style.display = 'none'; 
                }
                document.getElementById('status').innerText = "ONLINE";
            }
        } catch (e) { 
            if(!isCheck) document.getElementById('status').innerText = "CHYBA: " + e.message; 
        } 
        finally { processing = false; if(queue.length > 0) setTimeout(processQueue, 1000); }
    }

    function renderHistory() { 
        const b = document.querySelector("#h-table tbody"); b.innerHTML = ""; 
        [...history].reverse().slice(0, 8).forEach(h => { 
            b.innerHTML += `<tr class="${h.status==='ok'?'row-ok':''}"><td>${new Date(h.ts).toLocaleTimeString()}</td><td>${h.name}</td><td>${h.status==='ok'?'✔️':'⌛'}</td></tr>`; 
        }); 
    }

    function startScanner() { 
        if(!reader) reader = new ZXing.BrowserMultiFormatReader();
        document.getElementById('cam-container').style.display='block'; 
        reader.decodeFromVideoDevice(null,'video', res => { 
            if(res){ 
                let c = res.text.trim(); 
                if(ALLOWED.includes(c)){ 
                    stopScanner(); playOk(); 
                    document.getElementById('flash-ok').style.display='flex'; 
                    setTimeout(()=>document.getElementById('flash-ok').style.display='none', 800); 
                    addToQueue('scan', c, document.getElementById('scan-note').value); 
                    document.getElementById('scan-note').value=""; 
                } else { 
                    stopScanner(); playErr(); 
                    document.getElementById('flash-error').style.display='flex'; 
                    setTimeout(()=>document.getElementById('flash-error').style.display='none', 1200); 
                } 
            } 
        }); 
    }
    function stopScanner() { if(reader) reader.reset(); document.getElementById('cam-container').style.display='none'; }

    function startHold(e, v, id=null, step=3.33) { 
        e.preventDefault(); 
        if(holdT) clearInterval(holdT);
        holdP = 0; 
        holdT = setInterval(() => { 
            holdP += step; 
            let pId = (v==='RESOLVE'?'prog-res-'+id:(v==='HOTOVO'?'prog-h':'prog-n')); 
            if(v==='AZ_STOP') pId='prog-az'; 
            let el = document.getElementById(pId);
            if(el) el.style.width = holdP + '%'; 
            
            if(holdP>=100) { 
                clearInterval(holdT); holdT = null;
                if(v==='AZ_STOP') stopAzor(); 
                else if(v==='RESOLVE') resolveReport(id); 
                else { addToQueue('task_response', v, v); document.getElementById('task-box').style.display='none'; } 
                stopHold(); 
            } 
        }, 100); 
    }
    function stopHold() { if(holdT) clearInterval(holdT); holdT = null; document.querySelectorAll('.hold-progress').forEach(x => x.style.width='0%'); }

    function showAzor() { document.getElementById('azor-setup').style.display='block'; }
    function hideAzor() { document.getElementById('azor-setup').style.display='none'; }
    
    function startAzor(manualEnd = null) { 
        let s, endTime; 
        if(manualEnd) { 
            endTime = manualEnd;
            s = Math.floor((manualEnd - Date.now()) / 1000); 
        } else { 
            let mins = parseInt(document.getElementById('az-val').value); 
            s = mins * 60; 
            endTime = Date.now() + (s * 1000); 
            localStorage.setItem('az_end_'+tech, endTime); 
            addToQueue('azor_start','START', 'Azor Aktivován', endTime); 
        }
        document.getElementById('azor-setup').style.display='none'; 
        document.getElementById('az-stop').classList.remove('hidden'); 
        
        if(azTimer) clearInterval(azTimer); 
        azTimer = setInterval(() => { 
            s--; 
            if(s<=0){ 
                stopAzor(); 
                addToQueue('deadman_alarm','ALARM', 'AZOR ALARM!'); 
            } else {
                document.getElementById('az-timer').innerText = "⏳ "+Math.floor(s/60)+":"+(s%60).toString().padStart(2,'0'); 
            }
        }, 1000); 
    }
    
    function stopAzor() { 
        clearInterval(azTimer); 
        localStorage.removeItem('az_end_'+tech); 
        addToQueue('azor_stop','STOP', 'Azor Ukončen'); 
        document.getElementById('az-stop').classList.add('hidden'); 
    }

    function ackTask() { snooze = Date.now() + (2*60*60*1000); document.getElementById('task-box').style.display = 'none'; }

    function setupSlider(hId, sId, cb) { 
        const h = document.getElementById(hId), s = document.getElementById(sId); let d = false; 
        const startDrag = () => d=true;
        const moveDrag = (clientX) => {
            if(!d) return; 
            let x = clientX - s.getBoundingClientRect().left - 25; 
            x = Math.max(5, Math.min(x, s.offsetWidth-55)); 
            h.style.left = x+'px'; 
            if(x > s.offsetWidth-60){ d=false; h.style.left='5px'; cb(); } 
        };
        const stopDrag = () => { d=false; h.style.left='5px'; };

        h.addEventListener('touchstart', startDrag); 
        h.addEventListener('mousedown', startDrag);
        window.addEventListener('touchmove', e => moveDrag(e.touches[0].clientX)); 
        window.addEventListener('mousemove', e => moveDrag(e.clientX));
        window.addEventListener('touchend', stopDrag); 
        window.addEventListener('mouseup', stopDrag);
    }
    
    setupSlider('h-sos','sos-slider',()=>addToQueue('SOS','SOS', 'SOS ALARM!')); 
    setupSlider('h-work','work-slider',()=>handleWork('start'));
    setupSlider('h-call','call-slider',()=> { 
        const c = prompt("Volat: 1=112 (Nouzová linka), 2=Král, 3=Vaibar, 4=Janča", "1"); 
        if(c==="1") window.location.href="tel:112"; 
        else if(c==="2") window.location.href="tel:+420731164657"; 
        else if(c==="3") window.location.href="tel:+420730890167"; 
        else if(c==="4") window.location.href="tel:+420734567890"; 
    });

    function handleWork(t) { 
        if(t==='start'){ 
            addToQueue('work_start','START', 'Zahájení práce'); 
            document.getElementById('work-slider').classList.add('hidden'); 
            document.getElementById('btn-work-end').classList.remove('hidden'); 
        } else { 
            addToQueue('work_end','STOP', 'Ukončení práce'); 
            document.getElementById('work-slider').classList.remove('hidden'); 
            document.getElementById('btn-work-end').classList.add('hidden'); 
        } 
    }

    function updateQueueUI() { 
        const qEl = document.getElementById('queue-count'); 
        if (queue.length > 0) { qEl.classList.remove('hidden'); qEl.innerText = "ČEKÁ ZÁZNAMŮ: " + queue.length; } 
        else { qEl.classList.add('hidden'); } 
    }

    async function addReport() { 
        let t1 = document.getElementById('new-report-text') ? document.getElementById('new-report-text').value.trim() : ""; 
        let t2 = document.getElementById('boss-new-report-text') ? document.getElementById('boss-new-report-text').value.trim() : "";
        let msg = t1 || t2;
        
        if(!msg) return; 
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'add_report', technician: tech, message: msg, timestamp: Date.now() }) }); 
            if(document.getElementById('new-report-text')) document.getElementById('new-report-text').value=""; 
            if(document.getElementById('boss-new-report-text')) document.getElementById('boss-new-report-text').value=""; 
            loadReports(); 
        } catch(e) { alert("Chyba odesílání: " + e.message); }
    }
    
    async function loadReports() { 
        const l1 = document.getElementById('report-list'); 
        const l2 = document.getElementById('boss-report-list'); 
        if(l1) l1.innerHTML = "Načítám nástěnku..."; 
        if(l2) l2.innerHTML = "Načítám nástěnku..."; 
        
        try {
            const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'get_reports' }) }); 
            const d = await resp.json(); 
            let html = ""; 
            if(d.reports) d.reports.forEach(x => { 
                const t = new Date(x.time); 
                const f = t.toLocaleDateString('cs-CZ')+" "+t.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}); 
                html += `<div class="report-item"><span class="report-meta">${f} | Autor: ${x.author}</span><span class="report-content">${x.text}</span><div class="delete-btn-mini btn-hold" ontouchstart="startHold(event,'RESOLVE',${x.id},5)" ontouchend="stopHold()" onmousedown="startHold(event,'RESOLVE',${x.id},5)" onmouseup="stopHold()" onmouseleave="stopHold()"><div class="hold-progress" id="prog-res-${x.id}"></div><svg width="20" height="20" fill="var(--danger)" viewBox="0 0 24 24" style="z-index:2; position:relative;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div></div>`; 
            }); 
            if(l1) l1.innerHTML = html;
            if(l2) l2.innerHTML = html;
        } catch(e) { 
            if(l1) l1.innerHTML = "Chyba načítání: " + e.message; 
            if(l2) l2.innerHTML = "Chyba načítání: " + e.message; 
        }
    }
    
    async function resolveReport(id) { 
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'resolve_report', rowId: id }) }); 
            loadReports(); 
        } catch(e) {}
    }
    
    function sendQuickMsg() { 
        const m = document.getElementById('quick-msg').value.trim(); 
        if(m) { 
            addToQueue('message', 'ZPRÁVA', m); 
            document.getElementById('quick-msg').value=""; 
            alert("Odesláno na Telegram!"); 
        } 
    }
    
    async function submitBossTask() { 
        const tt = document.getElementById('target-tech').value;
        const tx = document.getElementById('boss-task-text').value.trim(); 
        if(!tx) return; 
        try {
            await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'add_task', targetTech:tt, taskText:tx, technician:tech, timestamp: Date.now()})}); 
            document.getElementById('boss-task-text').value=""; 
            alert("Úkol byl úspěšně odeslán!"); 
        } catch(e) { alert("Chyba odeslání úkolu: " + e.message); }
    }
</script>
