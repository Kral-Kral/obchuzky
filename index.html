<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM Control system</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1a1a1a; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; --navy: #000080; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); color: var(--text); text-align: center; -webkit-tap-highlight-color: transparent; }
        .card { background: var(--card); padding: 15px; margin-bottom: 10px; border: 1px solid #333; border-radius: 4px; }
        input, select, textarea, #task-text, .report-content, #boss-task-text { font-size: 20px !important; font-weight: bold; width: 100%; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; padding: 12px; margin: 5px 0; border-radius: 4px; }
        @keyframes border-blink { 0% { border-color: var(--warning); } 50% { border-color: #fff; } 100% { border-color: var(--warning); } }
        .blink-active { animation: border-blink 0.6s infinite; border-width: 5px !important; }
        .tech-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #222; padding: 10px; border: 1px solid #444; max-height: 200px; overflow-y: auto; text-align: left; margin: 10px 0; }
        .tech-item { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; color: #bbb; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #1a1a1a; border-top: 1px solid #333; display: flex; z-index: 1000; }
        .tab-btn { flex: 1; background: none; border: none; color: #777; font-weight: bold; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 2px; }
        .report-item { position: relative; background: #222; padding: 12px; margin-bottom: 8px; text-align: left; border: 1px solid #555; border-radius: 4px; min-height: 60px; }
        .report-meta { font-size: 12px; color: var(--danger); border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 6px; display: block; font-weight: bold; }
        .delete-btn-mini { position: absolute; top: 8px; right: 8px; width: 85px; height: 45px; background: #1a331a; border: 1px solid var(--success); display: flex; align-items: center; justify-content: center; touch-action: none; overflow: hidden; font-size: 11px; font-weight: bold; color: white; border-radius: 4px; cursor: pointer; z-index: 20; }
        .btn { border: none; font-weight: bold; width: 100%; padding: 18px; font-size: 17px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; border-radius: 4px; }
        .btn-hold { position: relative; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.4); z-index: 1; pointer-events: none; }
        .slider-container { position: relative; width: 100%; height: 55px; border-radius: 30px; border: 2px solid var(--danger); background: #200; overflow: hidden; margin-top: 8px; user-select: none; }
        .slider-handle { position: absolute; left: 4px; top: 4px; width: 45px; height: 45px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; font-size: 22px; cursor: pointer; z-index: 10; transition: transform 0.1s; }
        .slider-text { line-height: 55px; font-size: 16px; font-weight: bold; pointer-events: none; z-index: 5; position: relative; }
        .slider-work { border-color: var(--primary); background: #001529; }
        .slider-work .slider-handle { background: var(--primary); }
        .slider-azor { border-color: var(--warning); background: #221a00; height: 60px; border-radius: 10px; margin-top: 15px; overflow: visible; }
        .slider-azor .slider-handle { background: none; border: none; width: 80px; height: 80px; top: -10px; left: -10px; font-size: 65px; display: flex; align-items: center; justify-content: center; }
        table { width: 100%; font-size: 13px; margin-top: 8px; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: left; }
        .hidden { display: none !important; }
        #flash-ok, #flash-error { position: fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; z-index:10000; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">

<div id="flash-ok" style="background:var(--success); color:white; font-size:50px;">✔️</div>
<div id="flash-error" style="background:var(--danger); color:white; font-size:50px;">❌</div>

<div class="tab-bar hidden" id="main-nav">
    <button class="tab-btn active" id="nav-op" onclick="showTab('operativa')"><svg viewBox="0 0 24 24"><path d="M13.13 7.11l-4.97 4.97 1.06 1.06 4.97-4.97V15h1.5V6H6.5v1.5h6.63zM20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>OPERATIVA</button>
    <button class="tab-btn" id="nav-com" onclick="showTab('komunikace')"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-10H6v2h12V4z"/></svg>NÁSTĚNKA</button>
    <button class="tab-btn" id="nav-iss" onclick="showTab('zavady')"><svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>ZÁVADY</button>
</div>

<div class="card" id="login-card">
    <h2 style="color:var(--primary);">AQM System</h2>
    <select id="role-select"><option value="">-- VYBER ROLI --</option><option value="Technolog">Technolog</option><option value="VEDOUCÍ">VEDOUCÍ (Admin)</option></select>
    <select id="tech-select">
        <option value="">-- VYBER JMÉNO --</option>
        <optgroup label="VEDENÍ"><option value="Král">Král</option><option value="Vaibar">Vaibar</option><option value="Janča">Janča</option></optgroup>
        <optgroup label="TECHNOLOGOVÉ"><option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option></optgroup>
    </select>
    <input type="password" id="tech-pin" placeholder="PIN" oninput="checkAuth()" maxlength="4" inputmode="numeric">
</div>

<div id="tab-operativa" class="hidden" style="padding-bottom:70px;">
    <div id="task-box" class="card" style="display:none; border:5px solid var(--warning);">
        <div id="task-text"></div>
        <div style="display:flex; gap:5px;">
            <button class="btn btn-hold" style="background:#1a5c27;" onmousedown="startHold(event, 'HOTOVO', null, 5.0)" onmouseup="stopHold()" ontouchstart="startHold(event, 'HOTOVO', null, 5.0)" ontouchend="stopHold()"><div class="hold-progress" id="prog-h"></div>HOTOVO</button>
            <button class="btn btn-hold" style="background:#7a1a14;" onmousedown="startHold(event, 'NELZE', null, 5.0)" onmouseup="stopHold()" ontouchstart="startHold(event, 'NELZE', null, 5.0)" ontouchend="stopHold()"><div class="hold-progress" id="prog-n"></div>NELZE</button>
        </div>
    </div>
    <div class="card">
        <div class="slider-container slider-work" id="work-slider"><div class="slider-text">>>> START PRÁCE >>></div><div id="h-work" class="slider-handle">🚩</div></div>
        <div class="slider-container hidden" id="work-end-slider" style="border-color:var(--danger); background:#200;"><div class="slider-text">>>> KONEC PRÁCE >>></div><div id="h-work-end" class="slider-handle">🏁</div></div>
    </div>
    <textarea id="scan-note" placeholder="Poznámka ke skenu..."></textarea>
    <button class="btn" style="background:var(--navy);" onclick="startScanner()">QR SKEN BODU</button>
    <div id="cam-container" style="display:none;"><video id="video" style="width:100%; background:#000;"></video></div>
    <div class="slider-container slider-azor" id="azor-slider"><div class="slider-text">POTÁHNI PRO AZORA</div><div id="h-azor" class="slider-handle">🐕</div></div>
    <div id="azor-setup" style="display:none;" class="card">
        <input type="number" id="az-val" value="15" style="text-align:center;">
        <button class="btn" style="background:var(--success);" onclick="startAzor()">SPUSTIT ODPOČET</button>
    </div>
    <button id="az-stop" class="btn btn-hold hidden" style="background:#222; color:var(--warning); border:2px solid var(--warning);" onmousedown="startHold(event, 'AZ_STOP', null, 5.0)" onmouseup="stopHold()" ontouchstart="startHold(event, 'AZ_STOP', null, 5.0)" ontouchend="stopHold()"><div class="hold-progress" id="prog-az"></div><span id="az-timer">⏳ AZOR AKTIVNÍ (2s)</span></button>
    <div class="slider-container" id="sos-slider"><div class="slider-text">>>> SOS PŘEJETÍ >>></div><div id="h-sos" class="slider-handle">🆘</div></div>
    <div class="slider-container" style="border-color:#fff; background:#222; margin-top:10px;" id="call-slider"><div class="slider-text" style="color:#fff;">>>> VOLAT VEDENÍ >>></div><div id="h-call" class="slider-handle" style="background:#fff; color:#000;">📞</div></div>
    <div class="card" id="history-section">
        <button class="btn btn-hold" style="background:#311; border:1px solid var(--danger); margin-bottom:10px;" onmousedown="startHold(event, 'DEL_HIST_ALL', null, 5.0)" onmouseup="stopHold()" ontouchstart="startHold(event, 'DEL_HIST_ALL', null, 5.0)" ontouchend="stopHold()">
            <div class="hold-progress" id="prog-hist-all"></div>🗑️ SMAZAT HISTORII (2s)
        </button>
        <table id="h-table"><tbody></tbody></table>
    </div>
</div>

<div id="tab-komunikace" class="hidden" style="padding-bottom:70px;">
    <div class="card"><h3>📋 NÁSTĚNKA</h3><div id="report-list"></div><textarea id="new-report-text" placeholder="Zapsat..."></textarea><button class="btn" style="background:var(--primary);" onclick="addReport()">➕ PŘIDAT</button></div>
</div>

<div id="tab-zavady" class="hidden" style="padding-bottom:70px;">
    <div class="card" style="border: 2px solid var(--danger);">
        <textarea id="issue-text" placeholder="Popište závadu..."></textarea>
        <button class="btn" style="background:var(--danger);" onclick="sendIssueReport()">📧 ODESLAT</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    const PINS = {"Král":"2013","Vaibar":"2013","Janča":"2013","Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    const MAPA_NAZVU = {"KB001":"ROZVADĚČ WELLNESS RM.010","KB002":"ROZVADĚČ WEL. OCHLAZOVÁK","KB003":"ROZVADĚČ U KOČÁRKÁRNA","KB004":"ROZVODNA RS 1.1","KB005":"ROZVODNA RS 2.1","KB006":"KOTELNA","KB007":"VZT. BAZÉNOVÁ HALA","KB008":"KGJ. NAŠE","KB009":"VZT. STŘECHA 1","KB010":"VZT. STŘECHA 2","KB011":"VZT. ADROŠ-VRCHNÍ JEDNOTKY","KB012":"HLAVNÍ ROZVODNA","KB013":"BATERKÁRNA","KB014":"VZT. GASTRO","KB015":"ROZVODNA ADROŠ RM0.2","KB016":"SCHNEIDER","KB017":"VZT ADROŠ-SPODNÍ JEDNOTKY","KB018":"ROZVADĚČ KAVÁRNA","KB019":"STROJOVNA VLNY, ATRAKCE","KB020":"ROZVADĚČ RS3.1","KB021":"STROJOVNA ABYSS","KB022":"NOVÝ AREÁL KOTELNA","KB023":"NOVÝ AREÁL VZT","KB024":"NOVÝ A. FILTRY","KB025":"NOVÝ A. STROJ. ČERPADLA","KB026":"JÍMKA PITNÉ VODY","KB027":"REWAT PLASTOVÁ JÍMKA","KB028":"JÍMKA JEZERNÍ VODY","KB029":"ROZVODNA WELL. 2 NP","KB030":"KGJ E.ON","KB031":"VZT WELLNESS","KB032":"TEPELKO","KB033":"OZONGENERÁTOR-ÚPRAVNA","KB034":"ROZVADĚČ RS 2.2","KB035":"ROZVADĚČ- CHODBA GASTRO","KB036":"CHLOROVNA","KB037":"WELLNESS RS 0.3","KB038":"ZÁVLAHA STARÝ AREÁL","KB039":"VRT","KB040":"SHZ","KB044":"ŠACHTA-U BURGERU","KB045":"ŠACHTA- U PARSHALLU","KB046":"ŠACHTA-U HRADU","KB047":"ŠACHTA-ROH ŘEKY","KB048":"ŠACHTA-VEDLE MOSTU","KB049":"ŠACHTA POD H5","KB050":"STROJOVNA A","KB051":"STROJOVNA B","KB052":"Tech. míst. Bečka","KB053":"STROJOVNA 2.60","KB054":"STŘECHA 1","KB055":"STŘECHA 2","KB056":"STŘECHA 3","KB057":"ROZVODNA ABYSS","KB058":"SNĚŽNÁ-TECHNICKÁ MÍSTNOST","KB059":"TECHNICKÁ PANORAMA","KB060":"PAROGENERÁTORY/ROZVADĚČ 2.NP","KB061":"TECHNICKÁ-CALDARIUM","KB062":"CHLOROVNA-NOVÝ AREÁL","KB063":"ROZVADĚČ RM 4/1","KB064":"HL. ROZVODNA V NOVÉM AREÁLU","KB065":"FILTR E.ON V TUNELU"};

    let tech = "", role = "", reader = null, azTimer = null, frozenLoc = "0,0", audio = null, history = [], queue = [], holdT = null, holdP = 0;

    navigator.geolocation.watchPosition(p => { frozenLoc = p.coords.latitude + "," + p.coords.longitude; });

    function initAudio() { if(!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); }

    function showTab(t) { 
        document.querySelectorAll('[id^="tab-"]').forEach(x=>x.classList.add('hidden')); 
        document.getElementById('tab-'+t).classList.remove('hidden'); 
        if(t==='komunikace') loadReports(); 
    }

    function checkAuth() { 
        let t = document.getElementById('tech-select').value, pInput = document.getElementById('tech-pin'), p = pInput.value, r = document.getElementById('role-select').value; 
        if (p.length === 4 && PINS[t] === p) { 
            if (r === "") { alert("VYBER ROLI!"); pInput.value = ""; return; } 
            tech = t; role = r; document.getElementById('login-card').classList.add('hidden'); 
            document.getElementById('main-nav').classList.remove('hidden'); showTab('operativa'); 
            history = JSON.parse(localStorage.getItem('h_'+tech)||'[]'); renderHistory();
        } 
    }

    function startHold(e, v, id=null, step=5.0) { 
        if(e.type === 'touchstart') e.preventDefault(); 
        if(holdT) clearInterval(holdT); 
        holdP = 0; 
        holdT = setInterval(() => { 
            holdP += step; 
            let pId = (v==='HOTOVO')?'prog-h':(v==='NELZE')?'prog-n':(v==='AZ_STOP')?'prog-az':(v==='RESOLVE')?'prog-res-'+id:(v==='DEL_HIST_ALL')?'prog-hist-all':'';
            let el = document.getElementById(pId); if(el) el.style.width = holdP + '%'; 
            if(holdP>=100) { 
                clearInterval(holdT); holdT = null; 
                if(v==='AZ_STOP') stopAzor(); 
                else if(v==='RESOLVE') resolveReport(id); 
                else if(v==='DEL_HIST_ALL') { history = []; localStorage.setItem('h_'+tech, JSON.stringify(history)); renderHistory(); }
                else { addToQueue('task_response',v,v); document.getElementById('task-box').style.display='none'; } 
                stopHold(); 
            } 
        }, 100); 
    }
    function stopHold() { if(holdT) clearInterval(holdT); holdT = null; document.querySelectorAll('.hold-progress').forEach(x => x.style.width='0%'); }

    async function addToQueue(type, code, msg, endTime = null) {
        const item = { type: type, technician: tech, role: role, message: msg, location: frozenLoc, timestamp: Date.now(), endTime: endTime };
        if(type === 'scan' || type === 'work_start' || type === 'SOS') { history.push({ts: Date.now(), name: MAPA_NAZVU[code] || msg}); localStorage.setItem('h_'+tech, JSON.stringify(history)); renderHistory(); }
        try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(item) }); } catch(e){}
    }

    function renderHistory() { 
        const b = document.querySelector("#h-table tbody"); b.innerHTML = ""; 
        [...history].reverse().slice(0, 8).forEach(h => { b.innerHTML += `<tr><td>${new Date(h.ts).toLocaleTimeString()}</td><td>${h.name}</td></tr>`; }); 
    }

    function startAzor() { 
        let mins = parseInt(document.getElementById('az-val').value); let s = mins * 60;
        document.getElementById('azor-setup').style.display='none'; document.getElementById('az-stop').classList.remove('hidden'); 
        addToQueue('azor_start', 'azor', 'Azor spuštěn', Date.now() + (mins * 60000));
        azTimer = setInterval(() => { s--; if(s<=0){ stopAzor(); addToQueue('SOS','AZOR','ALARM AZOR!'); } else { document.getElementById('az-timer').innerText = "⏳ AZOR: "+Math.floor(s/60)+":"+(s%60).toString().padStart(2,'0'); } }, 1000); 
    }
    function stopAzor() { clearInterval(azTimer); document.getElementById('az-stop').classList.add('hidden'); addToQueue('azor_stop', 'azor', 'Konec Azora'); }

    async function loadReports() { 
        try { 
            const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'get_reports' }) }); 
            const d = await resp.json(); let h = ""; 
            d.reports.forEach(x => { 
                h += `<div class="report-item"><span>${x.author}: ${x.text}</span>
                    <div class="delete-btn-mini btn-hold" onmousedown="startHold(event,'RESOLVE',${x.id})" onmouseup="stopHold()" ontouchstart="startHold(event,'RESOLVE',${x.id})" ontouchend="stopHold()">
                        <div class="hold-progress" id="prog-res-${x.id}"></div>✔️</div></div>`; 
            }); 
            document.getElementById('report-list').innerHTML = h;
        } catch(e){} 
    }
    async function addReport() { let tx = document.getElementById('new-report-text').value; if(!tx) return; await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'add_report', technician: tech, message: tx }) }); document.getElementById('new-report-text').value = ""; loadReports(); }
    async function resolveReport(id) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'resolve_report', rowId: id }) }); loadReports(); }

    function setupSlider(hId, sId, cb) { 
        const h = document.getElementById(hId), s = document.getElementById(sId); let d = false; 
        const mv = (cX) => { if(!d) return; let x = cX - s.getBoundingClientRect().left - 22; x = Math.max(4, Math.min(x, s.offsetWidth-50)); h.style.left = x+'px'; if(x > s.offsetWidth-55){ d=false; h.style.left='4px'; cb(); } }; 
        h.addEventListener('mousedown', () => d=true); h.addEventListener('touchstart', () => d=true);
        window.addEventListener('mousemove', e => mv(e.clientX)); window.addEventListener('touchmove', e => mv(e.touches[0].clientX));
        window.addEventListener('mouseup', () => { d=false; h.style.left='4px'; }); window.addEventListener('touchend', () => { d=false; h.style.left='4px'; });
    }
    setupSlider('h-sos','sos-slider',() => addToQueue('SOS','SOS','ALARM SOS!')); 
    setupSlider('h-work','work-slider',() => { document.getElementById('work-slider').classList.add('hidden'); document.getElementById('work-end-slider').classList.remove('hidden'); addToQueue('work_start','START','Práce zahájena'); });
    setupSlider('h-work-end','work-end-slider',() => { document.getElementById('work-slider').classList.remove('hidden'); document.getElementById('work-end-slider').classList.add('hidden'); addToQueue('work_end','STOP','Práce ukončena'); });
    setupSlider('h-azor','azor-slider',() => document.getElementById('azor-setup').style.display='block');
    setupSlider('h-call', 'call-slider', () => { let c = prompt("1=112, 2=Král, 3=Vaibar", "2"); if(c==="1") window.location.href="tel:112"; else if(c==="2") window.location.href="tel:+420731164656"; });

    function startScanner() { if(!reader) reader = new ZXing.BrowserMultiFormatReader(); document.getElementById('cam-container').style.display='block'; reader.decodeFromVideoDevice(null,'video', res => { if(res){ stopScanner(); addToQueue('scan', res.text.trim(), document.getElementById('scan-note').value); document.getElementById('scan-note').value=""; } }); }
    function stopScanner() { if(reader) reader.reset(); document.getElementById('cam-container').style.display='none'; }
</script>
</body>
</html>
