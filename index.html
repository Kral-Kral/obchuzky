<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM CONTROL PRO</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); text-align: center; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #333; }
        h2 { margin-top: 0; font-weight: 600; letter-spacing: 1px; color: var(--primary); }
        select, input, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #333; border-radius: 12px; font-size: 16px; background: #2c2c2e; color: #fff; box-sizing: border-box; outline: none; }
        .btn { border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 17px; margin-bottom: 10px; color: white; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-scan { background: var(--primary); }
        .btn-bdelost { background: var(--warning); color: #000; }
        
        /* SOS Slider Style */
        .sos-container { position: relative; width: 100%; height: 70px; background: #333; border-radius: 35px; margin-top: 20px; overflow: hidden; border: 2px solid var(--danger); }
        .sos-text { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items:center; color: var(--danger); font-weight: bold; pointer-events: none; }
        .sos-handle { position: absolute; left: 5px; top: 5px; width: 60px; height: 60px; background: var(--danger); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 2; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        #camera-container { width: 100%; display: none; border-radius: 15px; overflow: hidden; margin-bottom: 10px; border: 2px solid var(--primary); }
        #video { width: 100%; background: #000; }
        #status { font-weight: bold; margin: 15px; color: var(--success); font-size: 14px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; color: #ccc; }
        th, td { border-bottom: 1px solid #333; padding: 12px 8px; text-align: left; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--success); display:none; justify-content:center; align-items:center; z-index:9999; color:white; font-size:100px; }
    </style>
</head>
<body>

<div id="flash">✅</div>

<div class="card">
    <h2>AQM CONTROL PRO</h2>
    <select id="tech-select" onchange="checkAuth()">
        <option value="">-- Vyber pracovníka --</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option>
        <option value="Dalibor Čech">Dalibor Čech</option>
        <option value="René Russwurm st.">René Russwurm st.</option>
        <option value="René Russwurm ml.">René Russwurm ml.</option>
        <option value="Roman Zámečník">Roman Zámečník</option>
        <option value="Marek Slovák">Marek Slovák</option>
        <option value="Martin Kuneš">Martin Kuneš</option>
        <option value="David Mirvald">David Mirvald</option>
        <option value="Petr Illa">Petr Illa</option>
        <option value="Mirek Švarný">Mirek Švarný</option>
        <option value="Lukáš Sem">Lukáš Sem</option>
        <option value="Laďa Poledna">Laďa Poledna</option>
    </select>
    <input type="password" id="tech-pin" placeholder="Zadej PIN autorizace" oninput="checkAuth()">
    
    <div id="controls" style="opacity: 0.2; pointer-events: none; transition: 0.5s;">
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        
        <div id="camera-container">
            <video id="video"></video>
            <button class="btn" onclick="stopScanner()" style="background:#444; margin:0; border-radius:0;">ZAVŘÍT KAMERU</button>
        </div>

        <input type="text" id="scan-note" placeholder="Poznámka ke skenu (nepovinné)">
        <button class="btn btn-scan" onclick="startScanner()">📷 SKENOVAT KONTROLNÍ BOD</button>
        <button id="deadman-btn" class="btn btn-bdelost" onclick="toggleDeadman()">⏲ KONTROLA BDĚLOSTI</button>

        <div class="sos-container" id="sos-slider">
            <div class="sos-text">PŘETÁHNI PRO SOS >>></div>
            <div class="sos-handle" id="handle">🆘</div>
        </div>
    </div>
</div>

<div class="card">
    <textarea id="boss-msg" placeholder="Rychlá zpráva pro vedoucího..."></textarea>
    <div id="status">SYSTÉM UZAMČEN</div>
    <table id="history-table">
        <thead><tr><th>Čas</th><th>Poslední aktivita</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec";
    const PINS = {"Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    
    let selectedTech = "", codeReader = new ZXing.BrowserMultiFormatReader(), deadmanTimer = null, lastLoc = "Zjišťuji GPS...";
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    navigator.geolocation.watchPosition((pos) => {
        lastLoc = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
    }, null, { enableHighAccuracy: true });

    function feedback() {
        try { const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.connect(g); g.connect(audioCtx.destination); osc.frequency.value = 880; g.gain.value = 0.1; osc.start(); osc.stop(audioCtx.currentTime + 0.2); } catch(e) {}
        document.getElementById('flash').style.display = 'flex';
        setTimeout(() => { document.getElementById('flash').style.display = 'none'; }, 600);
    }

    function checkAuth() {
        if (PINS[document.getElementById('tech-select').value] === document.getElementById('tech-pin').value) {
            selectedTech = document.getElementById('tech-select').value;
            document.getElementById('controls').style.opacity = "1";
            document.getElementById('controls').style.pointerEvents = "all";
            document.getElementById('status').innerText = "AKTIVNÍ: " + selectedTech;
        } else {
            document.getElementById('controls').style.opacity = "0.2";
            document.getElementById('controls').style.pointerEvents = "none";
        }
    }

    async function startScanner() {
        document.getElementById('camera-container').style.display = 'block';
        codeReader.decodeFromVideoDevice(null, 'video', (res) => { if (res) { stopScanner(); sendData('scan', res.text); } });
    }
    function stopScanner() { codeReader.reset(); document.getElementById('camera-container').style.display = 'none'; }
    
    function toggleDeadman() {
        if (!deadmanTimer) {
            let m = prompt("Za kolik minut?", "15"); if (!m) return;
            deadmanTimer = setTimeout(() => { sendData('deadman_alarm', 'ALARM-BDĚLOST'); }, m * 60000);
            document.getElementById('deadman-btn').innerText = "⏲ ODPOCET BĚŽÍ...";
        } else {
            clearTimeout(deadmanTimer); deadmanTimer = null;
            document.getElementById('deadman-btn').innerText = "⏲ KONTROLA BDĚLOSTI";
        }
    }

    function sendData(type, code) {
        let note = document.getElementById('scan-note').value;
        document.getElementById('status').innerText = "⏳ ODESÍLÁM...";
        fetch(SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ type: type, code: code, technicians: [selectedTech], message: document.getElementById('boss-msg').value, note: note, location: lastLoc })
        }).then(() => {
            feedback();
            document.getElementById('status').innerText = "✅ DATA ULOŽENA";
            updateHistory(type, code);
            document.getElementById('scan-note').value = ""; // vymazat poznámku po odeslání
        });
    }

    function updateHistory(type, code) {
        const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${type}: ${code}</td></tr>`;
        document.querySelector("#history-table tbody").insertAdjacentHTML('afterbegin', row);
    }

    // SOS Slider Logic
    const handle = document.getElementById('handle');
    const slider = document.getElementById('sos-slider');
    let isDragging = false;

    handle.addEventListener('touchstart', (e) => isDragging = true);
    handle.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        let x = e.touches[0].clientX - slider.getBoundingClientRect().left - 30;
        if (x < 5) x = 5;
        if (x > slider.offsetWidth - 65) {
            x = slider.offsetWidth - 65;
            if (isDragging) {
                isDragging = false;
                sendData('SOS', 'MANUÁLNÍ SOS');
                handle.style.left = '5px';
                alert("🆘 SOS VYSLÁNO!");
            }
        }
        handle.style.left = x + 'px';
    });
    handle.addEventListener('touchend', () => { isDragging = false; handle.style.left = '5px'; });
</script>
</body>
</html>
