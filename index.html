<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --bg: #f3f4f6; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 50px; }
        .container { width: 100%; max-width: 400px; padding: 15px; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 24px; padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; border: 1px solid #e5e7eb; }
        #reader, #reader-point { width: 100% !important; border-radius: 16px; overflow: hidden; background: #000; margin-bottom: 15px; min-height: 250px; border: 2px solid var(--primary); }
        .input-box { background: #f9fafb; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e5e7eb; margin-top: 5px; }
        .icon-btn { background: var(--primary); color: white; border: none; border-radius: 10px; width: 44px; height: 44px; font-size: 20px; cursor: pointer; }
        input { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #e5e7eb; font-size: 26px; text-align: center; margin-top: 15px; letter-spacing: 5px; box-sizing: border-box; }
        button.main-btn { width: 100%; padding: 20px; background: var(--success); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
        .hidden { display: none !important; }
        label { font-size: 11px; font-weight: 800; color: #6b7280; text-transform: uppercase; }
    </style>
</head>
<body>

<audio id="beep-sound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="card" id="login-screen">
        <h2 style="margin: 0 0 20px 0; text-align: center;">Control <span style="color:var(--primary)">PRO</span></h2>
        <div id="reader"></div>
        <div style="text-align: left;">
            <label>TECHNIK</label>
            <div class="input-box">
                <span id="worker-display" style="font-weight: 600;">Naskenujte kartu</span>
                <button class="icon-btn" onclick="startCamera('reader', onWorkerScan)">👤</button>
            </div>
        </div>
        <div id="pin-section" class="hidden">
            <input type="password" id="pin-input" placeholder="****" inputmode="numeric">
            <button class="main-btn" onclick="verifyPin()">PŘIHLÁSIT SE</button>
        </div>
    </div>

    <div class="card hidden" id="main-screen">
        <h3 id="active-user" style="color:var(--primary); margin: 0 0 15px 0; text-align: center;"></h3>
        <div id="reader-point" class="hidden"></div>
        <div style="text-align: left;">
            <label>MÍSTO KONTROLY</label>
            <div class="input-box">
                <span id="point-display" style="font-weight: 600;">Skenujte bod</span>
                <button class="icon-btn" onclick="startCamera('reader-point', onPointScan)">📍</button>
            </div>
        </div>
        <button class="main-btn" onclick="saveData()">ZAPSAT DO EVIDENCE</button>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwPZx2ZaIrSErhfPgsz6OYrNxbsTz7KgbsYEbN8Myx8Q7JSJklHyeUiFtsmvimG4qQe/exec";
    
    // PINY NASTAVENÉ PŘÍMO NA JMÉNA
    const USERS = {
        "Jiří Bělíček": "5481", "Dalibor Čech": "2368", "René Russwurm st.": "1798", 
        "René Russwurm ml.": "2849", "Roman Zámečník": "6984", "Marek Slovák": "1179", 
        "Martin Kuneš": "2538", "David Mirvald": "1099", "Petr Illa": "7923", 
        "Mirek Švarný": "1739", "Lukáš Sem": "4197", "Laďa Poledna": "5592"
    };

    let currentUser = "", currentPoint = "", html5QrCode = null;

    function playFeedback() {
        const b = document.getElementById('beep-sound');
        b.volume = 1.0; b.play().catch(()=>{});
        if (navigator.vibrate) navigator.vibrate([400, 100, 400]);
    }

    async function startCamera(elId, callback) {
        // iOS Audio Unlock
        document.getElementById('beep-sound').play().then(()=>document.getElementById('beep-sound').pause()).catch(()=>{});
        
        if (html5QrCode) { await html5QrCode.stop().catch(() => {}); }
        document.getElementById(elId).classList.remove('hidden');
        html5QrCode = new Html5Qrcode(elId);
        
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
            playFeedback();
            html5QrCode.stop().then(() => {
                document.getElementById(elId).classList.add('hidden');
                callback(text);
            });
        }).catch(() => alert("Povolte kameru v Safari!"));
    }

    function onWorkerScan(name) {
        // Očistíme jméno od případných ID (T01 atd.) pokud jsou v QR kódu
        let cleanName = name.replace(/^T\d+\s*/, "").trim();
        
        if (USERS[cleanName]) {
            currentUser = cleanName;
            document.getElementById('worker-display').innerText = cleanName;
            document.getElementById('pin-section').classList.remove('hidden');
        } else {
            alert("Neznámý pracovník: " + cleanName);
        }
    }

    function verifyPin() {
        const input = document.getElementById('pin-input').value;
        if (USERS[currentUser] === input) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('active-user').innerText = currentUser;
        } else {
            alert("ŠPATNÝ PIN!");
            document.getElementById('pin-input').value = "";
        }
    }

    function onPointScan(point) {
        currentPoint = point;
        document.getElementById('point-display').innerText = point;
    }

    function saveData() {
        if (!currentPoint) return alert("Naskenujte bod!");
        navigator.geolocation.getCurrentPosition((pos) => {
            const gps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            const data = { time: new Date().toLocaleString('cs-CZ'), worker: currentUser, place: currentPoint, gps: gps };
            fetch(GOOGLE_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            alert("ZAPSÁNO!");
            location.reload();
        }, () => alert("Povolte polohu GPS!"));
    }
</script>
</body>
</html>
