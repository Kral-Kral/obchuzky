<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KING APPLICATION PRO v1.5.5</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); text-align: center; overflow-x: hidden; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #333; position: relative; }
        #logo-container { width: 100%; display: none; justify-content: center; margin-bottom: 20px; }
        #logo-container img { max-width: 100%; height: auto; max-height: 180px; object-fit: contain; }
        #task-box { background: #2c2c2e; border: 2px solid var(--warning); border-radius: 15px; padding: 15px; margin: 15px 0; display: none; text-align: left; }
        .task-btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-h { background: var(--success); padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; }
        .btn-n { background: var(--danger); padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; }
        select, input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #333; border-radius: 12px; font-size: 16px; background: #2c2c2e; color: #fff; box-sizing: border-box; outline: none; }
        .btn { border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { padding: 18px; font-size: 17px; margin-bottom: 10px; }
        .btn-scan { background: var(--primary); }
        .btn-bdelost { background: var(--warning); color: #000; }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px; font-size: 13px; margin-bottom: 15px; width: auto; display: inline-flex; }
        .sos-container { position: relative; width: 100%; height: 70px; background: #251010; border-radius: 35px; margin-top: 20px; overflow: hidden; border: 2px solid var(--danger); }
        .sos-handle { position: absolute; left: 5px; top: 5px; width: 60px; height: 60px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; font-size: 24px; touch-action: none; }
        #status { font-weight: bold; margin: 15px; color: var(--success); font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; color: #ccc; }
        td, th { padding: 10px 5px; border-bottom: 1px solid #222; text-align: left; }
        .sync-wait { color: var(--warning); font-style: italic; }
        .sync-ok { color: var(--success); font-weight: bold; }
        #flash-ok, #flash-error { position: fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; z-index:9999; color:white; font-size: 120px; font-weight: bold; }
        #flash-ok { background: var(--success); }
        #flash-error { background: var(--danger); }
        .disabled { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">

<div id="flash-ok">✅</div>
<div id="flash-error">❌</div>

<div class="card">
    <div id="logo-container">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAABACAYAAAB79X0FAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAbeSURBVHhe7Z29btxGFIXfXcA1UAX6CUK6XAmvYm3AByD4BfKqSp8gl06SIsUvUD5BOhcBAuRL6SLoKsgXSNcgQYDfXWAHWIAtfof0Y86Qs7u7S3InUuS8P6A0y93Z3R1yXn6ce3Ym9Y0AAAAAAAAAhCHh6Ym8p9Xfvv8Vv2p9vRj8qf0F/MvdV7u7u7vbe8oAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgN30y9vL+vvT57/n70+ff97fPD+8fnbe3z49vF0/ff9P8G6CBe7Pxs/vPf68Np/n98/fP7dXHx5vI/Xp6fT13f5088f+6XvI+0mB/rPxs/3zO8//vpvP8/v37y9uN88Pr731YvAnOxfYvH99MV8X58/fL+f7t8X478X4f78/vF7/8vL0en899m6XQP+zuYB2/f9upvPi7HAtz78uxu+L8X9vD6/Xv78eY79LoH/ZXED78uPd/nj/59N9/bDpH38Vv77/q7/vh7f3f2r8vFuhP7r/t9389W9zgVHz+vvL+rL4/HZeP89W479X439fD6/Xv78eY79LoH/ZXED7/HizvS3On7+t5/ttPfx6fXh9/fvrMfa7BPqXzQW0Lz/e7O+X999f7uuHXf78K6U/+mH7p/vjXyn9UT+63+ufvof8P5sLaP6p/7ebf6X88Xv7+fKef/769Pj6++uxtrsE+m+aC2i+v8ffP59Ov7unFvifzQW0Lz9e/75f3h/fP+0W6I80F7C83L88vr/dzfP5x/PpPCt/leePX58e39/fX6Bv8/z9dfX3/ej+qB/df9pt/m2f+W85X2X9m8WfV3/fj+6P+uO/Vf+0W6B/2VxA8/z4vO8vX8zz/XfzeX7/tZof97fP++9fXp5e76/H3u0S6H82F9C+ff9mf7y9/6++xt9PTzd//f39p0ug/9hcQPP09Pb09Gb9/Y+/6o8fvn7o8p+r/77f98Pr8Z+rf98v0E96fny5f3ze9scvAAAAAAAAALfE728va+rT97+0T7XFf6fOxfH68fT9f6fOQv8qduBfHOzvH523v/mAAAAAAAAAAAAAAADm9mP6l660Nf6Y/qX6O+u/29vX+N/V+N9vD8/Xv78e+7399vA8v97e/unf9pn/mv7p/vF/9cfP+vOvlN7oR/df909/Xv/2B/un90f96P77/ul7yPvX/dOf17997T9/0n/fL9D/bP6323z83f9/u/799dhbPwa/shPz8fNf58v982T/fCffP+/L98/6765/2S3QT3p+fFn/6ffv7f93C/Q/m/+r3f7Y7T9fP395m7/fH5/P397m7/eX9/j77eF5fX9/gb7Z8/Pn83v97m8fW8v3r6vxt6/vD8+vXv8e+7v99fA8v99fX6B/P38+v9f39/bX94D/2fxvd/N/Nf/j/H+r/rYf3f/f7v/vdvP7p/tPvwD+u/O/u83P86v5PP/7fD7Pyn/u8fdfnx7fP+0W6H82F9A8f9v/6Re0/f9f3/fDq7+3D398/fj7f/pP/P6H/fX/7R6e1/f3F+ibPT/e7G8ff//VfP75fD7Pyv/+f3X54+9/fP/n0+n39/QX5C81/8Nf9X/7X/f/v74ffp9/pX/+1/+p/u9f7t9f36Bv9fzwvB+vH0/f/3dqfv7Wfv72X1+F9/S8/74f3h//fX99gb5N9mP+5v86Xz5f7p+nH+fL98/6765/2S3QT3p+fFn/6ffv7f93C/Q/m/+r3f7Y7T9fP395m7/fH5/P397m7/eX9/j77eF5fX9/gb7Z8/Pn83v97m8fW8v3r6vxt6/vD8+vXv8e+7v99fA8v99fX6B/P38+v9f39/bX94D/2fxvd/N/Nf/j/H+r/rYf3f/f7v/vdvP7p/tPvwD+u/O/u83P86v5PP/7fD7Pyn/u8fdfnx7fP+0W6H82F9A8f9v/6Re0/f9f3/fDq7+3D398/fj7f/pP/P6H/fX/7R6e1/f3F+ibPT/e7G8ff//VfP75fD7Pyv/+f3X54+9/fP/n0+n39/QX5C81/8Nf9X/7X/f/v74ffp9/pX/+1/+p/u9f7t9f36Bv9fzwvB+vH0/f/3dqfv7Wfv72X1+F9" alt="KING Logo">
    </div>
    
    <button class="btn btn-logout" onclick="location.reload()">🔒 ODHLÁSIT / ZAMKNOUT</button>
    <select id="tech-select" onchange="checkAuth()">
        <option value="">-- Vyber pracovníka --</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
    </select>
    <input type="password" id="tech-pin" placeholder="PIN" oninput="checkAuth()" onclick="initAudio()">
    
    <div id="task-box">
        <small style="color: var(--warning);">ÚKOL:</small>
        <div id="task-text" style="font-weight: bold; margin-top: 5px; font-size: 16px;"></div>
        <div class="task-btn-group">
            <button class="btn-h" onclick="resolveTask('HOTOVO')">HOTOVO</button>
            <button class="btn-n" onclick="resolveTask('NELZE')">NELZE</button>
        </div>
    </div>

    <div id="controls" class="disabled">
        <div id="camera-container" style="display:none; border-radius:15px; overflow:hidden; border:2px solid var(--primary); margin-bottom:10px;">
            <video id="video" style="width:100%; background:#000;"></video>
            <button class="btn btn-main" onclick="stopScanner()" style="background:#444; border-radius:0; margin:0;">ZAVŘÍT</button>
        </div>
        <input type="text" id="scan-note" placeholder="Poznámka ke skenu...">
        <button class="btn btn-main btn-scan" onclick="startScanner()">QR SKEN KONTROLNÍHO BODU</button>
        <button id="deadman-btn" class="btn btn-main btn-bdelost" onclick="toggleDeadman()">NEBEZPEČNÁ ZÓNA</button>
        <div class="sos-container" id="sos-slider"><div style="color:var(--danger); line-height:70px; font-size:12px; position:absolute; width:100%; text-align:center;">PŘETÁHNI PRO SOS >>></div><div id="handle" class="sos-handle">🆘</div></div>
    </div>
</div>

<div class="card">
    <textarea id="boss-msg" placeholder="Zpráva..."></textarea>
    <button class="btn btn-main" onclick="sendQuickMsg()" style="background:#444;">✉ ODESLAT</button>
    <div id="status">SYSTÉM UZAMČEN</div>
    <table id="history-table">
        <thead><tr><th>Čas</th><th>Akce</th><th>Stav</th></tr></thead>
        <tbody></tbody>
    </table>
    <button onclick="clearHistory()" style="background:none; border:none; color:#444; margin-top:15px; font-size:10px;">🗑️ VYMAZAT HISTORII</button>
</div>

<div style="font-size: 10px; color: #444; margin-bottom: 20px;">v1.5.5 | KING APPLICATION PRO</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    const PINS = {"Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    const ALLOWED_CODES = ["KB001", "KB002", "KB003", "KB004", "KB005", "KB006", "KB007", "KB008", "KB009", "KB010", "KB011", "KB012", "KB013", "KB014", "KB015", "KB016", "KB017", "KB018", "KB019", "KB020", "KB021", "KB022", "KB023", "KB024", "KB025", "KB026", "KB027", "KB028", "KB029", "KB030", "KB031", "KB032", "KB033", "KB034", "KB035", "KB036", "KB037", "KB038", "KB039", "KB040", "KB041", "KB042", "KB043", "KB044", "KB045", "KB046", "KB047", "KB048", "KB049", "KB050"];

    let selectedTech = "", codeReader = new ZXing.BrowserMultiFormatReader(), deadmanTimer = null, lastLoc = "";
    let audioCtx = null, queue = JSON.parse(localStorage.getItem('aqm_queue') || "[]"), historyData = JSON.parse(localStorage.getItem('aqm_history') || "[]"), isProcessing = false;

    navigator.geolocation.watchPosition((p) => { 
        lastLoc = `http://googleusercontent.com/maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`; 
    }, null, { enableHighAccuracy: true });

    window.onload = () => { renderHistory(); };

    function initAudio() { 
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSoundOk() { 
        initAudio(); 
        const t = (f, d) => { 
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); 
            o.connect(g); g.connect(audioCtx.destination); 
            o.frequency.setValueAtTime(f, audioCtx.currentTime + d); 
            g.gain.setValueAtTime(0.3, audioCtx.currentTime + d); 
            o.start(audioCtx.currentTime + d); 
            o.stop(audioCtx.currentTime + d + 0.12); 
        }; 
        t(900, 0); t(1100, 0.15); 
    }

    function checkAuth() {
        let t = document.getElementById('tech-select').value;
        if (PINS[t] === document.getElementById('tech-pin').value) {
            initAudio(); selectedTech = t; 
            document.getElementById('controls').classList.remove('disabled');
            document.getElementById('controls').style.opacity = "1"; document.getElementById('controls').style.pointerEvents = "all";
            document.getElementById('logo-container').style.display = "flex";
            addToQueue('auth', 'PŘIHLÁŠENÍ');
            setInterval(processQueue, 15000); 
        }
    }

    function addToQueue(type, code, customMsg = "") {
        const timestamp = new Date().toISOString();
        const item = { type, code, technician: selectedTech, message: customMsg || (type === 'scan' ? document.getElementById('scan-note').value.trim() : (type === 'message' ? document.getElementById('boss-msg').value.trim() : type)), location: lastLoc || "GPS nedostupná", timestamp };
        queue.push(item);
        localStorage.setItem('aqm_queue', JSON.stringify(queue));
        if(type !== 'auth') {
            historyData.push({ timestamp, code, status: 'wait', name: code });
            localStorage.setItem('aqm_history', JSON.stringify(historyData));
            renderHistory();
            playSoundOk();
            document.getElementById('flash-ok').style.display = 'flex'; setTimeout(() => document.getElementById('flash-ok').style.display='none', 600);
        }
        document.getElementById('scan-note').value = ""; document.getElementById('boss-msg').value = "";
        processQueue();
    }

    async function processQueue() {
        if (isProcessing || queue.length === 0) return;
        isProcessing = true;
        const item = queue[0];
        try {
            const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(item) });
            const res = await resp.json();
            if (res.status === "OK") {
                queue.shift();
                localStorage.setItem('aqm_queue', JSON.stringify(queue));
                let hIdx = historyData.findIndex(h => h.timestamp === item.timestamp);
                if (hIdx > -1) { historyData[hIdx].status = 'ok'; historyData[hIdx].name = res.name || item.code; localStorage.setItem('aqm_history', JSON.stringify(historyData)); renderHistory(); }
                if (res.task) { document.getElementById('task-text').innerText = res.task; document.getElementById('task-box').style.display = 'block'; playSoundOk(); }
                else { document.getElementById('task-box').style.display = 'none'; }
                document.getElementById('status').innerText = "✅ DATA SYNCHRONIZOVÁNA";
                processQueue();
            }
        } catch (e) { document.getElementById('status').innerText = "📡 OFFLINE - DATA ULOŽENA"; }
        finally { isProcessing = false; }
    }

    function renderHistory() {
        const tbody = document.querySelector("#history-table tbody");
        tbody.innerHTML = "";
        [...historyData].reverse().slice(0, 15).forEach(h => {
            const time = new Date(h.timestamp).toLocaleTimeString();
            const status = h.status === 'ok' ? '<span class="sync-ok">OK</span>' : '<span class="sync-wait">...</span>';
            tbody.innerHTML += `<tr><td>${time}</td><td>${h.name}</td><td>${status}</td></tr>`;
        });
    }

    function clearHistory() { if(confirm("Smazat historii?")) { historyData = []; localStorage.setItem('aqm_history', "[]"); renderHistory(); } }
    function resolveTask(s) { addToQueue('task_response', s); document.getElementById('task-box').style.display = 'none'; }
    async function startScanner() { 
        document.getElementById('camera-container').style.display = 'block'; 
        codeReader.decodeFromVideoDevice(null, 'video', (res) => { 
            if (res) { 
                const txt = res.text.trim(); 
                if (ALLOWED_CODES.includes(txt)) { stopScanner(); addToQueue('scan', txt); } 
                else { stopScanner(); playSoundError(); document.getElementById('flash-error').style.display = 'flex'; setTimeout(() => document.getElementById('flash-error').style.display='none', 1000); } 
            } 
        }); 
    }
    function stopScanner() { codeReader.reset(); document.getElementById('camera-container').style.display = 'none'; }
    function sendQuickMsg() { if (document.getElementById('boss-msg').value.trim()) addToQueue('message', 'ZPRÁVA'); }

    function toggleDeadman() {
        const btn = document.getElementById('deadman-btn');
        if (!deadmanTimer) {
            let m = prompt("Za kolik minut zazvonit?", "15"); if (!m) return;
            let sec = m * 60;
            btn.innerText = "⏳ BĚŽÍ: " + m + " min";
            deadmanTimer = setInterval(() => {
                sec--;
                if (sec <= 0) { clearInterval(deadmanTimer); deadmanTimer = null; addToQueue('deadman_alarm', 'ALARM BDĚLOSTI'); btn.innerText = "NEBEZPEČNÁ ZÓNA"; }
                else { btn.innerText = "⏳ " + Math.floor(sec/60) + ":" + (sec%60).toString().padStart(2,'0'); }
            }, 1000);
        } else { clearInterval(deadmanTimer); deadmanTimer = null; btn.innerText = "NEBEZPEČNÁ ZÓNA"; }
    }

    const h = document.getElementById('handle'), s = document.getElementById('sos-slider');
    let drag = false; h.addEventListener('touchstart', () => { drag = true; initAudio(); });
    window.addEventListener('touchmove', (e) => { if (!drag) return; let x = e.touches[0].clientX - s.getBoundingClientRect().left - 30; x = Math.max(5, Math.min(x, s.offsetWidth - 65)); h.style.left = x + 'px'; if (x > s.offsetWidth - 70) { drag = false; h.style.left = '5px'; addToQueue('SOS', 'SOS'); } });
    window.addEventListener('touchend', () => { drag = false; h.style.left = '5px'; });
</script>
</body>
</html>
