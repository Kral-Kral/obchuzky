<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM Control v2.1.4</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); text-align: center; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; }
        #flash-ok { position: fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; z-index:10000; background: var(--success); color:white; font-size: 150px; }
        .btn { border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; color: white; padding: 18px; font-size: 17px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-scan { background: var(--primary); }
        .btn-hold { position: relative; overflow: hidden; background: #1a5c27; touch-action: none; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.3); transition: width 0.1s linear; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #2c2c2e; color: white; box-sizing: border-box; }
        .slider-container { position: relative; width: 100%; height: 60px; border-radius: 30px; border: 2px solid var(--danger); overflow: hidden; margin-top: 15px; background: #251010; }
        .slider-handle { position: absolute; left: 5px; top: 5px; width: 50px; height: 50px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; touch-action: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">
<div id="flash-ok">✅</div>

<div class="card" id="login-card">
    <div style="font-weight:bold; color:var(--primary); font-size: 20px;">AQM Control System</div>
    <div style="font-size: 12px; color: var(--warning); margin-bottom: 15px;">VERZE 2.1.4</div>
    <select id="tech-select">
        <option value="">-- Vyber jméno --</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="Král">⭐ Král</option>
    </select>
    <input type="password" id="tech-pin" placeholder="PIN">
    <button class="btn btn-scan" onclick="checkAuth()">PŘIHLÁSIT</button>
</div>

<div class="card hidden" id="main-card">
    <div id="task-box" class="hidden" style="border: 2px solid var(--warning); padding: 10px; border-radius: 10px; margin-bottom: 15px;">
        <div id="task-text" style="font-weight: bold;"></div>
        <button class="btn btn-hold" ontouchstart="startHold(event)" ontouchend="stopHold()"><div class="hold-progress" id="hold-prog"></div>HOTOVO (DRŽET)</button>
    </div>
    <input type="text" id="scan-note" placeholder="Poznámka...">
    <button class="btn btn-scan" onclick="startScanner()">QR SKEN BODU</button>
    <div id="camera-container" class="hidden"><video id="video" style="width:100%; border-radius:15px;"></video></div>
    
    <div class="slider-container" id="sos-slider">
        <div style="color:var(--danger); position:absolute; width:100%; line-height:60px; font-size:12px; pointer-events:none;">PŘETÁHNI PRO SOS >>></div>
        <div id="handle-sos" class="slider-handle">🆘</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec";
    const PINS = {"Jiří Bělíček":"5481","Dalibor Čech":"2368","Král":"2013"};
    let selectedTech = "", audioCtx = null, codeReader = new ZXing.BrowserMultiFormatReader(), holdTimer = null, holdPercent = 0;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound() { if(audioCtx) { let o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(800, audioCtx.currentTime); g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + 0.1); } }

    function checkAuth() {
        let t = document.getElementById('tech-select').value, p = document.getElementById('tech-pin').value;
        if (PINS[t] === p) { selectedTech = t; document.getElementById('login-card').classList.add('hidden'); document.getElementById('main-card').classList.remove('hidden'); }
    }

    function startScanner() {
        document.getElementById('camera-container').classList.remove('hidden');
        codeReader.decodeFromVideoDevice(null, 'video', (res) => { if (res) { stopScanner(); sendData('scan', res.text); } });
    }
    function stopScanner() { codeReader.reset(); document.getElementById('camera-container').classList.add('hidden'); }

    async function sendData(type, code) {
        playSound();
        const payload = { type, code, technician: selectedTech, message: document.getElementById('scan-note').value, timestamp: new Date().toISOString(), location: "" };
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const res = await resp.json();
        if (res.status === "OK") { 
            document.getElementById('flash-ok').style.display = 'flex'; setTimeout(() => document.getElementById('flash-ok').style.display='none', 600);
            if (res.task) { document.getElementById('task-box').classList.remove('hidden'); document.getElementById('task-text').innerText = res.task; }
        }
    }

    function setupSos() {
        const h = document.getElementById('handle-sos'), s = document.getElementById('sos-slider'); let drag = false;
        h.addEventListener('touchstart', () => drag = true);
        window.addEventListener('touchmove', (e) => {
            if (!drag) return; let x = e.touches[0].clientX - s.getBoundingClientRect().left - 25;
            x = Math.max(5, Math.min(x, s.offsetWidth - 55)); h.style.left = x + 'px';
            if (x > s.offsetWidth - 60) { drag = false; h.style.left = '5px'; sendData('SOS', 'SOS'); }
        });
        window.addEventListener('touchend', () => { drag = false; h.style.left = '5px'; });
    }
    setupSos();

    function startHold(e) { e.preventDefault(); holdPercent = 0; holdTimer = setInterval(() => { holdPercent += 5; document.getElementById('hold-prog').style.width = holdPercent + '%'; if (holdPercent >= 100) { clearInterval(holdTimer); sendData('task_done', 'HOTOVO'); document.getElementById('task-box').classList.add('hidden'); stopHold(); } }, 100); }
    function stopHold() { clearInterval(holdTimer); holdPercent = 0; document.getElementById('hold-prog').style.width = '0%'; }
</script>
</body>
</html>
