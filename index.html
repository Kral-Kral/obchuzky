<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM Control system</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; background: var(--bg); color: var(--text); text-align: center; padding-bottom: 80px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        
        /* LOGIN */
        #login-card { padding: 40px 20px; }
        #login-card select, #login-card input { padding: 22px; font-size: 19px; margin: 15px 0; border-radius: 15px; border: 1px solid #444; }
        .app-version { color: var(--warning); font-weight: bold; font-size: 14px; margin-top: -20px; margin-bottom: 25px; display: block; }

        /* NAVIGACE */
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #1e1e1e; border-top: 1px solid #333; display: flex; z-index: 1000; }
        .tab-btn { flex: 1; background: none; border: none; color: #888; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn svg { width: 24px; height: 24px; fill: currentColor; }

        /* NÁSTĚNKA */
        .report-item { position: relative; background: #222; padding: 15px; border-radius: 12px; margin-bottom: 12px; text-align: left; border-left: 5px solid var(--primary); min-height: 60px; }
        .report-meta { font-size: 14px; color: #bbb; margin-bottom: 8px; display: block; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .report-content { font-size: 18px; font-weight: 500; display: block; padding-right: 40px; word-wrap: break-word; color: #fff; }
        .delete-btn-mini { position: absolute; top: 12px; right: 12px; width: 38px; height: 38px; background: #331111; border: 1px solid #552222; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
        .delete-btn-mini svg { width: 20px; height: 20px; fill: var(--danger); z-index: 2; position: relative; }

        /* PANEL VEDOUCÍHO - OPRAVA VELIKOSTI */
        #boss-task-text { min-height: 200px; font-size: 20px; font-weight: bold; line-height: 1.4; color: #fff; }

        /* ÚKOLY PRO TECHNIKA */
        #task-box { background: #222; border: 4px solid var(--warning); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: none; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .btn { border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; color: white; padding: 18px; font-size: 17px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-hold { position: relative; overflow: hidden; touch-action: none; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.4); }
        
        input, select, textarea { width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; outline: none; }
        
        /* SLIDERY */
        .slider-container { position: relative; width: 100%; height: 60px; border-radius: 35px; border: 2px solid var(--danger); background: #200; overflow: hidden; margin-top: 10px; }
        .slider-handle { position: absolute; left: 5px; top: 5px; width: 50px; height: 50px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; font-size: 24px; z-index: 10; }
        .slider-text { line-height: 60px; font-size: 19px; font-weight: 900; pointer-events: none; text-transform: uppercase; letter-spacing: 1px; }
        #sos-slider .slider-text { color: var(--danger); }
        #call-slider .slider-text { color: #ffffff; }
        .slider-work { border-color: var(--primary); background: #001529; }
        .slider-work .slider-handle { background: var(--primary); }
        .slider-work .slider-text { color: var(--primary); }

        .hidden { display: none !important; }
        #status-area { display: flex; justify-content: center; align-items: center; gap: 10px; padding: 10px; }
        #queue-count { font-size: 10px; background: var(--warning); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">

<div id="flash-ok" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--success); z-index:10000; justify-content:center; align-items:center;"><svg width="150" height="150" fill="white" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></div>
<div id="flash-error" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--danger); z-index:10000; justify-content:center; align-items:center;"><svg width="150" height="150" fill="white" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>

<div class="tab-bar hidden" id="main-nav">
    <button class="tab-btn active" id="nav-op" onclick="showTab('operativa')"><svg viewBox="0 0 24 24"><path d="M13.13 7.11l-4.97 4.97 1.06 1.06 4.97-4.97V15h1.5V6H6.5v1.5h6.63zM20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>OPERATIVA</button>
    <button class="tab-btn" id="nav-com" onclick="showTab('komunikace')"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-10H6v2h12V4z"/></svg>KOMUNIKACE</button>
</div>

<div class="card" id="login-card">
    <h2 style="color:var(--primary);">AQM Control</h2>
    <span class="app-version">VERZE 2.9.2</span>
    <select id="role-select">
        <option value="">-- VYBER ROLI --</option>
        <option value="Tech. velká strojovna">Tech. velká strojovna</option>
        <option value="Technolog wellness">Technolog wellness</option>
        <option value="Technolog - Nový areál">Technolog - Nový areál</option>
        <option value="Údržba">Údržba</option>
        <option value="VEDOUCÍ">VEDOUCÍ (Admin)</option>
    </select>
    <select id="tech-select" onchange="document.getElementById('auth-section').classList.remove('hidden')">
        <option value="">-- VYBER JMÉNO --</option>
        <optgroup label="VEDENÍ"><option value="Král">Král</option><option value="Vaibar">Vaibar</option><option value="Janča">Janča</option></optgroup>
        <optgroup label="TECHNOLOGOVÉ">
            <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
        </optgroup>
    </select>
    <div id="auth-section" class="hidden"><input type="password" id="tech-pin" placeholder="ZADEJ PIN" oninput="checkAuth()"></div>
</div>

<div class="card hidden" id="boss-card">
    <h3 style="color:var(--success);">⭐ PANEL VEDOUCÍHO</h3>
    <select id="target-tech"><option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option></select>
    <textarea id="boss-task-text" placeholder="Zadej úkol..."></textarea>
    <button class="btn" style="background:var(--success);" id="boss-send-btn" onclick="submitBossTask()">🚀 ODESLAT ÚKOL</button>
    <button onclick="location.reload()" style="background:none; border:none; color:red; margin-top:20px; font-weight:bold;">ODHLÁSIT</button>
</div>

<div id="tab-operativa" class="hidden">
    <div id="task-box">
        <div id="task-text" style="font-weight:bold; margin-bottom:15px; font-size:20px; color:var(--warning);"></div>
        <button class="btn" style="background:var(--primary);" id="btn-ack" onclick="ackTask()">OK ROZUMÍM (ZTIŠIT NA 2H)</button>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-hold" style="background:#1a5c27;" ontouchstart="startHold(event, 'HOTOVO', null, 3.33)" ontouchend="stopHold()"><div class="hold-progress" id="prog-h"></div>HOTOVO (3s)</button>
            <button class="btn btn-hold" style="background:#7a1a14;" ontouchstart="startHold(event, 'NELZE', null, 3.33)" ontouchend="stopHold()"><div class="hold-progress" id="prog-n"></div>NELZE (3s)</button>
        </div>
    </div>

    <div class="card" style="background:#222; border:1px solid var(--primary);">
        <div id="work-status" style="font-weight:bold; margin-bottom:10px; color:var(--primary);">PŘIPRAVEN K OBCHŮZCE</div>
        <div class="slider-container slider-work" id="work-slider">
            <div class="slider-text">>>> ZAHÁJIT PRÁCI >>></div>
            <div id="h-work" class="slider-handle">🚩</div>
        </div>
        <button id="btn-work-end" class="btn hidden" style="background:var(--danger); margin-top:10px;" onclick="handleWork('end')">🏁 UKONČIT PRÁCI NA ÚKOLU</button>
    </div>

    <textarea id="scan-note" placeholder="Poznámka ke skenu (pouze do tabulky)..."></textarea>
    <button class="btn" style="background:var(--success);" onclick="startScanner()">QR SKEN BODU</button>
    <div id="cam-container" style="display:none; margin-bottom:10px;"><video id="video" style="width:100%; border-radius:10px; background:#000;"></video><button class="btn" style="background:var(--danger); margin-top:10px;" onclick="stopScanner()">✖ ZAVŘÍT KAMERU</button></div>

    <button id="deadman-btn" class="btn" style="background:var(--warning); color:#000;" onclick="showAzor()">🐕 AZOR</button>
    <div id="azor-setup" style="display:none;">
        <input type="number" id="az-val" value="15" style="width:80px; text-align:center; font-size:20px;"> min.
        <button class="btn" style="background:var(--success);" onclick="startAzor()">START</button>
        <button class="btn" style="background:#444;" onclick="hideAzor()">ZAVŘÍT</button>
    </div>
    <button id="az-stop" class="btn btn-hold hidden" style="background:#222; color:var(--warning); border:2px solid var(--warning);" ontouchstart="startHold(event, 'AZ_STOP', null, 3.33)" ontouchend="stopHold()"><div class="hold-progress" id="prog-az"></div><span id="az-timer">⏳ AZOR AKTIVNÍ</span></button>

    <div class="slider-container" id="sos-slider"><div class="slider-text">>>> SOS PŘEJETÍ >>></div><div id="h-sos" class="slider-handle">🆘</div></div>
    <div class="slider-container" style="border-color:#fff; background:#222; margin-top:10px;" id="call-slider"><div class="slider-text" style="color:#fff;">>>> VOLAT 112 >>></div><div id="h-call" class="slider-handle" style="background:#fff; color:#000;">📞</div></div>

    <div class="card" id="history-section" style="margin-top:20px;">
        <div id="status-area" onclick="processQueue()"><div id="status" style="font-weight:bold; font-size:12px; color:var(--success);">ONLINE</div><div id="queue-count" class="hidden">0</div></div>
        <table id="h-table"><tbody></tbody></table>
        <button onclick="clearHistory()" style="background:none; border:none; color:#444; font-size:10px; margin-top:10px;">SMAZAT HISTORII</button>
    </div>
</div>

<div id="tab-komunikace" class="hidden">
    <div class="card">
        <h3 style="color:var(--primary); margin-top:0;">📋 NÁSTĚNKA</h3>
        <div id="report-list" style="max-height: 400px; overflow-y:auto; margin-bottom:15px;"></div>
        <textarea id="new-report-text" placeholder="Zapsat nový vzkaz..."></textarea>
        <button class="btn" style="background:var(--success);" onclick="addReport()">➕ PŘIDAT VZKAZ</button>
    </div>
    <div class="card">
        <h3 style="color:var(--warning); margin-top:0;">✉ ZPRÁVA TELEGRAM</h3>
        <textarea id="quick-msg" placeholder="Info pro všechny..."></textarea>
        <button class="btn" style="background:#444;" onclick="sendQuickMsg()">✉ ODESLAT ZPRÁVU</button>
    </div>
    <button onclick="location.reload()" style="background:none; border:none; color:red; font-weight:bold; margin-top:10px;">ODHLÁSIT</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec";
    const PINS = {"Král":"2013","Vaibar":"2013","Janča":"2013","Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    const ALLOWED = ["KB001", "KB002", "KB003", "KB004", "KB005", "KB006", "KB007", "KB008", "KB009", "KB010", "KB011", "KB012", "KB013", "KB014", "KB015", "KB016", "KB017", "KB018", "KB020", "KB021", "KB022", "KB023", "KB024", "KB025", "KB026", "KB027", "KB028", "KB029", "KB030", "KB031", "KB032", "KB033", "KB034", "KB035", "KB036", "KB037", "KB038", "KB039", "KB040", "KB044", "KB045", "KB046", "KB047", "KB048", "KB049", "KB050", "KB051", "KB052", "KB053", "KB054", "KB055", "KB056", "KB057", "KB058"];
    const LEADERS = ["Král", "Vaibar", "Janča"];

    let tech = "", role = "", reader = new ZXing.BrowserMultiFormatReader(), azTimer = null, audio = null, queue = [], history = [], processing = false, holdT = null, holdP = 0, lastTask = "", isSiren = false, snooze = 0;

    function initAudio() { if(!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); }
    function startAlarm() { if(isSiren) return; isSiren=true; const loop = () => { if(!isSiren) return; let o = audio.createOscillator(); o.connect(audio.destination); o.frequency.setValueAtTime(450, audio.currentTime); o.start(); o.stop(audio.currentTime+0.3); setTimeout(loop, 1200); }; loop(); }

    function showTab(t) {
        document.getElementById('tab-operativa').classList.add('hidden'); document.getElementById('tab-komunikace').classList.add('hidden');
        document.getElementById('nav-op').classList.remove('active'); document.getElementById('nav-com').classList.remove('active');
        document.getElementById('tab-'+t).classList.remove('hidden'); document.getElementById(t==='operativa'?'nav-op':'nav-com').classList.add('active');
        if(t==='komunikace') loadReports();
    }

    function checkAuth() {
        let t = document.getElementById('tech-select').value, p = document.getElementById('tech-pin').value;
        if(PINS[t] === p) {
            tech = t; role = document.getElementById('role-select').value;
            document.getElementById('login-card').classList.add('hidden');
            if(role === 'VEDOUCÍ') document.getElementById('boss-card').classList.remove('hidden');
            else {
                document.getElementById('main-nav').classList.remove('hidden'); showTab('operativa');
                history = JSON.parse(localStorage.getItem('h_'+tech)||'[]'); queue = JSON.parse(localStorage.getItem('q_'+tech)||'[]');
                renderHistory(); updateQueueUI(); setInterval(processQueue, 5000);
                const savedAz = localStorage.getItem('azor_end'); if(savedAz) resumeAzor(parseInt(savedAz));
            }
        }
    }

    async function startAzor() {
        let mins = parseInt(document.getElementById('az-val').value);
        let endTime = Date.now() + (mins * 60 * 1000);
        try {
            const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'azor_start', technician: tech, endTime: endTime }) });
            if(resp.ok) { localStorage.setItem('azor_end', endTime); resumeAzor(endTime); }
        } catch(e) { alert("CHYBA: Azora nelze spustit bez signálu!"); }
    }

    function resumeAzor(endTime) {
        document.getElementById('azor-setup').style.display = 'none'; document.getElementById('az-stop').classList.remove('hidden');
        if(azTimer) clearInterval(azTimer);
        azTimer = setInterval(() => {
            let remain = Math.floor((endTime - Date.now()) / 1000);
            if(remain <= 0) { stopAzor(); addToQueue('deadman_alarm', 'ALARM'); }
            else document.getElementById('az-timer').innerText = "⏳ "+Math.floor(remain/60)+":"+(remain%60).toString().padStart(2,'0');
        }, 1000);
    }

    async function stopAzor() {
        clearInterval(azTimer); localStorage.removeItem('azor_end');
        addToQueue('azor_stop', 'STOP');
        document.getElementById('az-stop').classList.add('hidden'); document.getElementById('deadman-btn').style.display='block';
    }

    function startHold(e, v, id=null, s=10) {
        e.preventDefault(); holdP = 0;
        holdT = setInterval(() => {
            holdP += s; let pId = (v==='RESOLVE'?'prog-res-'+id:(v==='HOTOVO'?'prog-h':(v==='NELZE'?'prog-n':'prog-az')));
            document.getElementById(pId).style.width = holdP + '%';
            if(holdP>=100) { 
                clearInterval(holdT); 
                if(v==='RESOLVE') resolveReport(id); 
                else if(v==='AZ_STOP') { stopAzor(); stopHold(); } 
                else { resolveTask(v); stopHold(); } 
            }
        }, 100);
    }

    function stopHold() { clearInterval(holdT); document.querySelectorAll('.hold-progress').forEach(x => x.style.width='0%'); }

    async function processQueue() {
        if(processing || !tech) return; processing = true;
        let p = queue.length > 0 ? queue[0] : { type: 'check', technician: tech };
        try {
            const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) });
            const res = await r.json();
            if(res.task && res.task !== lastTask && Date.now() > snooze) { 
                document.getElementById('task-box').style.display='block'; document.getElementById('task-text').innerText=res.task; startAlarm(); 
            } else if (!res.task) { lastTask = ""; document.getElementById('task-box').style.display='none'; isSiren=false; }
            if(p.type !== 'check' && res.status === 'OK') { queue.shift(); localStorage.setItem('q_'+tech, JSON.stringify(queue)); updateQueueUI(); }
            document.getElementById('status').innerText = "ONLINE"; document.getElementById('status').style.color = "var(--success)";
        } catch(e) { document.getElementById('status').innerText = "OFFLINE"; document.getElementById('status').style.color = "var(--danger)"; }
        finally { processing = false; }
    }

    function addToQueue(type, code, msg="") {
        queue.push({type, code, technician:tech, message:msg, timestamp:new Date().toISOString()});
        localStorage.setItem('q_'+tech, JSON.stringify(queue)); updateQueueUI(); processQueue();
    }

    function ackTask() { isSiren=false; snooze = Date.now()+(2*60*60*1000); document.getElementById('btn-ack').style.display='none'; }
    function resolveTask(v) { lastTask = document.getElementById('task-text').innerText; addToQueue('task_response', v); document.getElementById('task-box').style.display='none'; }
    
    function startScanner() { 
        document.getElementById('cam-container').style.display='block'; 
        reader.decodeFromVideoDevice(null,'video', res => { 
            if(res){ 
                const c = res.text.trim();
                if(ALLOWED.includes(c)) { stopScanner(); addToQueue('scan', c); }
                else { stopScanner(); document.getElementById('flash-error').style.display='flex'; setTimeout(()=>document.getElementById('flash-error').style.display='none',1500); }
            } 
        }); 
    }
    function stopScanner() { reader.reset(); document.getElementById('cam-container').style.display='none'; }

    async function loadReports() {
        const l = document.getElementById('report-list'); l.innerHTML = "<small>Načítám...</small>";
        const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'get_reports' }) });
        const d = await r.json(); l.innerHTML = "";
        if(d.reports) d.reports.forEach(x => {
            const t = new Date(x.time); const f = t.toLocaleDateString('cs-CZ')+" "+t.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
            l.innerHTML += `<div class="report-item"><span class="report-meta">${f} | ${x.author}</span><span class="report-content">${x.text}</span><div class="delete-btn-mini btn-hold" ontouchstart="startHold(event,'RESOLVE',${x.id},5)" ontouchend="stopHold()"><div class="hold-progress" id="prog-res-${x.id}"></div><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></div></div>`;
        });
    }

    function setupSlider(hId, sId, cb) {
        const h = document.getElementById(hId), s = document.getElementById(sId);
        let d = false; h.addEventListener('touchstart',()=>d=true);
        window.addEventListener('touchmove',e=>{
            if(!d) return; let x = e.touches[0].clientX - s.getBoundingClientRect().left - 25;
            x = Math.max(5, Math.min(x, s.offsetWidth-55)); h.style.left = x+'px';
            if(x > s.offsetWidth-60){ d=false; h.style.left='5px'; cb(); }
        });
        window.addEventListener('touchend',()=> { d=false; h.style.left='5px'; });
    }
    setupSlider('h-sos','sos-slider',()=>addToQueue('SOS','SOS'));
    setupSlider('h-work','work-slider',()=>addToQueue('work_start','START'));
    setupSlider('h-call','call-slider',()=>window.location.href="tel:112");

    function showAzor() { document.getElementById('azor-setup').style.display='block'; document.getElementById('deadman-btn').style.display='none'; }
    function hideAzor() { document.getElementById('azor-setup').style.display='none'; document.getElementById('deadman-btn').style.display='block'; }
    async function addReport() { const t = document.getElementById('new-report-text').value.trim(); if(!t) return; await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'add_report', technician: tech, message: t }) }); document.getElementById('new-report-text').value=""; loadReports(); }
    async function resolveReport(id) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'resolve_report', rowId: id }) }); loadReports(); }
    async function submitBossTask() { const t = document.getElementById('target-tech').value, x = document.getElementById('boss-task-text').value.trim(); if(!x) return; await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({type:'add_task', targetTech:t, taskText:x, technician:tech})}); document.getElementById('boss-task-text').value=""; alert("Odesláno!"); }
    function sendQuickMsg() { const m = document.getElementById('quick-msg').value.trim(); if(m) { addToQueue('message', 'ZPRÁVA', m); document.getElementById('quick-msg').value=""; alert("Odesláno!"); } }
    function updateQueueUI() { const qEl = document.getElementById('queue-count'); if (queue.length > 0) { qEl.classList.remove('hidden'); qEl.innerText = queue.length; } else { qEl.classList.add('hidden'); } }
    function renderHistory() { const b = document.querySelector("#h-table tbody"); b.innerHTML = ""; [...history].reverse().slice(0, 5).forEach(h => { b.innerHTML += `<tr><td>${new Date(h.ts).toLocaleTimeString()}</td><td>${h.name}</td></tr>`; }); }
    function clearHistory() { history=[]; localStorage.setItem('h_'+tech,'[]'); renderHistory(); }
</script>
</body>
