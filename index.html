<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQM Control system</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1a1a1a; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; --navy: #000080; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); color: var(--text); text-align: center; -webkit-tap-highlight-color: transparent; }
        .card { background: var(--card); padding: 15px; margin-bottom: 10px; border: 1px solid #333; border-radius: 4px; }
        input, select, textarea, #task-text, .report-content { font-size: 20px !important; font-weight: bold; width: 100%; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; padding: 12px; margin: 5px 0; border-radius: 4px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #1a1a1a; border-top: 1px solid #333; display: flex; z-index: 1000; }
        .tab-btn { flex: 1; background: none; border: none; color: #777; font-weight: bold; font-size: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: var(--primary); }
        .report-item { position: relative; background: #222; padding: 12px; margin-bottom: 8px; text-align: left; border: 1px solid #555; border-radius: 4px; }
        .report-meta { font-size: 14px; color: var(--danger); border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 6px; display: block; font-weight: bold; }
        .delete-btn-mini { position: absolute; top: 8px; right: 8px; width: 100px; height: 40px; background: #1a331a; border: 1px solid var(--success); display: flex; align-items: center; justify-content: center; touch-action: none; overflow: hidden; font-size: 11px; font-weight: bold; color: white; border-radius: 4px; }
        .btn { border: none; font-weight: bold; width: 100%; padding: 18px; font-size: 17px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; border-radius: 4px; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.4); z-index: 1; }
        .slider-container { position: relative; width: 100%; height: 55px; border-radius: 30px; border: 2px solid var(--danger); background: #200; overflow: hidden; margin-top: 8px; user-select: none; }
        .slider-handle { position: absolute; left: 4px; top: 4px; width: 45px; height: 45px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; font-size: 22px; cursor: pointer; z-index: 10; transition: transform 0.1s; }
        .slider-text { line-height: 55px; font-size: 16px; font-weight: bold; pointer-events: none; z-index: 5; position: relative; }
        .hidden { display: none !important; }
        #photo-preview { max-width: 100%; max-height: 150px; margin-top: 10px; border-radius: 4px; display: none; border: 1px solid #444; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">

<div class="tab-bar hidden" id="main-nav">
    <button class="tab-btn active" id="nav-op" onclick="showTab('operativa')">OPERATIVA</button>
    <button class="tab-btn" id="nav-com" onclick="showTab('komunikace')">KOMUNIKACE</button>
</div>

<div class="card" id="login-card" style="margin-top:20px;">
    <h2>AQM System</h2>
    <select id="tech-select">
        <option value="Král">Král</option><option value="Vaibar">Vaibar</option><option value="Janča">Janča</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option>
    </select>
    <input type="password" id="tech-pin" placeholder="PIN" maxlength="4">
    <button class="btn" style="background:var(--primary)" onclick="checkAuth()">PŘIHLÁSIT</button>
</div>

<div id="tab-operativa" class="hidden" style="padding-bottom:70px;">
    <button class="btn" style="background:var(--navy);" onclick="startScanner()">QR SKEN BODU</button>
    <div id="cam-container" style="display:none; padding: 10px; background: #222; border-radius: 8px;"><video id="video" style="width:100%; background:#000; border-radius:4px;"></video></div>
    <div class="slider-container" id="sos-slider"><div id="sos-text" class="slider-text">>>> SOS PŘEJETÍ >>></div><div id="h-sos" class="slider-handle">🆘</div></div>
    <div class="card" id="history-section"><table id="h-table"><tbody></tbody></table></div>
</div>

<div id="tab-komunikace" class="hidden" style="padding-bottom:70px;">
    <div class="card">
        <h3>📋 NÁSTĚNKA</h3>
        <div id="report-list" style="max-height: 400px; overflow-y:auto;"></div>
        <textarea id="new-report-text" placeholder="Zapsat na nástěnku..."></textarea>
        <button class="btn" style="background:var(--success);" onclick="addReport()">➕ PŘIDAT ZÁZNAM</button>
    </div>
    
    <div class="card">
        <h3>🛠 NAHLÁSIT ZÁVADU</h3>
        <textarea id="quick-msg" placeholder="Popis závady (Email)..."></textarea>
        <input type="file" id="photo-input" accept="image/*" capture="camera" style="display:none;" onchange="previewPhoto(event)">
        <button class="btn" style="background:#444;" onclick="document.getElementById('photo-input').click()">📸 VYFOTIT ZÁVADU</button>
        <img id="photo-preview" src="">
        <button class="btn" style="background:var(--danger);" onclick="sendDefect()">✉ ODESLAT HLÁŠENÍ</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    const PINS = {"Král":"2013","Vaibar":"2013","Janča":"2013","Jiří Bělíček":"5481","Dalibor Čech":"2368"};
    
    let tech = "", role = "Technolog", frozenLoc = "", photoData = null, holdT = null;

    navigator.geolocation.watchPosition(p => frozenLoc = `${p.coords.latitude},${p.coords.longitude}`);

    function showTab(t) { document.querySelectorAll('[id^="tab-"]').forEach(x=>x.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); if(t==='komunikace') loadReports(); }
    
    function checkAuth() { 
        let t = document.getElementById('tech-select').value, p = document.getElementById('tech-pin').value;
        if (PINS[t] === p) { tech = t; document.getElementById('login-card').classList.add('hidden'); document.getElementById('main-nav').classList.remove('hidden'); showTab('operativa'); }
        else { alert("Špatný PIN!"); }
    }

    function previewPhoto(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) { 
            photoData = e.target.result; 
            document.getElementById('photo-preview').src = photoData;
            document.getElementById('photo-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    async function sendDefect() {
        let m = document.getElementById('quick-msg').value.trim();
        if(!m && !photoData) return alert("Popiš závadu nebo vyfoť!");
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'message', technician: tech, message: m, photoData: photoData, location: frozenLoc})});
        alert("Odesláno na Outlook!");
        document.getElementById('quick-msg').value = ""; document.getElementById('photo-preview').style.display = 'none'; photoData = null;
    }

    // --- NÁSTĚNKA (2 sekundy hold) ---
    function startHold(id) {
        let p = 0;
        holdT = setInterval(() => {
            p += 5; // 20 kroků = 2 sekundy
            document.getElementById('prog-'+id).style.width = p + '%';
            if(p >= 100) { clearInterval(holdT); resolveReport(id); }
        }, 100);
    }
    function stopHold(id) { clearInterval(holdT); document.getElementById('prog-'+id).style.width = '0%'; }

    async function loadReports() {
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'get_reports'}) });
        const d = await resp.json();
        let html = "";
        d.reports.forEach(r => {
            html += `<div class="report-item"><b>${r.author}:</b> ${r.text}<div class="delete-btn-mini" ontouchstart="startHold(${r.id})" ontouchend="stopHold(${r.id})" onmousedown="startHold(${r.id})" onmouseup="stopHold(${r.id})"><div class="hold-progress" id="prog-${r.id}"></div>HOTOVO</div></div>`;
        });
        document.getElementById('report-list').innerHTML = html;
    }

    async function addReport() {
        let m = document.getElementById('new-report-text').value;
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'add_report', technician: tech, message: m}) });
        document.getElementById('new-report-text').value = ""; loadReports();
    }

    async function resolveReport(id) {
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'resolve_report', rowId: id}) });
        loadReports();
    }

    function startScanner() {
        const codeReader = new ZXing.BrowserMultiFormatReader();
        document.getElementById('cam-container').style.display='block';
        codeReader.decodeFromVideoDevice(null,'video', (res, err) => {
            if(res){ codeReader.reset(); document.getElementById('cam-container').style.display='none'; fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type:'scan', code: res.text, technician: tech, location: frozenLoc})}); alert("Naskenováno: "+res.text); }
        });
    }

    function setupSlider(hId, sId, cb) { 
        const h = document.getElementById(hId), s = document.getElementById(sId); let d = false; 
        const mv = (cX) => { if(!d) return; let x = cX - s.getBoundingClientRect().left - 25; x = Math.max(5, Math.min(x, s.offsetWidth-55)); h.style.left = x+'px'; if(x > s.offsetWidth-60){ d=false; h.style.left='4px'; cb(); } }; 
        h.addEventListener('touchstart', () => d=true); window.addEventListener('touchmove', e => mv(e.touches[0].clientX)); window.addEventListener('touchend', () => { d=false; h.style.left='4px'; });
    }
    setupSlider('h-sos','sos-slider',() => alert("SOS Odesláno!"));
</script>
</body>
</html>
