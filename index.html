<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --error: #ef4444; --text: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; }
        #reader { width: 100%; border-radius: 24px; background: #000; min-height: 250px; border: 2px solid #334155; overflow: hidden; margin-bottom: 10px; }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { border: none; padding: 18px; width: 100%; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-blue { background: var(--primary); color: #000; }
        .btn-red { background: transparent; color: var(--error); border: 1px solid var(--error); padding: 10px; font-size: 12px; margin-top: 20px; }
        .hidden { display: none !important; }
        input, textarea { width: 100%; padding: 18px; margin: 12px 0; border-radius: 14px; background: #0d1117; color: white; border: 1px solid #334155; box-sizing: border-box; font-size: 18px; }
        #status { margin-top: 10px; font-size: 14px; color: var(--primary); text-align: center; font-weight: bold; }
        #sync-status { background: #f59e0b; color: #000; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-bottom: 15px; width: 100%; text-align: center; display: none; }
        .user-info { display: flex; justify-content: space-between; align-items: center; background: rgba(56, 189, 248, 0.1); padding: 10px 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center; margin-bottom: 15px; font-size: 24px;">AQ TECH <span style="color:var(--primary)">PRO</span></h1>
    
    <div id="sync-status">⏳ ODESÍLÁM DATA...</div>
    
    <div id="reader"></div>
    <div id="status">Systém připraven</div>

    <div id="sec-login" class="card">
        <button class="btn btn-blue" onclick="startCamera('login')">📷 SKENOVAT MOJI KARTU</button>
        <div id="ui-login" class="hidden">
            <h2 id="worker-label" style="color: var(--primary); margin: 10px 0;">---</h2>
            <input type="password" id="pin" placeholder="PIN" inputmode="numeric" maxlength="4">
            <button class="btn" style="background:var(--success); color:white" onclick="verifyLogin()">PŘIHLÁSIT SE</button>
        </div>
    </div>

    <div id="sec-work" class="card hidden">
        <div class="user-info">
            <span id="logged-user-name" style="font-weight: bold;">---</span>
            <button class="btn-red" onclick="logout()" style="width: auto; margin: 0; padding: 5px 10px;">ODHLÁSIT</button>
        </div>

        <button class="btn btn-blue" onclick="startCamera('work')">🔍 SKENOVAT OBJEKT</button>
        
        <div id="ui-work" class="hidden">
            <div style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 14px; margin: 15px 0; border-left: 4px solid var(--primary);">
                <small style="color: #64748b">ID OBJEKTU:</small>
                <div id="obj-label" style="font-size: 22px; font-weight: 900; color: var(--primary)">---</div>
            </div>
            <textarea id="note" placeholder="Poznámka / Závada..."></textarea>
            <button class="btn" style="background:var(--success); color:white" onclick="saveData()">🚀 ULOŽIT ZÁZNAM</button>
        </div>
    </div>

    <div id="version-tag" style="margin-top:20px; font-size:10px; color:#475569; text-align:center;">VERZE: v2026.08</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNf2EgoBJOUWvKflRisSFfQt6L2JivO3Lcw53amT7WcTTwgNBeQi9awfpzEXErjAI/exec";

    const EMPLOYEES = {
        "T01": { name: "Jiří Bělíček", pin: "5481" }, "T02": { name: "Dalibor Čech", pin: "2368" },
        "T03": { name: "René Russwurm st.", pin: "1798" }, "T04": { name: "René Russwurm ml.", pin: "2849" },
        "T05": { name: "Roman Zámečník", pin: "6984" }, "T06": { name: "Marek Slovák", pin: "1179" },
        "T07": { name: "Martin Kuneš", pin: "2538" }, "T08": { name: "David Mirvald", pin: "1099" },
        "T09": { name: "Petr Illa", pin: "7923" }, "T10": { name: "Mirek Švarný", pin: "1739" },
        "T11": { name: "Lukáš Sem", pin: "4197" }, "T12": { name: "Laďa Poledna", pin: "5592" }
    };

    let currentUser = null;
    let currentPlace = "";
    let html5QrCode = new Html5Qrcode("reader");

    // START APLIKACE: Kontrola paměti
    window.onload = () => {
        const savedUser = localStorage.getItem('loggedWorker');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            showWorkSection();
        }
        syncData();
    };

    async function startCamera(mode) {
        document.getElementById('status').innerText = "Spouštím optiku...";
        try {
            if (html5QrCode.getState() === 2) await html5QrCode.stop();
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                if (mode === 'login') {
                    if (EMPLOYEES[txt]) {
                        currentUser = EMPLOYEES[txt];
                        document.getElementById('worker-label').innerText = currentUser.name;
                        document.getElementById('ui-login').classList.remove('hidden');
                        html5QrCode.stop();
                    }
                } else {
                    currentPlace = txt;
                    document.getElementById('obj-label').innerText = txt;
                    document.getElementById('ui-work').classList.remove('hidden');
                    html5QrCode.stop();
                    document.getElementById('status').innerText = "Objekt načten";
                }
            });
        } catch (err) { alert("Chyba kamery! Povolte přístup."); }
    }

    function verifyLogin() {
        if (document.getElementById('pin').value === currentUser.pin) {
            localStorage.setItem('loggedWorker', JSON.stringify(currentUser));
            showWorkSection();
        } else { alert("Špatný PIN!"); }
    }

    function showWorkSection() {
        document.getElementById('sec-login').classList.add('hidden');
        document.getElementById('sec-work').classList.remove('hidden');
        document.getElementById('logged-user-name').innerText = currentUser.name;
        document.getElementById('status').innerText = "Technik připraven";
    }

    function logout() {
        if(confirm("Opravdu se odhlásit?")) {
            localStorage.removeItem('loggedWorker');
            location.reload();
        }
    }

    function saveData() {
        const note = document.getElementById('note').value;
        const scanTime = new Date().toLocaleString("cs-CZ");
        document.getElementById('status').innerText = "📍 Zaměřuji GPS...";

        navigator.geolocation.getCurrentPosition((pos) => {
            const gps = pos.coords.latitude.toFixed(6) + "," + pos.coords.longitude.toFixed(6);
            
            let queue = JSON.parse(localStorage.getItem('aqQueue')) || [];
            queue.push({ worker: currentUser.name, place: currentPlace, note, gps, time: scanTime });
            localStorage.setItem('aqQueue', JSON.stringify(queue));

            alert("ULOŽENO ✅\nZáznam čeká na odeslání.");
            
            // Žádný reload! Jen vyčistíme UI
            document.getElementById('ui-work').classList.add('hidden');
            document.getElementById('note').value = "";
            document.getElementById('status').innerText = "Záznam uložen do paměti";
            syncData();
        }, () => { alert("Chyba GPS! Poloha je nutná."); }, { enableHighAccuracy: true });
    }

    async function syncData() {
        let queue = JSON.parse(localStorage.getItem('aqQueue')) || [];
        const syncLabel = document.getElementById('sync-status');

        if (queue.length === 0) {
            syncLabel.style.display = 'none';
            return;
        }

        syncLabel.style.display = 'block';
        syncLabel.innerText = `⏳ ODESÍLÁM: ${queue.length} ZÁZNAMŮ...`;

        const item = queue[0];
        const query = `?worker=${encodeURIComponent(item.worker)}&place=${encodeURIComponent(item.place)}&note=${encodeURIComponent(item.note)}&gps=${encodeURIComponent(item.gps)}&time=${encodeURIComponent(item.time)}`;
        
        try {
            await fetch(SCRIPT_URL + query, { mode: 'no-cors' });
            queue.shift();
            localStorage.setItem('aqQueue', JSON.stringify(queue));
            syncData(); 
        } catch (e) {
            syncLabel.innerText = `⚠️ ČEKÁ NA SIGNÁL (${queue.length})`;
        }
    }
    
    window.addEventListener('online', syncData);
</script>
</body>
</html>
