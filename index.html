<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #3b82f6; --success: #52c41a; --bg: #f0f2f5; --card: #ffffff; --text: #1f2937; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 80px; }
        .container { width: 100%; max-width: 450px; padding: 15px; box-sizing: border-box; }
        .header { width: 100%; padding: 25px 20px; background: var(--card); border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .card { background: var(--card); border-radius: 24px; padding: 25px; margin-top: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #f3f4f6; width: 100%; box-sizing: border-box; }
        .input-wrapper { margin-bottom: 20px; text-align: left; }
        .input-wrapper label { display: block; font-size: 11px; font-weight: 800; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .input-box { background: #f9fafb; border-radius: 12px; padding: 15px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f3f4f6; }
        .icon-btn { background: var(--primary); color: white; border-radius: 10px; width: 44px; height: 44px; border: none; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        #reader, #reader-point { width: 100% !important; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 15px; border: 1px solid #e5e7eb; }
        button.main-btn { width: 100%; padding: 20px; background: #52c41a; color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        input { width: 100%; padding: 18px; margin-top: 10px; border-radius: 12px; border: 1px solid #f3f4f6; background: #f9fafb; font-size: 24px; text-align: center; letter-spacing: 10px; box-sizing: border-box; }
        textarea { width: 100%; padding: 15px; margin-top: 5px; border-radius: 12px; border: 1px solid #f3f4f6; background: #f9fafb; font-size: 15px; min-height: 80px; box-sizing: border-box; }
        .hidden { display: none; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #e5e7eb; padding: 15px 0; z-index: 100; justify-content: space-around; }
        .nav-item { font-size: 11px; color: #9ca3af; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<audio id="beep-sound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
</audio>

<div class="header">
    <div>
        <h2 style="margin:0; font-size: 22px;">Control <span style="color:var(--primary)">PRO</span></h2>
        <p style="margin:2px 0 0 0; font-size: 12px; color:#9ca3af;">Technický dozor</p>
    </div>
</div>

<div id="login-screen" class="container">
    <div class="card">
        <div id="reader"></div>
        <div class="input-wrapper">
            <label>PRACOVNÍK / TECHNIK</label>
            <div class="input-box">
                <span id="pending-name">Naskenujte ID kartu</span>
                <button class="icon-btn" onclick="startScanner(onLogin, 'reader')">👤</button>
            </div>
        </div>
        <div id="pin-section" class="hidden">
            <input type="password" id="pin-input" placeholder="****" inputmode="numeric">
            <button class="main-btn" onclick="verifyPin()" style="margin-top:15px; background:var(--primary);">PŘIHLÁSIT SE</button>
        </div>
    </div>
</div>

<div id="main-screen" class="container hidden">
    <div class="card">
        <div id="reader-point" class="hidden"></div>
        <div class="input-wrapper">
            <label>BOD KONTROLY / MÍSTO</label>
            <div class="input-box">
                <span id="point-display">Skenujte kód místa</span>
                <button class="icon-btn" onclick="showPointScanner()">📍</button>
            </div>
        </div>
        <div class="input-wrapper">
            <label>POZNÁMKA K OBCHŮZCE</label>
            <textarea id="note-input" placeholder="Např. Bez závad..."></textarea>
        </div>
        <button class="main-btn" onclick="saveRecord()">ZAPSAT DO EVIDENCE</button>
    </div>
</div>

<div class="nav-bar hidden" id="bottom-nav">
    <div class="nav-item active">OBCHŮZKA</div>
    <div class="nav-item">HISTORIE</div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwPZx2ZaIrSErhfPgsz6OYrNxbsTz7KgbsYEbN8Myx8Q7JSJklHyeUiFtsmvimG4qQe/exec";
    
    const USERS = {
        "Jiří Bělíček": "5481", "Dalibor Čech": "2368", "René Russwurm st.": "1798", 
        "René Russwurm ml.": "2849", "Roman Zámečník": "6984", "Marek Slovák": "1179", 
        "Martin Kuneš": "2538", "David Mirvald": "1099", "Petr Illa": "7923", 
        "Mirek Švarný": "1739", "Lukáš Sem": "4197", "Laďa Poledna": "5592"
    };
    
    let currentWorker = "", currentPoint = "", html5QrCode = null;

    function playFeedback() {
        const beep = document.getElementById('beep-sound');
        beep.volume = 1.0; 
        beep.play().catch(()=>{});
        if (navigator.vibrate) {
            navigator.vibrate([400, 100, 400, 100, 400]); // Pořádná vibrace
        }
    }

    async function startScanner(callback, elId) {
        document.getElementById('beep-sound').play().then(()=>document.getElementById('beep-sound').pause()).catch(()=>{});
        if(html5QrCode) await html5QrCode.stop().catch(()=>{});
        html5QrCode = new Html5Qrcode(elId);
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 280 }, (text) => {
            playFeedback();
            html5QrCode.stop().then(() => callback(text));
        }).catch(() => alert("Povolte kameru v Safari"));
    }

    function onLogin(name) {
        currentWorker = name.trim();
        document.getElementById('pending-name').innerText = currentWorker;
        document.getElementById('pin-section').classList.remove('hidden');
    }

    function verifyPin() {
        const pin = document.getElementById('pin-input').value;
        if(USERS[currentWorker] === pin) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
        } else {
            alert("NEPLATNÝ PIN!");
            document.getElementById('pin-input').value = "";
        }
    }

    function showPointScanner() {
        document.getElementById('reader-point').classList.remove('hidden');
        startScanner(onPointScan, 'reader-point');
    }

    function onPointScan(point) {
        currentPoint = point;
        document.getElementById('point-display').innerText = point;
        document.getElementById('reader-point').classList.add('hidden');
    }

    function saveRecord() {
        if(!currentPoint) return alert("Naskenujte bod!");
        navigator.geolocation.getCurrentPosition((pos) => {
            const gps = `https://www.google.com/search?q=http://google.com/maps%3Fq%3D48.80,16.63{pos.coords.latitude},${pos.coords.longitude}`;
            const record = { time: new Date().toLocaleString('cs-CZ'), worker: currentWorker, place: currentPoint, note: document.getElementById('note-input').value || "OK", gps: gps
