<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KING APPLICATION PRO v1.7.5</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #0a84ff; --danger: #ff453a; --warning: #ff9f0a; --success: #32d74b; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); text-align: center; overflow-x: hidden; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #333; position: relative; }
        
        #flash-ok, #flash-error { position: fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; z-index:10000; color:white; font-size: 150px; font-weight: bold; }
        #flash-ok { background: var(--success); } #flash-error { background: var(--danger); }

        #task-box { background: #2c2c2e; border: 3px solid var(--warning); border-radius: 15px; padding: 15px; margin: 15px 0; display: none; text-align: left; animation: blink-border 1s infinite; }
        @keyframes blink-border { 0% { border-color: var(--warning); } 50% { border-color: white; } 100% { border-color: var(--warning); } }
        
        .task-btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-ack { background: var(--primary); color: white; padding: 12px; border-radius: 10px; border: none; font-weight: bold; width: 100%; margin-bottom: 10px; cursor: pointer; }
        
        .btn-hold { position: relative; padding: 15px; flex: 1; border-radius: 10px; border:none; color:white; font-weight:bold; overflow: hidden; touch-action: none; cursor: pointer; }
        .btn-h { background: #1a5c27; } .btn-n { background: #7a1a14; }
        .hold-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: rgba(255,255,255,0.3); pointer-events: none; }

        select, input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #333; border-radius: 12px; font-size: 16px; background: #2c2c2e; color: #fff; box-sizing: border-box; outline: none; }
        .btn { border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { padding: 18px; font-size: 17px; margin-bottom: 10px; }
        .btn-scan { background: var(--primary); }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px; font-size: 13px; margin-bottom: 15px; width: auto; display: inline-flex; }
        
        .sos-container { position: relative; width: 100%; height: 70px; background: #251010; border-radius: 35px; margin-top: 20px; overflow: hidden; border: 2px solid var(--danger); z-index: 9998; }
        .sos-handle { position: absolute; left: 5px; top: 5px; width: 60px; height: 60px; background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; font-size: 24px; touch-action: none; }
        
        #status { font-weight: bold; margin: 15px; color: var(--success); font-size: 13px; }
        .hidden { display: none !important; }
        .boss-panel { border: 2px solid var(--primary); padding: 15px; border-radius: 15px; background: #1a2633; }
    </style>
</head>
<body onclick="initAudio()" ontouchstart="initAudio()">
<div id="flash-ok">✅</div><div id="flash-error">❌</div>

<div class="card" id="login-card">
    <div style="margin-bottom:15px; font-weight:bold; color:var(--primary);">PŘIHLÁŠENÍ</div>
    <select id="tech-select" onchange="document.getElementById('auth-section').classList.remove('hidden')">
        <option value="">-- Vyber jméno --</option>
        <option value="VEDOUCÍ">⭐ VEDOUCÍ</option>
        <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
    </select>
    <div id="auth-section" class="hidden"><input type="password" id="tech-pin" placeholder="PIN" oninput="checkAuth()"></div>
</div>

<div class="card hidden" id="main-card">
    <button class="btn btn-logout" onclick="location.reload()">🔒 ODHLÁSIT</button>
    <div id="task-box">
        <small id="task-header" style="color: var(--warning); font-weight: bold;">⚠️ NOVÝ ÚKOL:</small>
        <div id="task-text" style="font-weight: bold; margin-top: 8px; font-size: 18px;"></div>
        <button id="btn-ack" class="btn-ack" onclick="ackTask()">OK, ROZUMÍM</button>
        <div class="task-btn-group">
            <button class="btn-hold btn-h" ontouchstart="startHold(event, 'HOTOVO')" ontouchend="stopHold()" onmousedown="startHold(event, 'HOTOVO')"><div class="hold-progress" id="prog-h"></div>HOTOVO</button>
            <button class="btn-hold btn-n" ontouchstart="startHold(event, 'NELZE')" ontouchend="stopHold()" onmousedown="startHold(event, 'NELZE')"><div class="hold-progress" id="prog-n"></div>NELZE</button>
        </div>
    </div>
    <div id="action-controls">
        <div id="camera-container" style="display:none; border-radius:15px; overflow:hidden; border:2px solid var(--primary); margin-bottom:10px;"><video id="video" style="width:100%;"></video></div>
        <input type="text" id="scan-note" placeholder="Poznámka..."><button class="btn btn-main btn-scan" onclick="startScanner()">SKENOVAT BOD</button>
    </div>
    <div class="sos-container" id="sos-slider"><div id="handle" class="sos-handle">🆘</div></div>
</div>

<div class="card hidden" id="boss-card">
    <button class="btn btn-logout" onclick="location.reload()">🔒 ODHLÁSIT</button>
    <div class="boss-panel">
        <h3 style="color:var(--primary); margin-top:0;">ZADAT NOVÝ ÚKOL</h3>
        <select id="target-tech">
            <option value="Jiří Bělíček">Jiří Bělíček</option><option value="Dalibor Čech">Dalibor Čech</option><option value="René Russwurm st.">René Russwurm st.</option><option value="René Russwurm ml.">René Russwurm ml.</option><option value="Roman Zámečník">Roman Zámečník</option><option value="Marek Slovák">Marek Slovák</option><option value="Martin Kuneš">Martin Kuneš</option><option value="David Mirvald">David Mirvald</option><option value="Petr Illa">Petr Illa</option><option value="Mirek Švarný">Mirek Švarný</option><option value="Lukáš Sem">Lukáš Sem</option><option value="Laďa Poledna">Laďa Poledna</option>
        </select>
        <textarea id="new-task-text" placeholder="Text úkolu..."></textarea>
        <button class="btn btn-main" style="background:var(--success);" onclick="sendNewTask()">🚀 ODESLAT ÚKOL</button>
    </div>
</div>

<div class="card hidden" id="status-card"><div id="status">PŘIPOJOVÁNÍ...</div></div>

<script>
    const SCRIPT_URL = "TVUJ_SCRIPT_URL"; 
    const PINS = {"VEDOUCÍ":"0000","Jiří Bělíček":"5481","Dalibor Čech":"2368","René Russwurm st.":"1798","René Russwurm ml.":"2849","Roman Zámečník":"6984","Marek Slovák":"1179","Martin Kuneš":"2538","David Mirvald":"1099","Petr Illa":"7923","Mirek Švarný":"1739","Lukáš Sem":"4197","Laďa Poledna":"5592"};
    let selectedTech = "", audioCtx = null, isProcessing = false, lastLoc = "";

    navigator.geolocation.watchPosition((p) => { lastLoc = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`; });
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function checkAuth() {
        let t = document.getElementById('tech-select').value;
        if (PINS[t] === document.getElementById('tech-pin').value) {
            initAudio(); selectedTech = t;
            document.getElementById('login-card').classList.add('hidden');
            if (t === "VEDOUCÍ") {
                document.getElementById('boss-card').classList.remove('hidden');
            } else {
                document.getElementById('main-card').classList.remove('hidden');
                document.getElementById('status-card').classList.remove('hidden');
                setInterval(processQueue, 5000);
            }
        }
    }

    async function sendNewTask() {
        const target = document.getElementById('target-tech').value;
        const text = document.getElementById('new-task-text').value.trim();
        if (!text) return alert("Napiš text úkolu!");
        
        const payload = { type: 'add_task', technician: selectedTech, targetTech: target, taskText: text, location: lastLoc };
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const res = await resp.json();
        if (res.status === "OK") {
            alert("Úkol pro " + target + " byl úspěšně odeslán.");
            document.getElementById('new-task-text').value = "";
        }
    }

    // ... (Zbytek funkcí startHold, processQueue, startScanner atd. zůstává stejný jako v1.7.4) ...
</script>
</body>
</html>
