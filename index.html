<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALFA OMEGA - Aquapark</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { color: #1a73e8; margin-top: 0; }
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn { border: none; padding: 18px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; margin-bottom: 10px; color: white; transition: 0.2s; }
        .btn-scan { background: #1a73e8; }
        .btn-sos { background: #d93025; height: 80px; font-size: 22px; box-shadow: 0 4px #a5241b; margin-top: 20px; }
        .btn-sos:active { box-shadow: 0 0 #a5241b; transform: translateY(4px); }
        .btn-deadman { background: #f9ab00; }
        #camera-container { width: 100%; max-width: 400px; margin: 0 auto 15px auto; display: none; border: 3px solid #1a73e8; border-radius: 15px; overflow: hidden; }
        #video { width: 100%; height: auto; display: block; }
        .badge { display: inline-block; background: #1a73e8; color: white; padding: 8px 12px; border-radius: 20px; margin: 3px; font-size: 14px; }
        #status { font-weight: bold; margin-top: 10px; color: #555; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛠 ALFA OMEGA</h2>
    
    <div id="setup-section">
        <p><b>Kdo provádí kontrolu?</b></p>
        <select id="tech-select" onchange="addTech()">
            <option value="">-- Vyber technika --</option>
            <option value="Jakub">Jakub</option>
            <option value="Petr">Petr</option>
            <option value="Pavel">Pavel</option>
            <option value="Marek">Marek</option>
        </select>
        <div id="selected-techs" style="margin-bottom: 15px;"></div>
        
        <div id="camera-container">
            <video id="video"></video>
            <button class="btn" onclick="stopScanner()" style="background:#555; border-radius:0; margin:0;">ZAVŘÍT KAMERU</button>
        </div>

        <button class="btn btn-scan" onclick="startScanner()">📷 SPUSTIT SKENER</button>
        <button id="deadman-btn" class="btn btn-deadman" onclick="toggleDeadman()">⏲ MRTVÝ MUŽ (VYP)</button>
        <button class="btn btn-sos" onclick="sendSOS()">🆘 SOS POPLACH</button>
    </div>
</div>

<div class="card">
    <textarea id="boss-msg" placeholder="Zde můžeš napsat vzkaz vedoucímu..."></textarea>
    <div id="status">Připraveno</div>
</div>

<script>
    // TVOJE PEVNÁ ADRESA - UŽ JI NEMUSÍŠ NIKDY MĚNIT
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FNrRKm8Ddq4NC1EqDKzUku0Ck2ZLJ8jUutG3Vjlh0NUC9FxxMF8Kh06HhvWoDcej/exec"; 
    
    let selectedTechs = [];
    let codeReader = new ZXing.BrowserMultiFormatReader();
    let deadmanTimer = null;

    function addTech() {
        let val = document.getElementById('tech-select').value;
        if (val && !selectedTechs.includes(val)) {
            selectedTechs.push(val);
            updateTechUI();
        }
    }

    function updateTechUI() {
        let container = document.getElementById('selected-techs');
        container.innerHTML = selectedTechs.map(t => `<span class="badge">${t}</span>`).join('');
    }

    async function startScanner() {
        if (selectedTechs.length === 0) { alert("Nejdřív vyber technika!"); return; }
        document.getElementById('camera-container').style.display = 'block';
        
        codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
            if (result) {
                stopScanner();
                sendData('scan', result.text);
            }
        });
    }

    function stopScanner() {
        codeReader.reset();
        document.getElementById('camera-container').style.display = 'none';
    }

    function toggleDeadman() {
        if (selectedTechs.length === 0) { alert("Nejdřív vyber technika!"); return; }
        if (!deadmanTimer) {
            let mins = prompt("Za kolik minut se ozveš?", "15");
            if (!mins) return;
            document.getElementById('deadman-btn').innerText = `⏲ ODPOCET: ${mins}m (ZRUŠIT)`;
            deadmanTimer = setTimeout(() => {
                sendData('deadman_alarm', 'Mrtvý muž - čas vypršel!');
                alert("ALARM MRTVÝ MUŽ ODESLÁN!");
            }, mins * 60000);
        } else {
            clearTimeout(deadmanTimer);
            deadmanTimer = null;
            document.getElementById('deadman-btn').innerText = `⏲ MRTVÝ MUŽ (VYP)`;
            alert("Časovač zrušen.");
        }
    }

    function sendSOS() {
        if (selectedTechs.length === 0) { alert("Nejdřív vyber technika!"); return; }
        if (confirm("OPRAVDU VYSLAT SOS POPLACH?")) {
            sendData('SOS', 'MANUÁLNÍ SOS');
        }
    }

    function sendData(type, code) {
        document.getElementById('status').innerText = "⏳ Odesílám...";
        
        navigator.geolocation.getCurrentPosition(pos => {
            const loc = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            post(type, code, loc);
        }, () => {
            post(type, code, "Poloha nedostupná");
        });
    }

    function post(type, code, location) {
        const payload = {
            type: type,
            code: code,
            technicians: selectedTechs,
            message: document.getElementById('boss-msg').value,
            location: location
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        }).then(() => {
            document.getElementById('status').innerText = "✅ ODESLÁNO V " + new Date().toLocaleTimeString();
            document.getElementById('boss-msg').value = "";
            if (type === 'SOS') alert("SOS BYLO ODESLÁNO!");
        }).catch(e => {
            document.getElementById('status').innerText = "❌ CHYBA!";
        });
    }
</script>

</body>
</html>
