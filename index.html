<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        #reader { width: 100%; border-radius: 20px; background: #000; min-height: 300px; border: 2px solid #334155; overflow: hidden; }
        /* Klíčové pro zobrazení videa */
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: #000; }
        .hidden { display: none !important; }
        #error-log { color: #ff4444; font-size: 12px; margin-top: 10px; text-align: center; background: rgba(255,0,0,0.1); border-radius: 10px; padding: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center">AQ TECH <span>PRO</span></h1>
    
    <div id="reader"></div>
    <div id="error-log" class="hidden"></div>

    <div id="sec-login" class="card">
        <button class="btn btn-primary" onclick="startCamera('login')">ZAPNOUT SKENER</button>
        <div id="auth-box" class="hidden">
            <h2 id="worker-name" style="color: var(--primary)"></h2>
            <input type="password" id="pin-field" placeholder="PIN" inputmode="numeric" style="width:100%; padding:15px; font-size:20px; border-radius:10px; margin:10px 0;">
            <button class="btn" style="background:#10b981; color:white;" onclick="login()">PŘIHLÁSIT</button>
        </div>
    </div>

    <div id="sec-work" class="card hidden">
        <button class="btn btn-primary" onclick="startCamera('work')">SKENOVAT OBJEKT</button>
        <div id="work-box" class="hidden">
            <p>Objekt: <strong id="obj-id" style="color:var(--primary)"></strong></p>
            <textarea id="note-field" placeholder="Poznámka..." style="width:100%; padding:15px; border-radius:10px;"></textarea>
            <button class="btn" style="background:#f59e0b; color:white;" onclick="sendData()">ODESLAT</button>
        </div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbxNf2EgoBJOUWvKflRisSFfQt6L2JivO3Lcw53amT7WcTTwgNBeQi9awfpzEXErjAI/exec";
    const EMPLOYEES = { "T01": { name: "Jiří Bělíček", pin: "5481" }, "T02": { name: "Dalibor Čech", pin: "2368" } }; // Doplň si ostatní...

    let user = null;
    let scanner = new Html5Qrcode("reader");

    async function startCamera(mode) {
        const errLog = document.getElementById('error-log');
        errLog.classList.add('hidden');

        try {
            if (scanner.getState() === 2) await scanner.stop();
            await scanner.start(
                { facingMode: "environment" }, 
                { fps: 20, qrbox: 250 },
                (txt) => {
                    if (mode === 'login') {
                        if (EMPLOYEES[txt]) {
                            user = { id: txt, ...EMPLOYEES[txt] };
                            document.getElementById('worker-name').innerText = user.name;
                            document.getElementById('auth-box').classList.remove('hidden');
                            scanner.stop();
                        }
                    } else {
                        document.getElementById('obj-id').innerText = txt;
                        document.getElementById('work-box').classList.remove('hidden');
                        scanner.stop();
                    }
                }
            );
        } catch (err) {
            errLog.innerText = "CHYBA: " + err;
            errLog.classList.remove('hidden');
            if (location.protocol !== 'https:') alert("MUSÍŠ MÍT HTTPS ADRESU!");
        }
    }

    function login() {
        if (document.getElementById('pin-field').value === user.pin) {
            document.getElementById('sec-login').classList.add('hidden');
            document.getElementById('sec-work').classList.remove('hidden');
        } else alert("ŠPATNÝ PIN");
    }

    function sendData() {
        const now = new Date();
        const scanTime = now.toLocaleString("cs-CZ");
        const obj = document.getElementById('obj-id').innerText;
        const note = document.getElementById('note-field').value;

        navigator.geolocation.getCurrentPosition((pos) => {
            const gps = pos.coords.latitude.toFixed(6) + "," + pos.coords.longitude.toFixed(6);
            const url = `${URL_API}?worker=${encodeURIComponent(user.name)}&place=${encodeURIComponent(obj)}&note=${encodeURIComponent(note)}&gps=${encodeURIComponent(gps)}&time=${encodeURIComponent(scanTime)}`;
            
            fetch(url, { mode: 'no-cors' }).then(() => {
                alert("ULOŽENO!\nČas: " + scanTime);
                location.reload();
            });
        }, () => alert("ZAPNI GPS!"), { enableHighAccuracy: true });
    }
</script>
</body>
</html>
