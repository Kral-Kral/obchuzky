<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ TECH PRO 2026</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --text: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; }
        
        #reader { 
            width: 100%; border-radius: 24px; background: #000; min-height: 300px; 
            border: 2px solid #334155; overflow: hidden; display: flex; 
            align-items: center; justify-content: center; position: relative;
        }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }

        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { border: none; padding: 20px; width: 100%; border-radius: 18px; font-size: 17px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; -webkit-tap-highlight-color: transparent; outline: none; }
        .btn-blue { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }
        .btn-blue:active { background: #7dd3fc; transform: scale(0.95); }
        
        .hidden { display: none !important; }
        input, textarea { width: 100%; padding: 18px; margin: 12px 0; border-radius: 14px; background: #0d1117; color: white; border: 1px solid #334155; box-sizing: border-box; font-size: 18px; }
        
        #version-tag { margin-top: 20px; font-size: 12px; color: #475569; text-align: center; font-family: monospace; }
        #status { margin-top: 10px; font-size: 14px; color: var(--primary); text-align: center; font-weight: bold; min-height: 1.5em; }
        #debug-log { font-size: 10px; color: #ef4444; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center; margin-bottom: 20px;">AQ TECH <span style="color:var(--primary)">PRO</span></h1>
    
    <div id="reader">
        <div id="msg" style="color:#64748b; text-align:center; padding:20px;">Kamera připravena.</div>
    </div>
    
    <div id="status">Systém připraven k akci</div>
    <div id="debug-log"></div>

    <audio id="beep" src="https://www.soundjay.com/buttons/beep-07a.mp3" preload="auto"></audio>

    <div id="sec-login" class="card">
        <button class="btn btn-blue" id="btn-main-auth" onclick="startFlow('login')">📷 SKENOVAT KARTU</button>
        
        <div id="ui-login" class="hidden">
            <h2 id="worker-label" style="color: var(--primary); margin: 5px 0;">---</h2>
            <input type="password" id="pin" placeholder="ZADEJ PIN" inputmode="numeric" maxlength="4">
            <button class="btn" style="background:var(--success); color:white" onclick="verifyLogin()">POTVRDIT PIN</button>
        </div>
    </div>

    <div id="sec-work" class="card hidden">
        <button class="btn btn-blue" id="btn-main-work" onclick="startFlow('work')">🔍 SKENOVAT OBJEKT</button>
        
        <div id="ui-work" class="hidden">
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 14px; margin: 10px 0;">
                <small style="color: #64748b">ID OBJEKTU:</small>
                <div id="obj-label" style="font-size: 24px; font-weight: 900; color: var(--primary)">---</div>
            </div>
            <textarea id="note" placeholder="Poznámka / Závada..."></textarea>
            <button class="btn" style="background:var(--success); color:white" onclick="saveData()">🚀 ULOŽIT A ODESLAT</button>
        </div>
    </div>

    <div id="version-tag">VERZE: v2026.05</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNf2EgoBJOUWvKflRisSFfQt6L2JivO3Lcw53amT7WcTTwgNBeQi9awfpzEXErjAI/exec";

    const EMPLOYEES = {
        "T01": { name: "Jiří Bělíček", pin: "5481" }, "T02": { name: "Dalibor Čech", pin: "2368" },
        "T03": { name: "René Russwurm st.", pin: "1798" }, "T04": { name: "René Russwurm ml.", pin: "2849" },
        "T05": { name: "Roman Zámečník", pin: "6984" }, "T06": { name: "Marek Slovák", pin: "1179" },
        "T07": { name: "Martin Kuneš", pin: "2538" }, "T08": { name: "David Mirvald", pin: "1099" },
        "T09": { name: "Petr Illa", pin: "7923" }, "T10": { name: "Mirek Švarný", pin: "1739" },
        "T11": { name: "Lukáš Sem", pin: "4197" }, "T12": { name: "Laďa Poledna", pin: "5592" }
    };

    let currentUser = null;
    let currentPlace = "";
    let html5QrCode = null;

    // Funkce, která ošetří kliknutí na tlačítko
    function startFlow(mode) {
        logDebug(""); // Vymazat staré chyby
        document.getElementById('status').innerText = "Spouštím kameru...";
        
        try {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            initScanner(mode);
        } catch (e) {
            logDebug("Chyba při startu: " + e.message);
            alert("Skener se nepodařilo inicializovat. Zkuste obnovit stránku.");
        }
    }

    async function initScanner(mode) {
        try {
            if (html5QrCode.getState() === 2) {
                await html5QrCode.stop();
            }
            
            await html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 20, qrbox: { width: 250, height: 250 } },
                (txt) => {
                    document.getElementById('beep').play().catch(()=>{});
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    
                    if (mode === 'login') {
                        if (EMPLOYEES[txt]) {
                            currentUser = EMPLOYEES[txt];
                            document.getElementById('worker-label').innerText = currentUser.name;
                            document.getElementById('ui-login').classList.remove('hidden');
                            document.getElementById('btn-main-auth').classList.add('hidden');
                            html5QrCode.stop();
                            document.getElementById('status').innerText = "Zadejte PIN";
                        } else {
                            alert("Neznámý kód technika: " + txt);
                        }
                    } else {
                        currentPlace = txt;
                        document.getElementById('obj-label').innerText = txt;
                        document.getElementById('ui-work').classList.remove('hidden');
                        html5QrCode.stop();
                        document.getElementById('status').innerText = "Místo načteno";
                    }
                }
            );
        } catch (err) {
            logDebug("Kamera Error: " + err);
            document.getElementById('status').innerText = "Chyba kamery";
        }
    }

    function logDebug(msg) {
