<style>
    /* Upravený styl pro potvrzovací tlačítko */
    .btn-done { 
        background: #f8fafc; 
        color: #020617; 
        padding: 14px; 
        border-radius: 14px; 
        margin-top: 12px; 
        font-size: 15px; 
        width: 100%; 
        border: 2px solid #fff; 
        font-weight: 800; 
        cursor: pointer; 
        transition: 0.2s;
    }
    /* Styl pro stav "Potvrďte znovu" */
    .btn-confirm-stage { 
        background: #f43f5e !important; 
        color: white !important; 
        border-color: #f43f5e !important;
        animation: shake 0.3s;
    }
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }
</style>

<script>
    // ... (ostatní proměnné zůstávají)

    // NOVÁ FUNKCE S DVOJITÝM OVĚŘENÍM
    async function completeTask(place, note) {
        const btn = event.target;
        
        // První stupeň ověření
        if (!btn.classList.contains('btn-confirm-stage')) {
            btn.classList.add('btn-confirm-stage');
            btn.innerText = "⚠️ OPRAVDU HOTOVO? (KLIKNI ZNOVU)";
            
            // Pokud do 3 sekund neklikne podruhé, vrátí se to do původního stavu
            setTimeout(() => {
                if (btn && !btn.disabled) {
                    btn.classList.remove('btn-confirm-stage');
                    btn.innerText = "✅ OZNAČIT JAKO HOTOVÉ";
                }
            }, 3000);
            return;
        }

        // Druhý stupeň - samotné odeslání
        btn.innerText = "PROSÍM ČEKEJ...";
        btn.disabled = true;

        try {
            // Odeslání do Google Scriptu
            await fetch(`${SCRIPT_URL}?action=completeTask&worker=${encodeURIComponent(currentUser.name)}&place=${encodeURIComponent(place)}&note=${encodeURIComponent(note)}`, { mode: 'no-cors' });
            
            // Vizuální zpětná vazba a úklid
            btn.innerText = "VYŘÍZENO ✅";
            btn.style.background = "#10b981";
            
            // Refresh úkolů
            setTimeout(checkTasks, 1000);
        } catch (e) {
            alert("Chyba spojení.");
            btn.disabled = false;
            btn.classList.remove('btn-confirm-stage');
            btn.innerText = "ZKUSIT ZNOVU";
        }
    }
</script>
