<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ CONTROL 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root { --bg: #020617; --glass: rgba(30, 41, 59, 0.7); --primary: #38bdf8; --success: #10b981; --error: #f43f5e; --text-main: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 440px; }
        header h1 { text-align: center; font-size: 26px; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #sync-status { width: 100%; padding: 10px; border-radius: 12px; text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 13px; display: none; }
        .sync-active { background: var(--primary); color: #000; display: block !important; }
        .sync-offline { background: #334155; color: #94a3b8; display: block !important; }
        .task-card { background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(16, 185, 129, 0.2)); border: 2px solid var(--primary); border-radius: 20px; padding: 15px; margin-bottom: 15px; box-shadow: 0 0 15px var(--primary); transition: 0.5s; }
        .btn-done { padding: 12px; border-radius: 12px; margin-top: 10px; font-size: 14px; width: 100%; border: none; font-weight: 800; cursor: pointer; color: white; }
        .btn-confirm-stage { background: var(--error) !important; color: white !important; }
        .scanner-wrap { width: 100%; border-radius: 28px; overflow: hidden; border: 2px solid var(--border); background: #000; }
        #reader { width: 100%; min-height: 250px; }
        .card { background: var(--glass); backdrop-filter: blur(16px); border-radius: 28px; padding: 20px; margin-top: 20px; border: 1px solid var(--border); }
        .btn { border: none; padding: 18px; width: 100%; border-radius: 18px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: #020617; }
        .btn-success { background: var(--success); color: white; margin-top: 15px; }
        textarea { width: 100%; padding: 16px; border-radius: 16px; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--border); font-size: 16px; resize: none; margin-top: 10px; }
        input { width: 100%; padding: 16px; margin: 12px 0; border-radius: 16px; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--border); text-align: center; font-size: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="app-container">
    <header><h1>AQ CONTROL</h1></header>
    <div id="sync-status">SYNCHRONIZACE...</div>
    <div id="task-container"></div>
    <div class="scanner-wrap"><div id="reader"></div></div>
    <div id="status" style="text-align:center; margin:10px; font-size:12px; color:var(--primary); font-weight:bold;">PŘIPRAVEN</div>

    <div id="sec-login" class="card">
        <button class="btn btn-primary" onclick="startCamera('login')">📷 PŘIHLÁSIT TECHNIKA</button>
        <div id="ui-login" class="hidden">
            <h2 id="worker-label" style="text-align:center; color:var(--primary)"></h2>
            <input type="password" id="pin" placeholder="PIN" inputmode="numeric" maxlength="4">
            <button class="btn btn-success" onclick="verifyLogin()">VSTOUPIT</button>
        </div>
    </div>

    <div id="sec-work" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span id="logged-name" style="font-weight:700;">---</span>
                <button style="background:none; border:1px solid var(--error); color:var(--error); padding:5px 10px; border-radius:8px; cursor:pointer;" onclick="logout()">ODHLÁSIT</button>
            </div>
            <button class="btn btn-primary" onclick="startCamera('work')">🔍 SKENOVAT OBJEKT</button>
            <div id="ui-work" class="hidden">
                <div style="background:rgba(56,189,248,0.1); padding:15px; border-radius:15px; margin:15px 0; text-align:center;">
                    <small>OBJEKT:</small><div id="obj-label" style="font-size:22px; font-weight:800;">---</div>
                </div>
                <textarea id="note" placeholder="Poznámka..." rows="3"></textarea>
                <button class="btn btn-success" id="save-btn" onclick="saveData()">🚀 ODESLAT DO ZÁZNAMŮ</button>
            </div>
        </div>
    </div>
    <div style="margin-top:20px; font-size:10px; color:#475569; text-align:center;">VERZE: v2026.29 (Final Production)</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzA4ifLfwkOX1k2D9u7uLzW61OLZCAAWy9M-OUlsg_hTny8nxtshJQnBz9lESTtkks/exec";
    const EMPLOYEES = { "T01": { name: "Jiří Bělíček", pin: "5481" }, "T02": { name: "Dalibor Čech", pin: "2368" }, "T03": { name: "René Russwurm st.", pin: "1798" }, "T04": { name: "René Russwurm ml.", pin: "2849" }, "T05": { name: "Roman Zámečník", pin: "6984" }, "T06": { name: "Marek Slovák", pin: "1179" }, "T07": { name: "Martin Kuneš", pin: "2538" }, "T08": { name: "David Mirvald", pin: "1099" }, "T09": { name: "Petr Illa", pin: "7923" }, "T10": { name: "Mirek Švarný", pin: "1739" }, "T11": { name: "Lukáš Sem", pin: "4197" }, "T12": { name: "Laďa Poledna", pin: "5592" } };
    
    let currentUser = null; let html5QrCode = new Html5Qrcode("reader"); let audioCtx = null; let isSyncing = false; let lastTaskCount = 0;

    function playAlarm() { 
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
        if (audioCtx.state === 'suspended') audioCtx.resume(); 
        const t = audioCtx.currentTime; 
        for(let i=0; i<4; i++) { 
            const f = i % 2 === 0 ? 880 : 660; 
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); 
            o.type = 'sawtooth'; o.frequency.setValueAtTime(f, t + i * 0.4); 
            g.gain.setValueAtTime(0.3, t + i * 0.4); g.gain.exponentialRampToValueAtTime(0.01, t + (i+0.8) * 0.4); 
            o.connect(g); g.connect(audioCtx.destination); o.start(t + i * 0.4); o.stop(t + (i+0.8) * 0.4); 
        } 
    }

    async function checkTasks() { 
        if (!currentUser || !navigator.onLine) return; 
        try { 
            const res = await fetch(`${SCRIPT_URL}?action=getTasks&worker=${encodeURIComponent(currentUser.name)}`); 
            const tasks = await res.json(); 
            const container = document.getElementById('task-container'); 
            if (tasks && tasks.length > 0) { 
                container.innerHTML = tasks.map(t => `
                    <div class="task-card">
                        <small style="color:var(--primary); font-weight:bold;">⚠️ ÚKOL</small>
                        <div style="font-weight:bold; font-size:19px; margin:5px 0;">${t.place}</div>
                        <div style="font-size:14px; opacity:0.9;">${t.note}</div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-done" style="background:var(--success);" onclick="completeTask('${t.place.replace(/'/g, "\\'")}', 'HOTOVO')">SPLNĚNO ✅</button>
                            <button class="btn-done" style="background:var(--error);" onclick="completeTask('${t.place.replace(/'/g, "\\'")}', 'NELZE')">NELZE ❌</button>
                        </div>
                    </div>`).join(''); 
                if (tasks.length > lastTaskCount) { playAlarm(); lastTaskCount = tasks.length; } 
            } else { container.innerHTML = ""; lastTaskCount = 0; } 
        } catch (e) {} 
    }

    async function completeTask(place, status) {
        const btn = event.target;
        if (!btn.classList.contains('btn-confirm-stage')) {
            btn.classList.add('btn-confirm-stage');
            const oldTxt = btn.innerText; btn.innerText = "POTVRĎ!";
            setTimeout(() => { if (btn && !btn.disabled) { btn.classList.remove('btn-confirm-stage'); btn.innerText = oldTxt; } }, 3000);
            return;
        }
        btn.innerText = "..."; btn.disabled = true;
        try {
            await fetch(`${SCRIPT_URL}?action=completeTask&worker=${encodeURIComponent(currentUser.name)}&place=${encodeURIComponent(place)}&status=${encodeURIComponent(status)}`, { mode: 'no-cors' });
            const card = btn.closest('.task-card');
            if (card) { card.style.opacity = "0"; setTimeout(() => { card.remove(); checkTasks(); }, 500); }
        } catch (e) { alert("Chyba spojení."); btn.disabled = false; }
    }

    async function startCamera(mode) { 
        try { 
            if (html5QrCode.getState() !== 1) await html5QrCode.stop().catch(()=>{}); 
            await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => { 
                if (mode === 'login') { if (EMPLOYEES[txt]) { currentUser = EMPLOYEES[txt]; document.getElementById('worker-label').innerText = currentUser.name; document.getElementById('ui-login').classList.remove('hidden'); html5QrCode.stop(); } } 
                else { document.getElementById('obj-label').innerText = txt; document.getElementById('ui-work').classList.remove('hidden'); html5QrCode.stop(); } 
            }); 
        } catch (e) { alert("Chyba kamery."); } 
    }

    function verifyLogin() { if (document.getElementById('pin').value === currentUser.pin) { localStorage.setItem('loggedWorker', JSON.stringify(currentUser)); showWork(); } else alert("Špatný PIN!"); }
    function showWork() { document.getElementById('sec-login').classList.add('hidden'); document.getElementById('sec-work').classList.remove('hidden'); document.getElementById('logged-name').innerText = currentUser.name; checkTasks(); }
    function logout() { localStorage.removeItem('loggedWorker'); location.reload(); }

    function saveData() { 
        const btn = document.getElementById('save-btn'); btn.disabled = true; 
        navigator.geolocation.getCurrentPosition((pos) => { 
            const item = { worker: currentUser.name, place: document.getElementById('obj-label').innerText, note: document.getElementById('note').value, gps: pos.coords.latitude.toFixed(6) + "," + pos.coords.longitude.toFixed(6), time: new Date().toLocaleString("cs-CZ") }; 
            let q = JSON.parse(localStorage.getItem('aqQ')) || []; q.push(item); localStorage.setItem('aqQ', JSON.stringify(q)); 
            document.getElementById('ui-work').classList.add('hidden'); document.getElementById('note').value = ""; btn.disabled = false; sync(); 
        }, () => { alert("GPS chyba!"); btn.disabled = false; }); 
    }

    async function sync() { 
        if (isSyncing) return; let q = JSON.parse(localStorage.getItem('aqQ')) || []; 
        const s = document.getElementById('sync-status'); if (q.length === 0) { s.className = ""; return; } 
        isSyncing = true; s.className = "sync-active"; s.innerText = `ODESÍLÁNÍ...`; 
        const i = q[0]; 
        const url = `${SCRIPT_URL}?worker=${encodeURIComponent(i.worker)}&place=${encodeURIComponent(i.place)}&note=${encodeURIComponent(i.note)}&gps=${encodeURIComponent(i.gps)}&time=${encodeURIComponent(i.time)}`; 
        try { await fetch(url, { mode: 'no-cors' }); q.shift(); localStorage.setItem('aqQ', JSON.stringify(q)); isSyncing = false; sync(); } 
        catch (e) { s.className = "sync-offline"; s.innerText = `OFFLINE (${q.length})`; isSyncing = false; } 
    }

    setInterval(sync, 20000); setInterval(checkTasks, 20000);
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === 'visible') { checkTasks(); sync(); } });
    window.onload = () => { const saved = localStorage.getItem('loggedWorker'); if (saved) { currentUser = JSON.parse(saved); showWork(); } sync(); };
</script>
</body>
</html>
