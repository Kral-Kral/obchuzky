<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQ CONTROL 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --bg: #020617; --glass: rgba(30, 41, 59, 0.7); --primary: #38bdf8;
            --success: #10b981; --error: #f43f5e; --text-main: #f8fafc; --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: sans-serif; background-color: var(--bg); color: var(--text-main);
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
        }
        .app-container { width: 100%; max-width: 440px; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 26px; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        
        /* Stavová lišta odesílání */
        #sync-status { 
            width: 100%; padding: 12px; border-radius: 14px; text-align: center; 
            margin-bottom: 15px; font-weight: bold; font-size: 13px; display: none;
            animation: breathe 2s infinite;
        }
        .sync-active { background: var(--primary); color: #000; display: block !important; }
        .sync-offline { background: #334155; color: #94a3b8; display: block !important; }

        @keyframes breathe { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .scanner-wrap { position: relative; width: 100%; border-radius: 28px; overflow: hidden; border: 2px solid var(--border); background: #000; }
        #reader { width: 100%; min-height: 280px; }

        .card { background: var(--glass); backdrop-filter: blur(16px); border-radius: 28px; padding: 20px; margin-top: 20px; border: 1px solid var(--border); }
        .btn { border: none; padding: 18px; width: 100%; border-radius: 18px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: #020617; }
        .btn-success { background: var(--success); color: white; margin-top: 15px; }
        
        .input-group { position: relative; margin: 12px 0; }
        textarea { width: 100%; padding: 16px; border-radius: 16px; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--border); font-size: 16px; resize: none; padding-right: 55px; }
        
        .voice-btn {
            position: absolute; bottom: 8px; right: 8px; width: 42px; height: 42px;
            border-radius: 12px; background: var(--primary); border: none; color: #000;
            font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .voice-btn.recording { background: var(--error); color: #fff; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { scale: 1; } 50% { scale: 1.1; } 100% { scale: 1; } }

        input { width: 100%; padding: 16px; margin: 12px 0; border-radius: 16px; background: rgba(15, 23, 42, 0.6); color: white; border: 1px solid var(--border); font-size: 16px; }
        .hidden { display: none !important; }
        .history-item { background: var(--glass); padding: 12px; border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>AQ CONTROL</h1></header>
    
    <div id="sync-status">SYNCHRONIZACE...</div>

    <div class="scanner-wrap"><div id="reader"></div></div>
    
    <div id="status" style="text-align:center; margin:10px; font-size:12px; color:var(--primary); font-weight:bold;">PŘIPRAVEN</div>

    <div id="sec-login" class="card">
        <button class="btn btn-primary" onclick="startCamera('login')">📷 PŘIHLÁSIT TECHNIKA</button>
        <div id="ui-login" class="hidden">
            <h2 id="worker-label" style="text-align:center; color:var(--primary)"></h2>
            <input type="password" id="pin" placeholder="PIN" inputmode="numeric" maxlength="4">
            <button class="btn btn-success" onclick="verifyLogin()">POTVRDIT</button>
        </div>
    </div>

    <div id="sec-work" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span id="logged-name" style="font-weight:700;">---</span>
                <button style="background:none; border:1px solid var(--error); color:var(--error); padding:5px 10px; border-radius:8px; cursor:pointer;" onclick="logout()">ODHLÁSIT</button>
            </div>
            <button class="btn btn-primary" onclick="startCamera('work')">🔍 SKENOVAT OBJEKT</button>
            <div id="ui-work" class="hidden">
                <div style="background:rgba(56,189,248,0.1); padding:15px; border-radius:15px; margin:15px 0;">
                    <small style="color:var(--primary)">OBJEKT:</small>
                    <div id="obj-label" style="font-size:20px; font-weight:800;">---</div>
                </div>
                <div class="input-group">
                    <textarea id="note" placeholder="Poznámka..." rows="3"></textarea>
                    <button class="voice-btn" id="voice-btn">🎤</button>
                </div>
                <button class="btn btn-success" id="save-btn" onclick="saveData()">🚀 ULOŽIT</button>
            </div>
        </div>
        <div id="history-list" style="margin-top:15px;"></div>
    </div>

    <div style="margin-top:20px; font-size:10px; color:#475569; text-align:center;">VERZE: v2026.13 (Auto-Sync)</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNf2EgoBJOUWvKflRisSFfQt6L2JivO3Lcw53amT7WcTTwgNBeQi9awfpzEXErjAI/exec";
    const EMPLOYEES = { "T01": { name: "Jiří Bělíček", pin: "5481" }, "T02": { name: "Dalibor Čech", pin: "2368" }, "T03": { name: "René Russwurm st.", pin: "1798" }, "T04": { name: "René Russwurm ml.", pin: "2849" }, "T05": { name: "Roman Zámečník", pin: "6984" }, "T06": { name: "Marek Slovák", pin: "1179" }, "T07": { name: "Martin Kuneš", pin: "2538" }, "T08": { name: "David Mirvald", pin: "1099" }, "T09": { name: "Petr Illa", pin: "7923" }, "T10": { name: "Mirek Švarný", pin: "1739" }, "T11": { name: "Lukáš Sem", pin: "4197" }, "T12": { name: "Laďa Poledna", pin: "5592" } };

    let currentUser = null;
    let html5QrCode = new Html5Qrcode("reader");
    let audioCtx = null;
    let isSyncing = false;

    function playBeep() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.value = 850;
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } catch(e) {}
    }

    // Mikrofon
    document.getElementById('voice-btn').onclick = function() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Hlas není dostupný.");
        const rec = new Speech(); rec.lang = 'cs-CZ';
        rec.onstart = () => this.classList.add('recording');
        rec.onresult = (e) => document.getElementById('note').value += (document.getElementById('note').value ? " " : "") + e.results[0][0].transcript;
        rec.onend = () => this.classList.remove('recording');
        rec.start();
    };

    async function startCamera(mode) {
        if (audioCtx) audioCtx.resume();
        try {
            if (html5QrCode.getState() !== 1) await html5QrCode.stop().catch(()=>{});
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
                playBeep();
                if (mode === 'login') {
                    if (EMPLOYEES[txt]) {
                        currentUser = EMPLOYEES[txt];
                        document.getElementById('worker-label').innerText = currentUser.name;
                        document.getElementById('ui-login').classList.remove('hidden');
                        html5QrCode.stop();
                    }
                } else {
                    document.getElementById('obj-label').innerText = txt;
                    document.getElementById('ui-work').classList.remove('hidden');
                    html5QrCode.stop();
                }
            });
        } catch (e) { alert("Chyba kamery."); }
    }

    function verifyLogin() {
        if (document.getElementById('pin').value === currentUser.pin) {
            localStorage.setItem('loggedWorker', JSON.stringify(currentUser));
            showWork();
        } else alert("Špatný PIN!");
    }

    function showWork() {
        document.getElementById('sec-login').classList.add('hidden');
        document.getElementById('sec-work').classList.remove('hidden');
        document.getElementById('logged-name').innerText = currentUser.name;
        renderHistory();
    }

    function logout() {
        localStorage.removeItem('loggedWorker');
        location.reload();
    }

    function saveData() {
        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        navigator.geolocation.getCurrentPosition((pos) => {
            const item = {
                worker: currentUser.name,
                place: document.getElementById('obj-label').innerText,
                note: document.getElementById('note').value,
                gps: pos.coords.latitude.toFixed(6) + "," + pos.coords.longitude.toFixed(6),
                time: new Date().toLocaleString("cs-CZ")
            };
            let q = JSON.parse(localStorage.getItem('aqQ')) || [];
            q.push(item);
            localStorage.setItem('aqQ', JSON.stringify(q));
            
            document.getElementById('ui-work').classList.add('hidden');
            document.getElementById('note').value = "";
            btn.disabled = false;
            sync(); // Spustit okamžitou synchronizaci
        }, () => { alert("GPS chyba!"); btn.disabled = false; });
    }

    // --- REVOLUČNÍ SYNCHRONIZACE ---
    async function sync() {
        if (isSyncing) return;
        let q = JSON.parse(localStorage.getItem('aqQ')) || [];
        const statusDiv = document.getElementById('sync-status');
        
        if (q.length === 0) {
            statusDiv.className = "";
            return;
        }

        isSyncing = true;
        statusDiv.className = "sync-active";
        statusDiv.innerText = `ODESÍLÁNÍ (${q.length})...`;

        const i = q[0];
        const url = `${SCRIPT_URL}?worker=${encodeURIComponent(i.worker)}&place=${encodeURIComponent(i.place)}&note=${encodeURIComponent(i.note)}&gps=${encodeURIComponent(i.gps)}&time=${encodeURIComponent(i.time)}`;
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s timeout na pokus

            await fetch(url, { mode: 'no-cors', signal: controller.signal });
            
            // Úspěch: Přesunout do historie, smazat z fronty
            let hist = JSON.parse(localStorage.getItem('aqHist')) || [];
            hist.unshift(i);
            localStorage.setItem('aqHist', JSON.stringify(hist.slice(0, 10)));
            q.shift();
            localStorage.setItem('aqQ', JSON.stringify(q));
            
            renderHistory();
            isSyncing = false;
            sync(); // Zkusit další v pořadí
        } catch (e) {
            console.log("Offline - čekám na signál...");
            statusDiv.className = "sync-offline";
            statusDiv.innerText = `ČEKÁM NA SIGNÁL (${q.length})`;
            isSyncing = false;
        }
    }

    function renderHistory() {
        const hist = JSON.parse(localStorage.getItem('aqHist')) || [];
        document.getElementById('history-list').innerHTML = hist.map(h => `
            <div class="history-item"><b>${h.place}</b><span>${h.time.split(',')[1]} ✅</span></div>
        `).join('');
    }

    // Automatické spouštěče synchronizace
    window.addEventListener('online', sync);
    setInterval(sync, 30000); // Každých 30s zkusit znovu

    window.onload = () => {
        const saved = localStorage.getItem('loggedWorker');
        if (saved) { currentUser = JSON.parse(saved); showWork(); }
        sync();
    };
</script>
</body>
</html>
